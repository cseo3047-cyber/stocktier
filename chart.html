<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stocktier — 차트</title>
<link rel="stylesheet" href="style.css">
<style>
  html,body { height:100%; margin:0; }
  body { overflow:hidden; }
  .term { display:flex; width:100%; background:#0a1620; color:var(--text); }
  .tleft { flex:1; min-width:0; display:flex; flex-direction:column; }
  /* ── 자체 차트 엔진 ── */
  #cvhead { height:40px; flex-shrink:0; display:flex; align-items:center; gap:12px; padding:0 14px; border-bottom:1px solid var(--border); background:#0a1a22; font-size:12px; overflow:hidden; white-space:nowrap; }
  #cvhead b.sym { font-size:14px; font-weight:800; flex-shrink:0; }
  #cvlegend { color:var(--muted); font-variant-numeric:tabular-nums; overflow:hidden; text-overflow:ellipsis; }
  #cvlegend b { font-weight:800; }
  #cvpers { margin-left:auto; display:flex; gap:5px; flex-shrink:0; }
  #cvpers span { cursor:pointer; font-size:10.5px; font-weight:800; padding:4px 10px; border-radius:7px; border:1px solid var(--border); color:var(--muted); }
  #cvpers span.on { background:#13322a; color:#4cd7a5; border-color:#2e5c47; }
  #cvbody { flex:1; position:relative; min-height:0; background:#0a1a22; }
  #cchart { width:100%; height:100%; display:block; cursor:crosshair; }
  #cvempty { position:absolute; inset:0; display:none; align-items:center; justify-content:center; text-align:center; color:var(--dim); font-size:12.5px; line-height:1.9; padding:24px; }
  .tind { height:158px; flex-shrink:0; border-top:1px solid var(--border); display:grid; grid-template-columns:repeat(5,1fr); }
  .icard { border-right:1px solid var(--border); padding:12px 14px; display:flex; flex-direction:column; min-width:0; overflow:hidden; }
  .icard:last-child { border-right:none; }
  .icard .t { font-size:11px; color:var(--muted); font-weight:700; margin-bottom:4px; }
  .icard .big { font-size:24px; font-weight:800; line-height:1.1; }
  .icard .s { font-size:10.5px; color:var(--dim); margin-top:auto; }
  .srrow { display:flex; justify-content:space-between; font-size:11px; padding:2.5px 0; border-bottom:1px solid #ffffff08; }
  .srrow:last-child { border-bottom:none; }
  .tside { width:340px; flex-shrink:0; border-left:1px solid var(--border); overflow-y:auto; background:#0b1a24; }
  .swrap { padding:12px 14px; }
  .swrap.bt { border-top:1px solid var(--border); }
  .cssearch { position:relative; margin-bottom:10px; }
  .cssearch input { width:100%; box-sizing:border-box; padding:8px 12px; font-size:12.5px; background:var(--panel2); border:1px solid var(--border); border-radius:9px; color:var(--text); outline:none; }
  .cssearch .sg { position:absolute; top:calc(100% + 4px); left:0; right:0; background:var(--panel); border:1px solid var(--border); border-radius:9px; overflow:hidden; z-index:20; display:none; max-height:300px; overflow-y:auto; }
  .cssearch .sg a { display:block; padding:8px 12px; font-size:12px; color:var(--text); text-decoration:none; cursor:pointer; }
  .cssearch .sg a:hover { background:var(--panel2); }
  .stitle { font-size:12.5px; font-weight:800; margin:2px 0 8px; display:flex; align-items:center; gap:6px; }
  .wgrp { font-size:10.5px; color:var(--dim); font-weight:800; margin:12px 0 4px; }
  .wrow { display:flex; align-items:center; gap:8px; padding:6px; border-radius:7px; font-size:12px; }
  .wrow.clk { cursor:pointer; } .wrow.clk:hover { background:var(--panel2); }
  .wrow.on { background:#13322a; }
  .wrow .nm { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:700; }
  .wrow .px { font-variant-numeric:tabular-nums; font-weight:700; }
  .wrow .ch { width:58px; text-align:right; font-size:11px; font-variant-numeric:tabular-nums; }
  .sumbox { background:var(--panel2); border:1px solid var(--border); border-radius:11px; padding:13px; margin-top:6px; }
  .sgrid { display:grid; grid-template-columns:1fr 1fr; gap:8px 12px; font-size:11.5px; margin-top:10px; }
  .sgrid .k { color:var(--dim); } .sgrid .v { text-align:right; font-weight:700; font-variant-numeric:tabular-nums; }
  .nrow { display:flex; gap:8px; padding:8px 0; border-bottom:1px solid #ffffff0d; font-size:11.5px; }
  .nrow:last-child { border-bottom:none; }
  .nrow a { color:var(--muted); text-decoration:none; line-height:1.45; }
  .nrow a:hover { color:var(--gold); }
  .nrow .tm { color:var(--dim); font-size:10px; flex-shrink:0; }
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>
<div class="term" id="term">
  <div class="tleft">
    <div id="cvhead">
      <b class="sym" id="cvtitle">차트</b>
      <span id="cvlegend"></span>
      <span id="cvpers"></span>
    </div>
    <div id="cvbody">
      <canvas id="cchart"></canvas>
      <div id="cvempty"></div>
    </div>
    <div class="tind" id="tind"></div>
  </div>
  <div class="tside">
    <div class="swrap">
      <div class="cssearch"><input id="csq" type="text" placeholder="종목명 · 코드로 차트 검색" autocomplete="off"><div class="sg" id="csg"></div></div>
      <div class="stitle">⭐ 관심 종목</div>
      <div id="watch"></div>
    </div>
    <div class="swrap bt">
      <div class="stitle" id="symname">종목 정보</div>
      <div id="syminfo"></div>
    </div>
    <div class="swrap bt">
      <div class="stitle">📰 주요 뉴스</div>
      <div id="cnews"></div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="data_us.js"></script>
<script src="common.js"></script>
<script>
ST.nav("chart.html");
// 표준 네비 아래로 터미널이 화면을 꽉 채우도록 높이 계산 (네비 위치 방식과 무관하게 동작)
function fitTerm(){
  const nav = document.getElementById("nav"), term = document.getElementById("term");
  const nh = nav ? nav.offsetHeight : 56;
  const fixed = nav && getComputedStyle(nav).position === "fixed";
  term.style.height = (window.innerHeight - (fixed?0:nh)) + "px";
  term.style.marginTop = fixed ? nh + "px" : "0";
}
window.addEventListener("resize", fitTerm); fitTerm();

const MK = window.STOCK_MARKET || {};
const KR = (window.ST && ST.KR) || {};
const US = (window.ST && ST.US) || {};
const byCode = {}; for (const nm in KR) if (KR[nm][0]) byCode[KR[nm][0]] = { name:nm, e:KR[nm] };
const majors = Object.keys(KR).map(nm=>({nm,e:KR[nm]})).sort((a,b)=>(b.e[8]||0)-(a.e[8]||0)).slice(0,8);
const majorsUS = Object.keys(US).map(k=>({k,e:US[k]})).sort((a,b)=>(b.e[8]||0)-(a.e[8]||0)).slice(0,8);
const q = new URLSearchParams(location.search);
let CURSRC = "kr", CURCODE = "005930";
{ const kq = q.get("k") ? decodeURIComponent(q.get("k")) : "";
  if (kq){ const hit = ST.findStock(kq);
    if (hit){ CURSRC = hit[0]; CURCODE = hit[0]==="kr" ? (KR[hit[1]]||[])[0]||"005930" : hit[1]; } } }
const isUS = () => CURSRC === "us";
const wonN = v => v==null?"-":Math.round(v).toLocaleString("ko-KR");
// 통화 표시: 국내 = 원(정수) · 미국 = $ (소수 둘째 자리)
const mfmt = v => v==null||isNaN(v) ? "-" : isUS()
  ? "$"+Number(v).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})
  : Math.round(v).toLocaleString("ko-KR");
const cls = v => v==null?"":v>=0?"up":"down";
const pct = v => (v>=0?"+":"")+v.toFixed(2)+"%";

const sma = (a,n)=>{ if(a.length<n) return null; let s=0; for(let i=a.length-n;i<a.length;i++) s+=a[i]; return s/n; };
const rsi = (c,n=14)=>{ if(c.length<n+1) return null; let g=0,l=0; for(let i=c.length-n;i<c.length;i++){ const d=c[i]-c[i-1]; if(d>0)g+=d; else l+=-d; } g/=n; l/=n; return l===0?100:100-100/(1+g/l); };
const atr = (o,n=14)=>{ if(o.length<n+1) return null; let s=0; for(let i=o.length-n;i<o.length;i++){ const pc=o[i-1].c; s+=Math.max(o[i].h-o[i].l, Math.abs(o[i].h-pc), Math.abs(o[i].l-pc)); } return s/n; };
function trendScore(c){ const last=c[c.length-1], s20=sma(c,20), s60=sma(c,60), s20p=sma(c.slice(0,-5),20); let sc=50;
  if(s20) sc+=last>s20?13:-13; if(s60) sc+=last>s60?13:-13; if(s20&&s60) sc+=s20>s60?12:-12; if(s20&&s20p) sc+=s20>s20p?12:-12;
  return Math.max(3,Math.min(97,Math.round(sc))); }
function gaugeSvg(score,col){ const a=Math.PI*(1-score/100); const x=37+31*Math.cos(a), y=40-31*Math.sin(a);
  return `<svg viewBox="0 0 74 44" style="width:74px;height:44px;"><path d="M6 40 A31 31 0 0 1 68 40" fill="none" stroke="#16303c" stroke-width="6" stroke-linecap="round"/>
    <path d="M6 40 A31 31 0 0 1 68 40" fill="none" stroke="${col}" stroke-width="6" stroke-linecap="round" stroke-dasharray="${score/100*97} 200"/>
    <circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.4" fill="#fff"/></svg>`; }

// ══════════ 자체 캔들차트 엔진 (트레이딩뷰 미사용 · 자체 수집 OHLC 데이터) ══════════
const CV = { bars:null, i0:0, i1:0, hover:-1, hy:null, drag:null, per:130 };
const AXW = 66, AXH = 22, VOLR = 0.24;
const MAS = [[5,"#f0c948"],[20,"#4cc4ff"],[60,"#c77dff"]];
const cvs = document.getElementById("cchart");
const ctx = cvs.getContext("2d");
const PERSC = [["3개월",65],["6개월",130],["1년",250],["전체",99999]];

function cvResize(){
  const w = cvs.clientWidth, h = cvs.clientHeight, dpr = window.devicePixelRatio||1;
  if (!w || !h) return;
  cvs.width = Math.round(w*dpr); cvs.height = Math.round(h*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
  drawCV();
}
window.addEventListener("resize", cvResize);

function chartSet(bars, name){
  CV.bars = bars && bars.length ? bars : null;
  CV.hover = -1;
  document.getElementById("cvtitle").textContent = name || "차트";
  const emp = document.getElementById("cvempty");
  if (!CV.bars){
    emp.style.display = "flex";
    emp.innerHTML = `<div>📉 이 종목은 차트 데이터가 없어요.<br><span style="font-size:11px;">일봉 차트는 국내·미국 시가총액 상위 종목을 지원합니다 (매일 자동 수집).</span></div>`;
    ctx.clearRect(0,0,cvs.clientWidth,cvs.clientHeight);
    document.getElementById("cvlegend").innerHTML = "";
    drawPers();
    return;
  }
  emp.style.display = "none";
  cvSetPer(CV.per);
}
function drawPers(){
  document.getElementById("cvpers").innerHTML = PERSC.map(([lb,n])=>
    `<span class="${CV.per===n?"on":""}" onclick="cvSetPer(${n})">${lb}</span>`).join("");
}
window.cvSetPer = n => {
  CV.per = n;
  if (CV.bars){ CV.i1 = CV.bars.length-1; CV.i0 = Math.max(0, CV.bars.length - Math.min(n, CV.bars.length)); }
  drawPers(); cvResize();
};

const smaAt = (bars,n,i)=>{ if(i+1<n) return null; let s=0; for(let k=i-n+1;k<=i;k++) s+=bars[k].c; return s/n; };
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

function drawCV(){
  if (!CV.bars) return;
  const W = cvs.clientWidth, H = cvs.clientHeight;
  if (!W || !H) return;
  ctx.clearRect(0,0,W,H);
  const bars = CV.bars, i0 = CV.i0, i1 = CV.i1, n = i1-i0+1;
  const plotW = W-AXW;
  const priceH = (H-AXH)*(1-VOLR)-6;
  const volTop = priceH+12, volH = (H-AXH)-volTop-4;
  let mn=Infinity, mx=-Infinity, vmax=0;
  for (let i=i0;i<=i1;i++){ const b=bars[i]; if(b.l<mn)mn=b.l; if(b.h>mx)mx=b.h; if(b.v>vmax)vmax=b.v; }
  const pad=(mx-mn)*0.06||mx*0.01||1; mn-=pad; mx+=pad;
  const X = i => (i-i0+0.5)/n*plotW;
  const Y = v => (1-(v-mn)/(mx-mn))*priceH + 4;
  const bw = Math.max(1, Math.min(19, plotW/n*0.66));
  ctx.font = "10px -apple-system,sans-serif"; ctx.textAlign = "left"; ctx.lineWidth = 1;
  // 가로 그리드 + 가격 라벨
  for (let g=0; g<=4; g++){
    const v = mn+(mx-mn)*g/4, y = Y(v);
    ctx.strokeStyle="#12303a"; ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(plotW,y); ctx.stroke();
    ctx.fillStyle="#5a737d"; ctx.fillText(mfmt(v), plotW+6, y+3.5);
  }
  // 세로 그리드 + 날짜 라벨
  const step = Math.max(1, Math.ceil(n/(plotW/94)));
  ctx.textAlign="center";
  for (let i=i0; i<=i1; i+=step){
    const x=X(i), d=bars[i].d;
    ctx.strokeStyle="#0f2733"; ctx.beginPath(); ctx.moveTo(x,4); ctx.lineTo(x,H-AXH); ctx.stroke();
    ctx.fillStyle="#5a737d"; ctx.fillText(d.slice(4,6)+"/"+d.slice(6,8), x, H-7);
  }
  ctx.textAlign="left";
  // 거래량
  for (let i=i0;i<=i1;i++){ const b=bars[i];
    ctx.fillStyle = b.c>=b.o ? "#4cd7a544" : "#f0645a44";
    const vh = vmax ? b.v/vmax*volH : 0;
    ctx.fillRect(X(i)-bw/2, volTop+volH-vh, bw, Math.max(1,vh));
  }
  ctx.fillStyle="#5a737d"; ctx.fillText("거래량", plotW+6, volTop+10);
  // 캔들
  for (let i=i0;i<=i1;i++){ const b=bars[i];
    const up = b.c>=b.o, col = up?"#4cd7a5":"#f0645a";
    const x = X(i);
    ctx.strokeStyle=col; ctx.beginPath(); ctx.moveTo(x,Y(b.h)); ctx.lineTo(x,Y(b.l)); ctx.stroke();
    ctx.fillStyle=col;
    const yO=Y(b.o), yC=Y(b.c);
    ctx.fillRect(x-bw/2, Math.min(yO,yC), bw, Math.max(1,Math.abs(yC-yO)));
  }
  // 이동평균선 (MA5 / MA20 / MA60)
  for (const [nn,col] of MAS){
    ctx.strokeStyle=col; ctx.lineWidth=1.3; ctx.beginPath(); let st=false;
    for (let i=i0;i<=i1;i++){ const v=smaAt(bars,nn,i); if(v==null) continue;
      const x=X(i), y=Y(v);
      if(!st){ ctx.moveTo(x,y); st=true; } else ctx.lineTo(x,y); }
    ctx.stroke();
  }
  ctx.lineWidth=1;
  // 현재가 점선 + 배지
  const last = bars[bars.length-1];
  if (last.c>=mn && last.c<=mx){
    const y = Y(last.c);
    ctx.setLineDash([4,4]); ctx.strokeStyle="#f0c948";
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(plotW,y); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle="#f0c948"; rr(plotW+2,y-9,AXW-5,18,4); ctx.fill();
    ctx.fillStyle="#1a1608"; ctx.font="bold 9.5px -apple-system,sans-serif";
    ctx.fillText(mfmt(last.c), plotW+7, y+3.5);
    ctx.font="10px -apple-system,sans-serif";
  }
  // 십자선 + 가격/날짜 배지
  if (CV.hover>=i0 && CV.hover<=i1){
    const x = X(CV.hover);
    ctx.setLineDash([4,4]); ctx.strokeStyle="#8da4ac";
    ctx.beginPath(); ctx.moveTo(x,4); ctx.lineTo(x,H-AXH); ctx.stroke();
    if (CV.hy!=null && CV.hy<=priceH+4){
      ctx.beginPath(); ctx.moveTo(0,CV.hy); ctx.lineTo(plotW,CV.hy); ctx.stroke();
      ctx.setLineDash([]);
      const pv = mn + (1-(CV.hy-4)/priceH)*(mx-mn);
      ctx.fillStyle="#22303c"; rr(plotW+2,CV.hy-9,AXW-5,18,4); ctx.fill();
      ctx.fillStyle="#cfe4ec"; ctx.fillText(mfmt(pv), plotW+7, CV.hy+3.5);
    }
    ctx.setLineDash([]);
    const d = bars[CV.hover].d;
    ctx.fillStyle="#22303c"; rr(Math.max(2,Math.min(plotW-56,x-27)),H-AXH+2,54,17,4); ctx.fill();
    ctx.fillStyle="#cfe4ec"; ctx.textAlign="center";
    ctx.fillText(d.slice(2,4)+"."+d.slice(4,6)+"."+d.slice(6,8), Math.max(29,Math.min(plotW-29,x)), H-AXH+14);
    ctx.textAlign="left";
  }
  legend(CV.hover>=0 ? CV.hover : bars.length-1);
}
function legend(i){
  const bars = CV.bars; if(!bars) return;
  const b = bars[i], p = i>0 ? bars[i-1].c : b.o;
  const ch = b.c-p, chp = p?ch/p*100:0, col = ch>=0?"#4cd7a5":"#f0645a";
  const maStr = MAS.map(([n,c])=>{ const v=smaAt(bars,n,i);
    return v==null?"":`<span style="color:${c};">MA${n} <b>${mfmt(v)}</b></span>`; }).filter(Boolean).join(" · ");
  document.getElementById("cvlegend").innerHTML =
    `<span style="color:var(--dim);">${b.d.slice(0,4)}.${b.d.slice(4,6)}.${b.d.slice(6,8)}</span>
     시 <b>${mfmt(b.o)}</b> 고 <b style="color:#4cd7a5;">${mfmt(b.h)}</b> 저 <b style="color:#f0645a;">${mfmt(b.l)}</b>
     종 <b style="color:${col};">${mfmt(b.c)} (${chp>=0?"+":""}${chp.toFixed(2)}%)</b>
     · 거래량 <b>${wonN(b.v)}</b> &nbsp; ${maStr}`;
}
// ── 인터랙션: 십자선 · 드래그 이동 · 휠 확대/축소 · 터치 이동
function evPos(ev){ const r=cvs.getBoundingClientRect(); return [ev.clientX-r.left, ev.clientY-r.top]; }
cvs.addEventListener("mousemove", ev => {
  if (!CV.bars) return;
  const [x,y] = evPos(ev);
  const plotW = cvs.clientWidth-AXW, n = CV.i1-CV.i0+1;
  if (CV.drag){
    const shift = Math.round((CV.drag.x - x) / (plotW/n));
    if (shift !== 0){
      let i0 = CV.drag.i0 + shift;
      i0 = Math.max(0, Math.min(CV.bars.length-n, i0));
      CV.i0 = i0; CV.i1 = i0+n-1;
    }
  }
  CV.hover = Math.max(CV.i0, Math.min(CV.i1, CV.i0 + Math.floor(x/plotW*n)));
  CV.hy = y;
  drawCV();
});
cvs.addEventListener("mousedown", ev => { const [x]=evPos(ev); CV.drag={x, i0:CV.i0}; cvs.style.cursor="grabbing"; });
window.addEventListener("mouseup", () => { CV.drag=null; cvs.style.cursor="crosshair"; });
cvs.addEventListener("mouseleave", () => { if(!CV.drag){ CV.hover=-1; CV.hy=null; drawCV(); } });
cvs.addEventListener("wheel", ev => {
  if (!CV.bars) return;
  ev.preventDefault();
  const [x] = evPos(ev);
  const plotW = cvs.clientWidth-AXW;
  const span = CV.i1-CV.i0+1;
  const factor = ev.deltaY>0 ? 1.15 : 1/1.15;
  let ns = Math.round(span*factor);
  ns = Math.max(15, Math.min(CV.bars.length, ns));
  const r = Math.max(0, Math.min(1, x/plotW));
  const ic = CV.i0 + r*span;
  let i0 = Math.round(ic - r*ns);
  i0 = Math.max(0, Math.min(CV.bars.length-ns, i0));
  CV.i0 = i0; CV.i1 = i0+ns-1;
  drawCV();
}, { passive:false });
cvs.addEventListener("touchstart", ev => { if(ev.touches.length===1){ CV.drag={x:ev.touches[0].clientX - cvs.getBoundingClientRect().left, i0:CV.i0}; } }, {passive:true});
cvs.addEventListener("touchmove", ev => {
  if (!CV.bars || !CV.drag || ev.touches.length!==1) return;
  const x = ev.touches[0].clientX - cvs.getBoundingClientRect().left;
  const plotW = cvs.clientWidth-AXW, n = CV.i1-CV.i0+1;
  const shift = Math.round((CV.drag.x - x) / (plotW/n));
  if (shift !== 0){
    let i0 = CV.drag.i0 + shift;
    i0 = Math.max(0, Math.min(CV.bars.length-n, i0));
    CV.i0 = i0; CV.i1 = i0+n-1;
    drawCV();
  }
}, {passive:true});
cvs.addEventListener("touchend", () => { CV.drag=null; });
// ══════════ 차트 엔진 끝 ══════════

async function showSymbol(src, code){
  CURSRC = src || "kr"; CURCODE = code;
  drawWatch();
  const o = CURSRC==="kr" ? byCode[code] : (US[code] ? { name: ST.displayName("us", code), e: US[code] } : null);
  document.getElementById("symname").textContent = o ? o.name : "종목 정보";
  let bars = null;
  try { const r = await fetch((CURSRC==="kr" ? "ohlc/" : "ohlc_us/") + code + ".json"); if(r.ok){ const rows=await r.json();
    bars = rows.map(a=>({d:String(a[0]),o:+a[1],h:+a[2],l:+a[3],c:+a[4],v:+a[5]})).filter(b=>b.c>0); } } catch(e){}
  chartSet(bars, o ? o.name : code);
  renderInd(bars, o);
  renderSum(bars, o);
}

function renderSum(bars,o){
  const el = document.getElementById("syminfo");
  if(!bars || bars.length<2){ el.innerHTML = `<div style="font-size:11.5px;color:var(--dim);line-height:1.7;">차트 데이터가 없는 종목이에요.<br>국내·미국 시총 상위 종목을 지원해요.</div>`; return; }
  const L=bars[bars.length-1], P=bars[bars.length-2];
  const ch=L.c-P.c, chp=P.c?ch/P.c*100:0;
  const win=bars.slice(-250), hi=Math.max(...win.map(b=>b.h)), lo=Math.min(...win.map(b=>b.l));
  const rngPos = (hi-lo)? (L.c-lo)/(hi-lo)*100 : 50;
  el.innerHTML = `<div class="sumbox">
    <div style="display:flex;align-items:baseline;gap:10px;"><b class="num" style="font-size:24px;">${mfmt(L.c)}</b>${isUS()?"":`<span style="font-size:11px;color:var(--dim);">원</span>`}
      <span class="num ${cls(ch)}" style="font-size:12.5px;font-weight:800;margin-left:auto;">${ch>=0?"+":"-"}${mfmt(Math.abs(ch))} (${pct(chp)})</span></div>
    <div class="sgrid">
      <span class="k">시가</span><span class="v">${mfmt(L.o)}</span>
      <span class="k">고가</span><span class="v ${cls(L.h-P.c)}">${mfmt(L.h)}</span>
      <span class="k">저가</span><span class="v ${cls(L.l-P.c)}">${mfmt(L.l)}</span>
      <span class="k">거래량</span><span class="v">${wonN(L.v)}</span>
    </div>
    <div style="margin-top:11px;font-size:10px;color:var(--dim);">52주 범위</div>
    <div style="position:relative;height:6px;background:#16303c;border-radius:3px;margin-top:5px;"><div style="position:absolute;left:${rngPos.toFixed(0)}%;top:-3px;width:11px;height:11px;border-radius:50%;background:var(--gold);transform:translateX(-50%);"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:4px;"><span>${mfmt(lo)}</span><span>${mfmt(hi)}</span></div>
  </div>`;
}

function renderInd(bars,o){
  const el = document.getElementById("tind");
  if(!bars || bars.length<30){ el.innerHTML = `<div class="icard" style="grid-column:1/-1;color:var(--dim);font-size:12px;justify-content:center;align-items:center;">이 종목은 지표 계산용 데이터가 없어요 (국내·미국 시총 상위 종목 지원).</div>`; return; }
  const c = bars.map(b=>b.c);
  const ts = trendScore(c), r = rsi(c), at = atr(bars), L = bars[bars.length-1];
  const atp = L.c ? at/L.c*100 : 0;
  const s5=sma(c,5),s20=sma(c,20),s60=sma(c,60);
  let buy=0,sell=0;
  if(s5&&s20){ s5>s20?buy++:sell++; } if(s20){ L.c>s20?buy++:sell++; } if(s60){ L.c>s60?buy++:sell++; }
  if(r!=null){ if(r<30)buy++; else if(r>70)sell++; } if(ts>=60)buy++; else if(ts<=40)sell++;
  const neu = Math.max(0,6-buy-sell);
  const sig = buy>sell?"매수 우세":sell>buy?"매도 우세":"중립";
  const sigCol = buy>sell?"#4cd7a5":sell>buy?"#f0645a":"#f0c948";
  const P=(L.h+L.l+L.c)/3;
  const sr=[["R3",L.h+2*(P-L.l)],["R2",P+(L.h-L.l)],["R1",2*P-L.l],["현재가",L.c],["S1",2*P-L.h],["S2",P-(L.h-L.l)],["S3",L.l-2*(L.h-P)]];
  const tsCol = ts>=60?"#4cd7a5":ts>=40?"#f0c948":"#f0645a";
  const rCol = r==null?"#f0c948":r>=70?"#f0645a":r<=30?"#4cd7a5":"#f0c948";
  el.innerHTML = `
    <div class="icard"><div class="t">추세 강도</div>
      <div style="display:flex;align-items:center;gap:6px;"><b class="big" style="color:${tsCol};">${ts}</b>${gaugeSvg(ts,tsCol)}</div>
      <div class="s">${ts>=60?"상승 우위":ts>=40?"중립 구간":"하락 우위"}</div></div>
    <div class="icard"><div class="t">RSI (14)</div><b class="big" style="color:${rCol};">${r==null?"-":r.toFixed(1)}</b>
      <div style="font-size:11px;color:${rCol};font-weight:700;margin-top:2px;">${r==null?"":r>=70?"과매수":r<=30?"과매도":"중립"}</div>
      <div class="s">30~70 중간이 안정적</div></div>
    <div class="icard"><div class="t">변동성 (ATR 14)</div><b class="big">${at==null?"-":mfmt(at)}</b>
      <div style="font-size:11px;color:var(--muted);font-weight:700;margin-top:2px;">${atp>3?"높음":atp>1.5?"보통":"낮음"}</div>
      <div class="s">종가 대비 ${atp.toFixed(2)}%</div></div>
    <div class="icard"><div class="t">매수 / 매도 시그널</div>
      <b class="big" style="color:${sigCol};font-size:19px;margin-top:2px;">${sig}</b>
      <div style="display:flex;gap:10px;font-size:11px;font-weight:700;margin-top:6px;"><span style="color:#4cd7a5;">매수 ${buy}</span><span style="color:#f0c948;">중립 ${neu}</span><span style="color:#f0645a;">매도 ${sell}</span></div>
      <div class="s">단기 신호 종합</div></div>
    <div class="icard"><div class="t">주요 저항 / 지지</div>
      <div style="margin-top:2px;">${sr.map(([k,v])=>`<div class="srrow"><span style="color:${k[0]==="R"?"#f0708a":k[0]==="S"?"#4cd7a5":"var(--gold)"};font-weight:700;">${k}</span><span class="num" style="font-weight:700;">${mfmt(v)}</span></div>`).join("")}</div></div>`;
}

function drawWatch(){
  const idx = [];
  if(MK.kospi) idx.push(["KOSPI",MK.kospi]);
  if(MK.kosdaq) idx.push(["KOSDAQ",MK.kosdaq]);
  const idxHtml = idx.map(([nm,o])=>`<div class="wrow"><span class="nm">${nm}</span>
    <span class="px num">${o.price!=null?Number(o.price).toLocaleString("ko-KR"):"-"}</span>
    <span class="ch num ${cls(o.ratio)}">${o.ratio!=null?pct(o.ratio):""}</span></div>`).join("");
  const fxHtml = MK.fx ? `<div class="wrow"><span class="nm">USD/KRW</span><span class="px num">${Number(MK.fx).toLocaleString("ko-KR")}</span><span class="ch num" style="color:var(--dim);">환율</span></div>` : "";
  const majHtml = majors.map(m=>{ const e=m.e, on=CURSRC==="kr"&&e[0]===CURCODE;
    return `<div class="wrow clk ${on?"on":""}" onclick="chSym('kr','${e[0]}')"><span class="nm">${m.nm}</span>
      <span class="px num">${wonN(e[2])}</span><span class="ch num ${cls(e[3])}">${e[3]!=null?pct(e[3]):""}</span></div>`; }).join("");
  const majUsHtml = majorsUS.map(m=>{ const e=m.e, on=CURSRC==="us"&&m.k===CURCODE;
    return `<div class="wrow clk ${on?"on":""}" onclick="chSym('us','${m.k}')"><span class="nm">${ST.displayName("us",m.k)}</span>
      <span class="px num">$${Number(e[2]).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}</span><span class="ch num ${cls(e[3])}">${e[3]!=null?pct(e[3]):""}</span></div>`; }).join("");
  document.getElementById("watch").innerHTML =
    (idxHtml?`<div class="wgrp">국내 지수</div>${idxHtml}`:"") +
    (fxHtml?`<div class="wgrp">환율</div>${fxHtml}`:"") +
    `<div class="wgrp">국내 주요 종목</div>${majHtml || `<div style="font-size:11px;color:var(--dim);padding:4px 6px;">데이터 로딩 중…</div>`}` +
    (majUsHtml?`<div class="wgrp">미국 주요 종목</div>${majUsHtml}`:"");
}

function drawNews(){
  const news = (MK.news||[]).slice(0,7);
  document.getElementById("cnews").innerHTML = news.length ? news.map(n=>`<div class="nrow">
    <a href="${n[3]||"#"}" target="_blank" rel="noopener">${n[0]}</a><span class="tm">${n[2]||""}</span></div>`).join("")
    : `<div style="font-size:11.5px;color:var(--dim);">뉴스 데이터가 없어요.</div>`;
}

// 종목 변경(관심종목 클릭·검색)
function chSym(src, code){ showSymbol(src, code); }
window.chSym = chSym;

// 사이드바 검색 (국내 + 미국)
const csq = document.getElementById("csq"), csg = document.getElementById("csg");
csq.addEventListener("input", ()=>{ const v=csq.value.trim(); if(!v){ csg.style.display="none"; return; }
  const hits = ST.suggestions(v, 12);
  csg.innerHTML = hits.map(([src,k])=>{ const id = src==="kr" ? KR[k][0] : k;
    return `<a onclick="pickSym('${src}','${String(id).replace(/'/g,"\\'")}')">${ST.displayName(src,k)} <span style="color:var(--dim);font-size:10px;">${id} · ${src==="us"?"미국":"국내"}</span></a>`; }).join("");
  csg.style.display = hits.length?"block":"none"; });
document.addEventListener("click", e=>{ if(!e.target.closest(".cssearch")) csg.style.display="none"; });
window.pickSym = (src, cd) => { csq.value=""; csg.style.display="none"; chSym(src, cd); };

drawPers();
drawWatch(); drawNews(); showSymbol(CURSRC, CURCODE);
requestAnimationFrame(cvResize);
</script>
</body>
</html>
