name: Update US stock data

on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Collect US stock data
        run: python collect_us.py

      - name: Commit and push
        run: |
          git config user.name "stock-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data_us.js
          git commit -m "미국 데이터 갱신 $(date +%Y-%m-%d)" || echo "변경 없음"
          git pull --rebase
          git push
