name: Collect US stock data

on:
  schedule:
    - cron: "30 21 * * 1-5"   # 평일 06:30 KST (미국 장 마감 후)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Collect US stock data
        run: python collect_us.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_us.js dart_us.js ohlc_us
          git commit -m "US data update" || exit 0
          git pull --rebase origin main
          git push
