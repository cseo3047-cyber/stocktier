<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stocktier — 실적 캘린더</title>
<link rel="stylesheet" href="style.css">
<style>
  .wrap { max-width:1500px; }
  .layout { display:grid; grid-template-columns:1fr 300px; gap:14px; align-items:stretch; }
  @media (max-width:1150px){ .layout { grid-template-columns:1fr; } }
  .cards4 { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; margin-bottom:14px; }
  @media (max-width:900px){ .cards4 { grid-template-columns:repeat(2,minmax(0,1fr)); } }
  .scard { background:linear-gradient(135deg,#0d2e3b,#123f4b); border:1px solid var(--border); border-radius:14px; padding:15px; display:flex; gap:11px; align-items:center; min-width:0; }
  .scard .ic { width:44px; height:44px; border-radius:12px; background:#4cd7a51a; border:1px solid #4cd7a544; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .scard .l { flex:1; min-width:0; }
  .scard .lb { font-size:11.5px; color:var(--muted); font-weight:700; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .scard .vl { font-size:25px; font-weight:800; line-height:1.05; }
  .scard .vl small { font-size:13px; color:var(--dim); font-weight:600; }
  .scard .sub { font-size:10.5px; color:var(--dim); margin-top:3px; white-space:nowrap; }
  .scard svg.mini { flex-shrink:0; }
  .scard.hov { cursor:pointer; transition:border-color .15s, box-shadow .15s; }
  .scard.hov:hover { border-color:#4cd7a5; box-shadow:0 0 0 1px #4cd7a555; }
  .smrow { display:flex; gap:10px; align-items:center; padding:9px 2px; border-bottom:1px solid #ffffff0d; font-size:12px; font-weight:600; cursor:pointer; }
  .smrow:last-child { border-bottom:none; }
  .smrow:hover .tx { color:var(--gold); }
  .smrow .tx { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text); font-weight:700; }
  .smhead { display:flex; gap:10px; align-items:center; padding:0 2px 7px; border-bottom:1px solid var(--border); font-size:10px; color:var(--dim); font-weight:700; }
  .smhead .tx { flex:1; min-width:0; }
  .smhead span { text-align:center !important; }
  .card.hovc { cursor:pointer; transition:border-color .15s, box-shadow .15s; }
  .card.hovc:hover { border-color:#4cd7a5; box-shadow:0 0 0 1px #4cd7a555; }
  .fbar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:11px; align-items:center; }
  .fchip { font-size:11.5px; padding:5px 13px; border-radius:8px; border:1px solid var(--border); color:var(--muted); cursor:pointer; font-weight:700; }
  .fchip.on { background:#13322a; color:#4cd7a5; border-color:#2e5c47; }
  .fbar select { background:var(--panel2); border:1px solid var(--border); color:var(--text); border-radius:7px; padding:5px 8px; font-size:11.5px; outline:none; }
  .stbl { width:100%; border-collapse:collapse; font-size:12px; }
  .stbl th { text-align:center; color:var(--dim); font-size:10.5px; font-weight:700; padding:7px 4px; border-bottom:1px solid var(--border); white-space:nowrap; }
  .stbl td { padding:8px 4px; border-bottom:1px solid #ffffff0d; text-align:center; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .stbl tr { cursor:pointer; }
  .stbl tr:hover td { background:var(--panel2); }
  .stbl td.nm { text-align:left; font-weight:700; max-width:160px; overflow:hidden; text-overflow:ellipsis; }
  .tchg { font-size:10px; font-weight:800; border-radius:5px; padding:1.5px 6px; }
  .vbadge { display:inline-flex; padding:2px 10px; border-radius:7px; font-size:10.5px; font-weight:800; }
  .i-hi { background:#3a1a22; color:#f0708a; } .i-md { background:#3d3313; color:#f0c948; } .i-lo { background:#13322a; color:#4cd7a5; }
  .morebtn { display:block; margin:12px auto 0; background:var(--panel2); border:1px solid var(--border); color:var(--muted); border-radius:9px; padding:8px 26px; font-size:12px; font-weight:800; cursor:pointer; }
  .morebtn:hover { color:var(--gold); border-color:var(--gold-dim); }
  .row3b { display:grid; grid-template-columns:1fr 1.1fr 1.2fr; gap:14px; margin-top:14px; }
  @media (max-width:1000px){ .row3b { grid-template-columns:1fr; } }
  .evrow { display:flex; align-items:center; gap:9px; font-size:12px; color:var(--muted); font-weight:600; padding:8px 0; border-bottom:1px solid #ffffff0d; }
  .evrow:last-child { border-bottom:none; }
  .evrow .dt { width:66px; flex-shrink:0; font-variant-numeric:tabular-nums; color:var(--dim); font-size:11px; }
  .evrow .tx { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .bullets2 { font-size:12px; color:var(--muted); line-height:1.85; }
  .bullets2 li { list-style:none; padding-left:21px; position:relative; margin-bottom:6px; }
  .bullets2 li:before { content:"✓"; position:absolute; left:0; top:2px; width:14px; height:14px; border-radius:50%; background:#13322a; color:#4cd7a5; font-size:9px; font-weight:800; display:flex; align-items:center; justify-content:center; }
  .gauge { width:150px; height:80px; position:relative; overflow:hidden; margin:2px auto 6px; }
  .gauge .arc { width:150px; height:150px; border-radius:50%; }
  .gauge .hole { position:absolute; left:21px; top:21px; width:108px; height:108px; background:var(--panel); border-radius:50%; text-align:center; }
  .gauge .hole b { font-size:25px; display:block; margin-top:20px; }
  .gauge .hole small { font-size:12px; color:var(--dim); font-weight:500; }
  .gsub { text-align:center; font-size:11px; font-weight:800; margin-bottom:8px; }
  .nrow2 { display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid #ffffff0d; font-size:12px; font-weight:700; cursor:pointer; }
  .nrow2:last-child { border-bottom:none; }
  .nrow2:hover { color:var(--gold); }
  .nrow2 .rank { width:18px; height:18px; border-radius:5px; background:#13322a; color:#4cd7a5; font-size:10px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .nrow2 .tx { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .gbar { display:flex; align-items:center; gap:9px; font-size:12px; color:var(--muted); font-weight:600; padding:6px 0; }
  .gbar .lb2 { width:96px; flex-shrink:0; }
  .gbar .m { flex:1; height:7px; background:var(--panel2); border:1px solid var(--border); border-radius:4px; overflow:hidden; }
  .gbar .m i { display:block; height:100%; background:linear-gradient(90deg,#0f7a56,#4cd7a5); border-radius:4px; }
  .gbar b { width:34px; text-align:right; color:var(--text); }
  .mag { position:absolute; right:11px; top:0; bottom:0; display:flex; align-items:center; color:var(--muted); font-size:15px; font-weight:700; pointer-events:none; }
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>
<div class="wrap">
  <span class="asof" id="asof"></span>
  <div class="page-title">실적 캘린더</div>
  <div class="page-sub">주요 기업의 실적 발표 일정과 이벤트 영향을 한눈에 확인하세요.</div>

  <div class="layout">
    <div>
      <div class="cards4" id="cards"></div>
      <div class="card"><h3>실적 캘린더
        <span style="margin-left:auto;position:relative;flex-shrink:0;display:inline-flex;">
          <input id="calq" placeholder="종목명 또는 코드 검색" autocomplete="off"
            style="width:250px;padding:8px 32px 8px 12px;font-size:12px;background:var(--panel2);border:1.5px solid var(--border);border-radius:9px;color:var(--text);outline:none;font-weight:500;">
          <span class="mag">⌕</span></span></h3>
        <div class="fbar" id="catbar"></div>
        <table class="stbl"><thead><tr><th>순위</th><th>발표일</th><th style="text-align:left;">종목명</th><th>코드</th><th>시장</th><th>구분</th><th>시가총액</th><th>티어</th><th>중요도</th><th>최근 변화</th></tr></thead>
        <tbody id="tbody"></tbody></table>
        <button class="morebtn" id="morebtn">더보기 ▾</button>
      </div>
      <div class="row3b">
        <div class="card"><h3>오늘 발표 일정</h3><div id="todaylist"></div></div>
        <div class="card"><h3>실적 / 경제 이벤트 체크</h3><div id="evcheck"></div></div>
        <div class="card"><h3>다음 주 주요 종목</h3><div id="nextwk"></div></div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px;height:100%;">
      <div class="card hovc" onclick="openEidx()" title="클릭하면 산정 방식이 열려요"><h3>어닝 이벤트 지수 <span style="margin-left:auto;font-size:10px;color:var(--gold);font-weight:700;">산정 방식 ›</span></h3><div id="eidx"></div></div>
      <div class="card"><h3>이번 주 주요 발표 TOP 5</h3><div id="top5"></div></div>
      <div class="card" style="flex:1;display:flex;flex-direction:column;"><h3>실적 캘린더 평가 기준</h3>
        <div id="crit" style="flex:1;display:flex;flex-direction:column;justify-content:space-evenly;"></div>
        <div style="font-size:10.5px;color:var(--dim);margin-top:8px;">미국은 나스닥 공시 기준 · 국내 "예상"은 분기 공시 기한 기반 추정입니다.</div>
      </div>
    </div>
  </div>

  <div class="footer"></div>
</div>

<div id="statmodal" style="position:fixed;inset:0;background:#000000aa;display:none;align-items:center;justify-content:center;z-index:300;" onclick="if(event.target===this)this.style.display='none'">
  <div style="background:var(--panel);border:1px solid var(--border);border-radius:16px;width:min(560px,92vw);max-height:80vh;display:flex;flex-direction:column;padding:22px 24px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <b id="sm_title" style="font-size:16px;"></b>
      <span style="cursor:pointer;color:var(--muted);padding:2px 6px;font-size:16px;" onclick="document.getElementById('statmodal').style.display='none'">✕</span></div>
    <div id="sm_body" style="overflow:auto;flex:1;"></div>
  </div>
</div>

<script src="data.js"></script>
<script src="data_us.js"></script>
<script src="common.js"></script>
<script>
ST.nav("calendar.html");
document.getElementById("asof").textContent = "업데이트: " + ST.asofText();
const clip = v => Math.max(0, Math.min(100, Math.round(v)));
const today0 = new Date(); today0.setHours(0,0,0,0);
const dday = d => Math.round((d-today0)/864e5);
const fmtMD = d => `${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`;
const WD = ["일","월","화","수","목","금","토"];

const EARNK = (window.STOCK_MARKET && window.STOCK_MARKET.earn) || null;
const EARNU = (window.STOCK_MARKET_US && window.STOCK_MARKET_US.earn) || null;
const hashOf = s => { let h=7; for (const c of String(s)) h=(h*31+c.charCodeAt(0))>>>0; return h; };
function earnInfo(x){
  const m = x.us ? EARNU : EARNK;
  const v = m && m[x.us ? x.key : x.e[0]];
  if (v) { const t = String(v);
    const d = t.length>=8 ? new Date(+t.slice(0,4), +t.slice(4,6)-1, +t.slice(6,8)) : new Date(today0.getFullYear(), +t.slice(0,2)-1, +t.slice(2,4));
    if (d >= today0) return { d, est:false }; }
  if (!x.us) { const h = hashOf(x.e[0]); const dl = [[3,31],[5,15],[8,14],[11,16]];
    for (let k=0;k<9;k++){ const d = new Date(today0.getFullYear()+Math.floor(k/4), dl[k%4][0]-1, dl[k%4][1]);
      d.setDate(d.getDate()-(h%16)); if (d>=today0) return { d, est:true }; } }
  return null;
}

// 향후 45일 내 발표 예정 종목
const CAL = [];
for (const x of ST.all()) {
  const us = x.src==="us";
  const eo = earnInfo({...x, us});
  if (!eo || dday(eo.d) > 45) continue;
  const sc = ST.score(x.e, us);
  const capKRW = us ? x.e[8]*13.5 : x.e[8];   // 억원 환산(근사)
  const imp = capKRW >= 100000 ? "High" : capKRW >= 10000 ? "Medium" : "Low";
  CAL.push({ ...x, us, eo, sc, g: ST.gradeOf(sc), imp });
}
CAL.sort((a,b)=> a.eo.d-b.eo.d || b.e[8]-a.e[8]);

// ── 상단 카드
const calIcon = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4cd7a5" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="5" width="18" height="16" rx="3"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2.5" x2="8" y2="6.5"/><line x1="16" y1="2.5" x2="16" y2="6.5"/><path d="M8 15.5l2.5 2.5 5.5-5.5" stroke-width="2"/></svg>`;
const calWIcon = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4cd7a5" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="5" width="18" height="16" rx="3"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2.5" x2="8" y2="6.5"/><line x1="16" y1="2.5" x2="16" y2="6.5"/><circle cx="8.5" cy="14" r="1.2" fill="#4cd7a5" stroke="none"/><circle cx="12" cy="14" r="1.2" fill="#4cd7a5" stroke="none"/><circle cx="15.5" cy="14" r="1.2" fill="#4cd7a5" stroke="none"/></svg>`;
const fireIcon = `<svg width="23" height="25" viewBox="0 0 24 26" fill="none" stroke="#f0645a" stroke-width="1.8" stroke-linejoin="round"><path d="M12 2c1 4-5 6-5 12a5 5 0 0 0 10 0c0-3-2-5-2-5s-1 2-3 2c1-3 0-7 0-9z" fill="#f0645a22"/></svg>`;
const globeIcon = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4cd7a5" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><ellipse cx="12" cy="12" rx="4.5" ry="10"/><line x1="2" y1="12" x2="22" y2="12"/></svg>`;
const miniLine = (id,c1,c2,seed) => { const pts=[]; let v=13;
  for (let i=0;i<13;i++){ v=Math.max(5,Math.min(29,v+((seed>>(i%9))%7)-2.6)); pts.push(`${(i*6.5).toFixed(1)},${(36-v).toFixed(1)}`); }
  return `<svg class="mini" width="80" height="36" viewBox="0 0 80 36"><defs>
    <linearGradient id="${id}" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/></linearGradient>
    <linearGradient id="${id}f" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${c2}" stop-opacity="0.35"/><stop offset="1" stop-color="${c2}" stop-opacity="0"/></linearGradient></defs>
    <polygon points="0,36 ${pts.join(" ")} 80,36" fill="url(#${id}f)"/>
    <polyline points="${pts.join(" ")}" fill="none" stroke="url(#${id})" stroke-width="2"/></svg>`; };
const miniBars = (id,c1,c2,seed) => { let b="";
  for (let i=0;i<8;i++){ const h=7+((seed*(i+3))%17); b+=`<rect x="${i*9.5}" y="${36-h}" width="6.5" height="${h}" rx="2" fill="url(#${id})"/>`; }
  return `<svg class="mini" width="78" height="36" viewBox="0 0 78 36"><defs><linearGradient id="${id}" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/></linearGradient></defs>${b}</svg>`; };
const logo = x => {
  const nv = `https://ssl.pstatic.net/imgstock/fn/real/logo/stock/Stock${x.us ? x.key+(x.e[1]==="NASDAQ"?".O":x.e[1]==="NYSE"?".N":".A") : x.e[0]}.svg`;
  const ts = x.us ? nv : "https://thumb.tossinvest.com/image/resized/96x0/" + encodeURIComponent("https://static.toss.im/png-icons/securities/icn-sec-fill-"+x.e[0]+".png");
  return `<img src="${ts}" style="width:19px;height:19px;border-radius:50%;background:#fff;flex-shrink:0;vertical-align:-4px;margin-right:6px;" loading="lazy"
    onerror="if(!this.dataset.f){this.dataset.f=1;this.src='${nv}';}else{this.style.visibility='hidden';}">`;
};

const todayN = CAL.filter(x=>dday(x.eo.d)===0).length;
const weekN = CAL.filter(x=>dday(x.eo.d)<=7).length;
const hiN = CAL.filter(x=>x.imp==="High" && dday(x.eo.d)<=7).length;
const ecoEv = (ST.EVENTS||[]).map(e=>({d:new Date(e[0]+"T00:00:00"), flag:e[1], type:e[2], t:e[3]})).filter(x=>x.d>=today0);
const ecoN = ecoEv.filter(x=>dday(x.d)<=30).length;
document.getElementById("cards").innerHTML = `
  <div class="scard hov" onclick="openStat('today')"><span class="ic">${calIcon}</span><div class="l"><div class="lb">오늘 발표 종목</div><div class="vl num">${ST.num(todayN)}<small> 개</small></div><div class="sub">예상 포함</div></div>${miniLine("cg1","#1d9e75","#4cd7a5",todayN*13+11)}</div>
  <div class="scard hov" onclick="openStat('week')"><span class="ic">${calWIcon}</span><div class="l"><div class="lb">이번 주 발표 종목</div><div class="vl num">${ST.num(weekN)}<small> 개</small></div><div class="sub">D-7 이내</div></div>${miniBars("cg2","#0f7a56","#4cd7a5",weekN%43+13)}</div>
  <div class="scard hov" onclick="openStat('hi')"><span class="ic" style="background:#f0645a1a;border-color:#f0645a44;">${fireIcon}</span><div class="l"><div class="lb">고영향 발표</div><div class="vl num">${ST.num(hiN)}<small> 개</small></div><div class="sub">대형주 · 이번 주</div></div>${miniBars("cg3","#7a2822","#f0645a",hiN%37+7)}</div>
  <div class="scard hov" onclick="openStat('eco')"><span class="ic">${globeIcon}</span><div class="l"><div class="lb">경제 이벤트</div><div class="vl num">${ST.num(ecoN)}<small> 개</small></div><div class="sub">30일 이내 · FOMC 등</div></div>${miniBars("cg4","#1d9e75","#8fd6b8",ecoN*9+21)}</div>`;

// ── 상단 카드 팝업 (헤더 + 열 제목 + 목록)
window.openStat = which => {
  const title = document.getElementById("sm_title"), body = document.getElementById("sm_body");
  const impB = x => `<span class="vbadge ${x.imp==="High"?"i-hi":x.imp==="Medium"?"i-md":"i-lo"}" style="flex-shrink:0;">${x.imp}</span>`;
  const head = `<div class="smhead"><span style="width:66px;flex-shrink:0;">발표일</span><span class="tx">종목명</span><span style="width:34px;flex-shrink:0;">시장</span><span style="width:34px;text-align:center;flex-shrink:0;">구분</span><span style="width:72px;text-align:right;flex-shrink:0;">시가총액</span><span style="width:48px;text-align:center;flex-shrink:0;">중요도</span></div>`;
  const rows = list => list.map(x=>`
    <div class="smrow" onclick="location.href='${ST.stockUrl(x.src,x.key)}'">
      <span class="num" style="width:66px;flex-shrink:0;color:${dday(x.eo.d)===0?"#f0c948":"var(--dim)"};font-size:11px;">${fmtMD(x.eo.d)} (${WD[x.eo.d.getDay()]})</span>
      <span class="tx">${logo(x)}${ST.displayName(x.src,x.key)}</span>
      <span style="width:34px;flex-shrink:0;color:var(--muted);font-size:10.5px;">${x.us?"미국":"국내"}</span>
      <span style="width:34px;text-align:center;flex-shrink:0;"><span class="tchg" style="${x.eo.est?"background:#22303c;color:#9db9d4;":"background:#13322a;color:#4cd7a5;"}">${x.eo.est?"예상":"공시"}</span></span>
      <span class="num" style="width:72px;text-align:right;flex-shrink:0;color:var(--muted);font-size:11px;">${ST.capStr(x.e[8],x.us)}</span>
      <span style="width:48px;text-align:center;flex-shrink:0;">${impB(x)}</span></div>`).join("")
    || `<div style="font-size:12px;color:var(--dim);padding:14px 0;">해당 종목이 없습니다.</div>`;
  const byCap = l => l.slice().sort((a,b)=>b.e[8]*(b.us?13.5:1)-a.e[8]*(a.us?13.5:1));
  if (which === "today") {
    title.innerHTML = `📅 오늘 발표 종목 <span style="font-size:11px;color:var(--dim);font-weight:600;">· ${todayN}개 (예상 포함)</span>`;
    body.innerHTML = head + rows(byCap(CAL.filter(x=>dday(x.eo.d)===0)).slice(0,40));
  } else if (which === "week") {
    title.innerHTML = `🗓 이번 주 발표 종목 <span style="font-size:11px;color:var(--dim);font-weight:600;">· D-7 이내 ${weekN}개</span>`;
    body.innerHTML = head + rows(byCap(CAL.filter(x=>dday(x.eo.d)<=7)).slice(0,50));
  } else if (which === "hi") {
    title.innerHTML = `🔥 고영향 발표 <span style="font-size:11px;color:var(--dim);font-weight:600;">· 이번 주 대형주 ${hiN}개</span>`;
    body.innerHTML = head + rows(byCap(CAL.filter(x=>x.imp==="High" && dday(x.eo.d)<=7)));
  } else {
    title.innerHTML = `🌐 경제 이벤트 <span style="font-size:11px;color:var(--dim);font-weight:600;">· 30일 이내 ${ecoN}개</span>`;
    const tyStyle2 = t => t==="금리" ? "background:#3d3313;color:#f0c948;" : t==="만기" ? "background:#3a1a22;color:#f0708a;" : "background:#13303d;color:#4cc3d7;";
    body.innerHTML = `<div class="smhead"><span style="width:76px;flex-shrink:0;">일자</span><span class="tx">이벤트</span><span style="width:40px;text-align:center;flex-shrink:0;">구분</span></div>`
      + ecoEv.filter(x=>dday(x.d)<=30).map(x=>`
        <div class="smrow" style="cursor:default;">
          <span class="num" style="width:76px;flex-shrink:0;color:var(--dim);font-size:11px;">${fmtMD(x.d)} (${WD[x.d.getDay()]}) D-${dday(x.d)}</span>
          <span class="tx">${x.flag} ${x.t}</span>
          <span style="width:40px;text-align:center;flex-shrink:0;"><span class="tchg" style="${tyStyle2(x.type)}">${x.type}</span></span></div>`).join("")
      || `<div style="font-size:12px;color:var(--dim);padding:14px 0;">예정된 이벤트가 없습니다.</div>`;
  }
  document.getElementById("statmodal").style.display = "flex";
};

// ── 캘린더 테이블
let PER = "week", MKT = "all", SORT = "date", SHOW = 15, Q = "", CAT = "all";
const PERS = [["today","오늘"],["week","이번 주"],["month","이번 달"],["all","전체 기간"]];
// 분류: 대형주(시총 10조↑) / 성장주(월간 +10%↑ 또는 고PER 상승) / 반도체·바이오(업종·테마 매칭)
const indOf = x => x.us ? String(x.e[19]||"") : String(x.e[20]||"") + " " + String(x.e[21]||"");
const CATDEF = {
  all:  { t:"전체",   f: () => true },
  big:  { t:"대형주", f: x => x.e[8]*(x.us?13.5:1) >= 100000 },
  grow: { t:"성장주", f: x => (x.e[15]||0) >= 10 || ((x.e[4]||0) > (x.us?35:25) && (x.e[15]||0) > 0) },
  semi: { t:"반도체", f: x => /반도체|semicon/i.test(indOf(x)) },
  bio:  { t:"바이오", f: x => /바이오|제약|생명|헬스케어|bio|pharma/i.test(indOf(x)) },
};
function pool(){
  // 검색 시 기간 필터는 45일 전체로 확장, 분류·시장 필터는 함께 적용
  let p = Q ? CAL.slice()
            : CAL.filter(x => PER==="today" ? dday(x.eo.d)===0 : PER==="week" ? dday(x.eo.d)<=7 : PER==="month" ? dday(x.eo.d)<=31 : true);
  p = p.filter(CATDEF[CAT].f);
  if (MKT==="kr") p = p.filter(x=>!x.us);
  else if (MKT==="us") p = p.filter(x=>x.us);
  if (Q) {
    const qU = Q.toUpperCase();
    p = p.filter(x => ST.displayName(x.src,x.key).includes(Q) ||
      String(x.key).toUpperCase().includes(qU) || String(x.e[0]).includes(Q));
  }
  if (SORT==="cap") p = p.slice().sort((a,b)=>b.e[8]*(b.us?13.5:1)-a.e[8]*(a.us?13.5:1));
  return p;
}
document.getElementById("calq").addEventListener("input", e => { Q = e.target.value.trim(); SHOW = 15; drawTbl(); });
function drawBar(){
  document.getElementById("catbar").innerHTML =
    `<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;width:100%;">` +
    PERS.map(([k,t])=>`<span class="fchip ${PER===k?"on":""}" onclick="setPer('${k}')">${t}</span>`).join("") +
    `<span style="margin-left:auto;display:flex;gap:7px;align-items:center;font-size:11px;color:var(--dim);">
      정렬 <select onchange="setSort(this.value)">
        <option value="date" ${SORT==="date"?"selected":""}>발표일 순</option>
        <option value="cap" ${SORT==="cap"?"selected":""}>시가총액 순</option></select>
      시장 <select onchange="setMkt(this.value)">
        <option value="all" ${MKT==="all"?"selected":""}>전체</option>
        <option value="kr" ${MKT==="kr"?"selected":""}>국내</option>
        <option value="us" ${MKT==="us"?"selected":""}>미국</option></select></span></div>` +
    `<div style="display:flex;gap:6px;flex-wrap:wrap;width:100%;margin-top:8px;">` +
    Object.keys(CATDEF).map(k=>`<span class="fchip ${CAT===k?"on":""}" onclick="setCat('${k}')">${CATDEF[k].t}</span>`).join("") + `</div>`;
}
window.setPer = k => { PER=k; SHOW=15; drawBar(); drawTbl(); };
window.setCat = k => { CAT=k; SHOW=15; drawBar(); drawTbl(); };
window.setSort = v => { SORT=v; SHOW=15; drawTbl(); };
window.setMkt = v => { MKT=v; SHOW=15; drawTbl(); };
// 발표 일정 출처: 미국 = 나스닥 어닝스 페이지, 국내 = DART 회사별 공시 검색
const srcUrl = x => x.us
  ? `https://www.nasdaq.com/market-activity/stocks/${String(x.key).toLowerCase()}/earnings`
  : `https://dart.fss.or.kr/dsab007/main.do?option=corp&textCrpNm=${encodeURIComponent(ST.displayName(x.src,x.key))}`;
window.openSrc = (src, key) => {
  const x = CAL.find(v=>v.src===src && v.key===key);
  if (x) window.open(srcUrl(x), "_blank");
};
function drawTbl(){
  const p = pool();
  document.getElementById("tbody").innerHTML = p.slice(0,SHOW).map((x,i)=>`
    <tr onclick="openSrc('${x.src}','${String(x.key).replace(/'/g,"\\'")}')" title="클릭하면 발표 일정 출처로 이동해요">
      <td class="num" style="color:var(--muted);">${i+1}</td>
      <td class="num" style="color:${dday(x.eo.d)<=1?"#f0c948":"var(--muted)"};font-weight:700;">${fmtMD(x.eo.d)} (${WD[x.eo.d.getDay()]})${dday(x.eo.d)===0?" 오늘":""}</td>
      <td class="nm">${logo(x)}${ST.displayName(x.src,x.key)}</td>
      <td class="num" style="color:var(--dim);font-size:11px;">${x.e[0]}</td>
      <td style="color:var(--muted);font-size:11px;">${x.e[1]}</td>
      <td><span class="tchg" style="${x.eo.est?"background:#22303c;color:#9db9d4;":"background:#13322a;color:#4cd7a5;"}">${x.eo.est?"예상":"공시"}</span></td>
      <td class="num">${ST.capStr(x.e[8],x.us)}</td>
      <td><span class="tierb tier-${x.g.g}">${x.g.g}</span></td>
      <td><span class="vbadge ${x.imp==="High"?"i-hi":x.imp==="Medium"?"i-md":"i-lo"}">${x.imp}</span></td>
      <td class="num ${ST.cls(x.e[14]||0)}" style="font-weight:700;">${ST.pct(x.e[14])}</td>
    </tr>`).join("") || `<tr><td colspan="10" style="color:var(--dim);padding:18px;">해당 기간 발표 예정 종목이 없습니다</td></tr>`;
  document.getElementById("morebtn").style.display = p.length > SHOW ? "block" : "none";
}
document.getElementById("morebtn").addEventListener("click", () => { SHOW += 15; drawTbl(); });
drawBar(); drawTbl();

// ── 하단 3분할
(function(){
  const todays = CAL.filter(x=>dday(x.eo.d)===0).sort((a,b)=>b.e[8]*(b.us?13.5:1)-a.e[8]*(a.us?13.5:1)).slice(0,6);
  document.getElementById("todaylist").innerHTML = todays.length ? todays.map(x=>`
    <div class="evrow" style="cursor:pointer;" onclick="location.href='${ST.stockUrl(x.src,x.key)}'">
      <span class="dt">${x.us?"미국":"국내"}</span>
      <span class="tx"><b style="color:var(--text);">${ST.displayName(x.src,x.key)}</b> ${x.eo.est?"잠정실적 (예상)":"실적 발표"}</span>
      <span class="vbadge ${x.imp==="High"?"i-hi":x.imp==="Medium"?"i-md":"i-lo"}">${x.imp}</span></div>`).join("")
  : `<div style="font-size:12px;color:var(--dim);padding:10px 0;">오늘 발표 예정 종목이 없습니다</div>`;

  const mix = [];
  for (const x of CAL.filter(x=>x.imp==="High" && dday(x.eo.d)<=14).slice(0,4))
    mix.push([x.eo.d, `${ST.displayName(x.src,x.key)} 실적 발표${x.eo.est?" (예상)":""}`, "실적"]);
  for (const ev of ecoEv.filter(x=>dday(x.d)<=21).slice(0,4)) mix.push([ev.d, ev.flag+" "+ev.t, ev.type]);
  mix.sort((a,b)=>a[0]-b[0]);
  const tyStyle = t => t==="실적" ? "background:#3a1a22;color:#f0708a;" : t==="금리" ? "background:#3d3313;color:#f0c948;" : "background:#13303d;color:#4cc3d7;";
  document.getElementById("evcheck").innerHTML = mix.slice(0,6).map(([d,t,ty])=>`
    <div class="evrow"><span class="dt">${fmtMD(d)} (${WD[d.getDay()]})</span><span class="tx">${t}</span>
      <span class="tchg" style="${tyStyle(ty)}">${ty}</span></div>`).join("");

})();

// ── 사이드
(function(){
  const idx = clip(40 + weekN*0.8 + hiN*4 + ecoEv.filter(x=>dday(x.d)<=7).length*6);
  const gcol = idx>=70?"#f0645a":idx>=40?"#f0c948":"#4cd7a5";
  // 이번 주 발표 종목들의 평균 지표 (수급/모멘텀/펀더멘털/서프라이즈 가능성/리스크)
  const wk = CAL.filter(x=>dday(x.eo.d)<=7);
  const avg = f => wk.length ? clip(wk.reduce((s,x)=>s+f(x),0)/wk.length) : 50;
  const mSup = avg(x => (x.us || x.e[17]==null) ? 50 : clip(((x.e[17]>0?1:0)+(x.e[18]>0?1:0))*27+40));
  const mMom = avg(x => clip(50 + (x.e[14]||0)*3 + (x.e[15]||0)*1.2));
  const mFun = avg(x => clip(50 + (x.e[7]||0)*2.2));
  const mSur = avg(x => clip((x.e[9]>0 ? x.e[11]/x.e[9] : 1)*38 + 18));
  const mRsk = avg(x => ST.risk(x.e));
  const avgSc = avg(x => x.sc);
  const avgG = ST.gradeOf(avgSc).g;
  document.getElementById("eidx").innerHTML = `
    <div style="display:flex;gap:14px;align-items:center;">
      <div style="flex-shrink:0;">
        <div class="gauge" style="width:126px;height:68px;margin:0;"><div class="arc" style="width:126px;height:126px;background:conic-gradient(from 270deg, ${gcol} 0% ${idx/2}%, #ffffff14 ${idx/2}% 50%, transparent 50%);"></div>
          <div class="hole" style="left:17px;top:17px;width:92px;height:92px;"><b style="font-size:21px;margin-top:17px;">${idx}<small>/100</small></b></div></div>
        <div class="gsub" style="color:${gcol};margin-top:4px;"><span class="tierb tier-${avgG}" style="font-size:9.5px;margin-right:4px;">${avgG}</span>${idx>=70?"집중 · 과열":idx>=40?"주목":"한산"}</div>
      </div>
      <div style="flex:1;min-width:0;">
        ${[["수급",mSup],["모멘텀",mMom],["펀더멘털",mFun],["서프라이즈 가능성",mSur],["리스크",mRsk]].map(([lb,v])=>`
          <div style="display:flex;align-items:center;gap:7px;font-size:10.5px;color:var(--muted);font-weight:600;padding:3.5px 0;">
            <span style="width:84px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${lb}</span>
            <div style="flex:1;height:6px;background:var(--panel2);border:1px solid var(--border);border-radius:4px;overflow:hidden;"><i style="display:block;height:100%;width:${v}%;background:linear-gradient(90deg,${lb==="리스크"?"#8a5f1e,#e0a63e":"#0f7a56,#4cd7a5"});border-radius:4px;"></i></div>
            <b class="num" style="width:22px;text-align:right;color:var(--text);">${v}</b></div>`).join("")}
      </div>
    </div>
    <div style="font-size:10px;color:var(--dim);margin-top:8px;">이번 주 발표 종목 평균 · 한산 0~39 · 주목 40~69 · 집중 70~100</div>`;

  const t5 = CAL.filter(x=>dday(x.eo.d)<=7).sort((a,b)=>b.e[8]*(b.us?13.5:1)-a.e[8]*(a.us?13.5:1)).slice(0,5);
  document.getElementById("top5").innerHTML = t5.map((x,i)=>`
    <div class="nrow2" onclick="location.href='${ST.stockUrl(x.src,x.key)}'">
      <span class="rank">${i+1}</span><span class="tx">${ST.displayName(x.src,x.key)}</span>
      <span class="num" style="color:var(--dim);font-size:11px;">${fmtMD(x.eo.d)}</span>
      <span class="vbadge ${x.imp==="High"?"i-hi":x.imp==="Medium"?"i-md":"i-lo"}" style="font-size:9.5px;">${x.imp==="High"?"고영향":"중간"}</span></div>`).join("")
  || `<div style="font-size:12px;color:var(--dim);">이번 주 발표 없음</div>`;

  document.getElementById("crit").innerHTML = [["중요도(시총)",30],["임박도",25],["대형주 영향",20],["티어",15],["리스크",10]]
    .map(([lb,v])=>`<div class="gbar"><span class="lb2">${lb}</span><div class="m"><i style="width:${v*3}%"></i></div><b>${v}%</b></div>`).join("");

  // 다음 주 주요 종목 (D+8 ~ D+14, 시총 순) — 열 시작 위치 고정 정렬
  const nx = CAL.filter(x=>dday(x.eo.d)>=8 && dday(x.eo.d)<=14)
    .sort((a,b)=>b.e[8]*(b.us?13.5:1)-a.e[8]*(a.us?13.5:1)).slice(0,8);
  document.getElementById("nextwk").innerHTML = nx.length ? nx.map(x=>`
    <div class="nrow2" onclick="location.href='${ST.stockUrl(x.src,x.key)}'">
      <span class="tx">${logo(x)}${ST.displayName(x.src,x.key)}</span>
      <span class="num" style="color:var(--dim);font-size:11px;width:42px;text-align:right;flex-shrink:0;">${fmtMD(x.eo.d)}</span>
      <span style="width:36px;text-align:center;flex-shrink:0;"><span class="tchg" style="${x.eo.est?"background:#22303c;color:#9db9d4;":"background:#13322a;color:#4cd7a5;"}">${x.eo.est?"예상":"공시"}</span></span>
      <span style="width:56px;text-align:center;flex-shrink:0;"><span class="vbadge ${x.imp==="High"?"i-hi":x.imp==="Medium"?"i-md":"i-lo"}" style="font-size:9.5px;">${x.imp}</span></span></div>`).join("")
  : `<div style="font-size:12px;color:var(--dim);">다음 주 발표 예정 종목이 없습니다</div>`;

  // 어닝 이벤트 지수 산정 방식 팝업 (카드 클릭)
  const e7 = ecoEv.filter(x=>dday(x.d)<=7).length;
  window.openEidx = () => {
    const row = (k,v,pts) => `<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;padding:8px 2px;border-bottom:1px solid #ffffff0d;font-size:12px;"><span style="color:var(--muted);font-weight:600;">${k}</span><span class="num" style="font-weight:800;">${v}${pts!==undefined?` <span style="color:${pts>0?"#4cd7a5":"var(--dim)"};margin-left:8px;">+${Math.round(pts*10)/10}점</span>`:""}</span></div>`;
    document.getElementById("sm_title").innerHTML = `📈 어닝 이벤트 지수 산정 방식`;
    document.getElementById("sm_body").innerHTML =
      `<div style="font-size:11.5px;color:var(--muted);line-height:1.7;margin-bottom:10px;">이번 주 실적 시즌이 얼마나 뜨거운지를 나타내는 지수예요. <b style="color:var(--text);">기본 40점</b>에서 아래 항목을 더해 계산합니다.</div>`
      + row("기본 점수", "40")
      + row("이번 주 발표 종목 수 × 0.8", weekN + "개", weekN*0.8)
      + row("고영향(대형주) 발표 × 4", hiN + "개", hiN*4)
      + row("7일 내 경제 이벤트 × 6", e7 + "개", e7*6)
      + row("어닝 이벤트 지수 (0~100 제한)", `<b style="color:var(--gold);">${idx} / 100</b>`)
      + `<div style="font-size:11px;color:var(--muted);line-height:1.7;margin-top:10px;">오른쪽 5개 막대(수급·모멘텀·펀더멘털·서프라이즈 가능성·리스크)는 <b style="color:var(--text);">이번 주 발표 예정 종목들의 평균 지표</b>이고, 티어 배지는 그 평균 점수의 등급입니다.</div>`
      + `<div style="font-size:10.5px;color:var(--dim);margin-top:10px;border-top:1px solid var(--border);padding-top:9px;">※ 재미용 가공 지표로, 투자 판단의 근거가 될 수 없습니다.</div>`;
    document.getElementById("statmodal").style.display = "flex";
  };
})();
</script>
</body>
</html>
