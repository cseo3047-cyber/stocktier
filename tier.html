<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stocktier — 티어 랭킹</title>
<link rel="stylesheet" href="style.css">
<style>
  .wrap { max-width:1500px; }
  .layout { display:grid; grid-template-columns:1fr 300px; gap:14px; align-items:stretch; }
  @media (max-width:1150px){ .layout { grid-template-columns:1fr; } }
  .cards4 { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; margin-bottom:14px; }
  @media (max-width:900px){ .cards4 { grid-template-columns:repeat(2,minmax(0,1fr)); } }
  .scard { background:linear-gradient(135deg,#0d2e3b,#123f4b); border:1px solid var(--border); border-radius:14px; padding:15px; display:flex; gap:11px; align-items:center; min-width:0; }
  .scard .ic { width:44px; height:44px; border-radius:12px; background:#4cd7a51a; border:1px solid #4cd7a544; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .scard .l { flex:1; min-width:0; }
  .scard .lb { font-size:11.5px; color:var(--muted); font-weight:700; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .scard .vl { font-size:25px; font-weight:800; line-height:1.05; }
  .scard .vl small { font-size:13px; color:var(--dim); font-weight:600; }
  .scard .sub { font-size:10.5px; color:var(--dim); margin-top:3px; white-space:nowrap; }
  .scard svg.mini { flex-shrink:0; }
  .fbar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:11px; align-items:center; }
  .fchip { font-size:11.5px; padding:5px 13px; border-radius:8px; border:1px solid var(--border); color:var(--muted); cursor:pointer; font-weight:700; }
  .fchip.on { background:#13322a; color:#4cd7a5; border-color:#2e5c47; }
  .fbar select { background:var(--panel2); border:1px solid var(--border); color:var(--text); border-radius:7px; padding:5px 8px; font-size:11.5px; outline:none; }
  .stbl { width:100%; border-collapse:collapse; font-size:12px; }
  .stbl th { text-align:center; color:var(--dim); font-size:10.5px; font-weight:700; padding:7px 4px; border-bottom:1px solid var(--border); white-space:nowrap; }
  .stbl td { padding:8px 4px; border-bottom:1px solid #ffffff0d; text-align:center; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .stbl tr { cursor:pointer; }
  .stbl tr:hover td { background:var(--panel2); }
  .stbl td.nm { text-align:left; font-weight:700; max-width:170px; overflow:hidden; text-overflow:ellipsis; }
  .tchg { font-size:10px; font-weight:800; border-radius:5px; padding:1.5px 6px; }
  .vbadge { display:inline-flex; padding:2px 10px; border-radius:7px; font-size:10.5px; font-weight:800; }
  .b-pos { background:#13322a; color:#4cd7a5; } .b-sta { background:#22303c; color:#9db9d4; } .b-neg { background:#3a1a22; color:#f0708a; }
  .r-low { background:#13322a; color:#4cd7a5; } .r-med { background:#3d3313; color:#f0c948; } .r-high { background:#3a1a22; color:#f0708a; }
  .morebtn { display:block; margin:12px auto 0; background:var(--panel2); border:1px solid var(--border); color:var(--muted); border-radius:9px; padding:8px 26px; font-size:12px; font-weight:800; cursor:pointer; }
  .morebtn:hover { color:var(--gold); border-color:var(--gold-dim); }
  .row3b { display:grid; grid-template-columns:1fr 1fr 1.2fr; gap:14px; margin-top:14px; }
  @media (max-width:1000px){ .row3b { grid-template-columns:1fr; } }
  .rrow { display:flex; align-items:center; gap:9px; padding:8px 2px; border-bottom:1px solid #ffffff0d; font-size:12.5px; font-weight:700; cursor:pointer; }
  .rrow:last-child { border-bottom:none; }
  .rrow:hover { color:var(--gold); }
  .rrow .rank { width:19px; height:19px; border-radius:6px; background:var(--panel2); border:1px solid var(--border); color:var(--muted); font-size:10.5px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .hbar { display:flex; align-items:center; gap:9px; font-size:12px; color:var(--muted); font-weight:600; padding:5.5px 0; }
  .hbar .lb2 { width:82px; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .hbar .m { flex:1; height:7px; background:var(--panel2); border:1px solid var(--border); border-radius:4px; overflow:hidden; }
  .hbar .m i { display:block; height:100%; background:linear-gradient(90deg,#0f7a56,#4cd7a5); border-radius:4px; }
  .hbar b { width:22px; text-align:right; color:var(--text); }
  .bullets2 { font-size:12px; color:var(--muted); line-height:1.85; }
  .bullets2 li { list-style:none; padding-left:21px; position:relative; margin-bottom:6px; }
  .bullets2 li:before { content:"✓"; position:absolute; left:0; top:2px; width:14px; height:14px; border-radius:50%; background:#13322a; color:#4cd7a5; font-size:9px; font-weight:800; display:flex; align-items:center; justify-content:center; }
  .dwrap { display:flex; gap:14px; align-items:center; }
  .donut { width:112px; height:112px; border-radius:50%; position:relative; flex-shrink:0; }
  .donut .hole { position:absolute; inset:26px; background:var(--panel); border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .donut .hole b { font-size:14px; }
  .donut .hole small { font-size:9px; color:var(--dim); }
  .dlegend { flex:1; min-width:0; font-size:11.5px; }
  .dlegend .r { display:flex; align-items:center; gap:7px; padding:2.5px 0; color:var(--muted); }
  .dlegend .dot { width:9px; height:9px; border-radius:3px; flex-shrink:0; }
  .dlegend .lb { flex:1; }
  .dlegend b { color:var(--text); font-variant-numeric:tabular-nums; }
  .nrow2 { display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid #ffffff0d; font-size:12px; font-weight:700; cursor:pointer; }
  .nrow2:last-child { border-bottom:none; }
  .nrow2:hover { color:var(--gold); }
  .nrow2 .rank { width:18px; height:18px; border-radius:5px; background:#13322a; color:#4cd7a5; font-size:10px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .nrow2 .sub2 { color:var(--dim); font-size:10.5px; font-weight:500; flex-shrink:0; }
  .gbar { display:flex; align-items:center; gap:9px; font-size:12px; color:var(--muted); font-weight:600; padding:6px 0; }
  .gbar .lb2 { width:84px; flex-shrink:0; }
  .gbar .m { flex:1; height:7px; background:var(--panel2); border:1px solid var(--border); border-radius:4px; overflow:hidden; }
  .gbar .m i { display:block; height:100%; background:linear-gradient(90deg,#8a6f1e,#f0c948); border-radius:4px; }
  .gbar b { width:34px; text-align:right; color:var(--text); }
  .mag { position:absolute; right:10px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:15px; font-weight:700; pointer-events:none; }
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>
<div class="wrap">
  <span class="asof" id="asof"></span>
  <div class="page-title">티어 랭킹</div>
  <div class="page-sub">국내·미국 주요 종목을 종합 점수와 세부 항목별 티어로 확인하세요.</div>

  <div class="layout">
    <div>
      <div class="cards4" id="cards"></div>
      <div class="card"><h3>종합 티어 랭킹
        <span style="margin-left:auto;position:relative;flex-shrink:0;">
          <input id="tierq" placeholder="종목명 또는 코드 검색" autocomplete="off"
            style="width:230px;padding:8px 32px 8px 12px;font-size:12px;background:var(--panel2);border:1.5px solid var(--border);border-radius:9px;color:var(--text);outline:none;font-weight:500;">
          <span class="mag">⌕</span></span></h3>
        <div class="fbar" id="catbar"></div>
        <table class="stbl"><thead><tr><th>순위</th><th>종목명</th><th>종합 티어</th><th>종합점수</th><th>전망</th><th>등급 변화</th><th>수급</th><th>모멘텀</th><th>밸류</th><th>리스크</th></tr></thead>
        <tbody id="tbody"></tbody></table>
        <button class="morebtn" id="morebtn">더보기 ▾</button>
      </div>
      <div class="row3b">
        <div class="card"><h3>등급 상향 TOP 5</h3><div id="upgrades"></div></div>
        <div class="card"><h3>업종별 S티어 수</h3><div id="indbars"></div></div>
        <div class="card"><h3>오늘의 한줄 해설</h3><ul class="bullets2" id="notes"></ul></div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px;height:100%;">
      <div class="card"><h3>티어 분포</h3><div class="dwrap" id="dist"></div></div>
      <div class="card"><h3>오늘의 신규 S 티어</h3><div id="newS"></div></div>
      <div class="card" style="flex:1;"><h3>평가 기준</h3>
        <div id="crit"></div>
        <div style="font-size:10.5px;color:var(--dim);margin-top:10px;">Stocktier 종합 점수는 100점 기준으로 산출됩니다.</div>
      </div>
    </div>
  </div>

  <div class="footer"></div>
</div>

<script src="data.js"></script>
<script src="data_us.js"></script>
<script src="common.js"></script>
<script>
ST.nav("tier.html");
document.getElementById("asof").textContent = "업데이트: " + ST.asofText();
const clip = v => Math.max(0, Math.min(100, Math.round(v)));

const ALL = ST.all().map(x => {
  const e = x.e, us = x.src==="us";
  const sc = ST.score(e, us), rk = ST.risk(e);
  const supply = (!us && e.length>18 && e[17]!=null) ? ((e[17]>0?1:0)+(e[18]>0?1:0))*27+40 : 50;
  const momentum = clip(50 + (e[14]||0)*3 + (e[15]||0)*1.2);
  const value = e[4]>0 ? clip(100 - e[4]*(us?1.2:2)) : 30;
  const wins = e[12].filter(d=>d>0).length;
  const outlook = (wins>=4 || (e[14]||0)>5) ? ["Positive","b-pos"] : (wins<=1 ? ["Negative","b-neg"] : ["Stable","b-sta"]);
  const gNow = ST.gradeOf(sc), gPast = ST.gradeOf(clip(sc - (e[14]||0)*0.9));
  return { ...x, us, sc, rk, supply:clip(supply), momentum, value, outlook, gNow, gPast, up: gNow.min > gPast.min };
});

// ── 상단 카드 (아이콘 + 그라데이션 미니 그래프)
const listIcon = `<svg width="24" height="22" viewBox="0 0 22 20"><g stroke="#4cd7a5" stroke-width="2" stroke-linecap="round"><circle cx="2.5" cy="3" r="1.6" fill="#4cd7a5" stroke="none"/><line x1="7" y1="3" x2="20" y2="3"/><circle cx="2.5" cy="10" r="1.6" fill="#4cd7a5" stroke="none"/><line x1="7" y1="10" x2="20" y2="10"/><circle cx="2.5" cy="17" r="1.6" fill="#4cd7a5" stroke="none"/><line x1="7" y1="17" x2="20" y2="17"/></g></svg>`;
const shieldSIcon = `<svg width="25" height="25" viewBox="0 0 24 24"><path d="M12 2l8 3v6c0 4.8-3.4 8.4-8 11-4.6-2.6-8-6.2-8-11V5z" fill="none" stroke="#f0c948" stroke-width="1.8" stroke-linejoin="round"/><text x="12" y="15.5" text-anchor="middle" fill="#f0c948" font-size="9" font-weight="800">S</text></svg>`;
const trendIcon = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4cd7a5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l5-5 4 3 8-8M15 7h5v5"/></svg>`;
const warnIcon = `<svg width="25" height="23" viewBox="0 0 24 22" fill="none" stroke="#f0645a" stroke-width="1.8" stroke-linejoin="round"><path d="M12 2L22 20H2z"/><line x1="12" y1="9" x2="12" y2="14" stroke-linecap="round"/><circle cx="12" cy="17" r="1.2" fill="#f0645a" stroke="none"/></svg>`;
const miniLine = (id,c1,c2,seed) => { const pts=[]; let v=13;
  for (let i=0;i<13;i++){ v=Math.max(5,Math.min(29,v+((seed>>(i%9))%7)-2.6)); pts.push(`${(i*6.5).toFixed(1)},${(36-v).toFixed(1)}`); }
  return `<svg class="mini" width="80" height="36" viewBox="0 0 80 36"><defs>
    <linearGradient id="${id}" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/></linearGradient>
    <linearGradient id="${id}f" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${c2}" stop-opacity="0.35"/><stop offset="1" stop-color="${c2}" stop-opacity="0"/></linearGradient></defs>
    <polygon points="0,36 ${pts.join(" ")} 80,36" fill="url(#${id}f)"/>
    <polyline points="${pts.join(" ")}" fill="none" stroke="url(#${id})" stroke-width="2"/></svg>`; };
const miniBars = (id,c1,c2,seed) => { let b="";
  for (let i=0;i<8;i++){ const h=7+((seed*(i+3))%17); b+=`<rect x="${i*9.5}" y="${36-h}" width="6.5" height="${h}" rx="2" fill="url(#${id})"/>`; }
  return `<svg class="mini" width="78" height="36" viewBox="0 0 78 36"><defs><linearGradient id="${id}" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/></linearGradient></defs>${b}</svg>`; };
const logo = x => {
  const nv = `https://ssl.pstatic.net/imgstock/fn/real/logo/stock/Stock${x.us ? x.key+(x.e[1]==="NASDAQ"?".O":x.e[1]==="NYSE"?".N":".A") : x.e[0]}.svg`;
  const ts = x.us ? nv : "https://thumb.tossinvest.com/image/resized/96x0/" + encodeURIComponent("https://static.toss.im/png-icons/securities/icn-sec-fill-"+x.e[0]+".png");
  return `<img src="${ts}" style="width:19px;height:19px;border-radius:50%;background:#fff;flex-shrink:0;vertical-align:-4px;margin-right:6px;" loading="lazy"
    onerror="if(!this.dataset.f){this.dataset.f=1;this.src='${nv}';}else{this.style.visibility='hidden';}">`;
};

(function(){
  const sN = ALL.filter(x=>x.sc>=80).length;
  const upN = ALL.filter(x=>x.up).length;
  const wN = ALL.filter(x=>x.rk>=70).length;
  document.getElementById("cards").innerHTML = `
    <div class="scard"><span class="ic">${listIcon}</span><div class="l"><div class="lb">전체 커버 종목</div><div class="vl num">${ST.num(ALL.length)}<small> 개</small></div><div class="sub">국내 + 미국</div></div>${miniLine("tg1","#1d9e75","#4cd7a5",ALL.length%97+11)}</div>
    <div class="scard"><span class="ic" style="background:#f0c9481a;border-color:#c9a83255;">${shieldSIcon}</span><div class="l"><div class="lb">S 티어 종목</div><div class="vl num">${ST.num(sN)}<small> 개</small></div><div class="sub">종합점수 80 이상</div></div>${miniBars("tg2","#8a6f1e","#f0c948",sN%37+13)}</div>
    <div class="scard"><span class="ic">${trendIcon}</span><div class="l"><div class="lb">등급 상향 종목</div><div class="vl num">${ST.num(upN)}<small> 개</small></div><div class="sub">최근 1주 기준</div></div>${miniBars("tg3","#0f7a56","#4cd7a5",upN%41+7)}</div>
    <div class="scard"><span class="ic" style="background:#f0645a1a;border-color:#f0645a44;">${warnIcon}</span><div class="l"><div class="lb">위험 경고 종목</div><div class="vl num">${ST.num(wN)}<small> 개</small></div><div class="sub">과열 · 수급 이탈</div></div>${miniBars("tg4","#7a2822","#f0645a",wN%43+9)}</div>`;
})();

// ── 필터 + 랭킹 테이블
let CAT = "all", SORT = "sc", MKT = "all", SHOW = 30, Q = "";
const CATS = [["all","전체"],["big","대형주"],["mid","중형주"],["grow","성장주"],["div","배당주"],["value","가치주"],["theme","테마주"]];
const catFn = {
  all: x => true,
  big: x => x.e[8] >= (x.us?1000:100000),
  mid: x => x.e[8] >= (x.us?100:10000) && x.e[8] < (x.us?1000:100000),
  grow: x => (x.e[16]||0) >= 15 || (x.e[7] >= 15 && x.e[4] > 20),
  div: x => x.e[6] >= (x.us?2:3),
  value: x => x.e[4] > 0 && x.e[4] < (x.us?15:10) && x.e[5] > 0 && x.e[5] < (x.us?3:1.2),
  theme: x => !!(x.e.length>21 && x.e[21]),
};
function pool(){
  if (Q) {
    const qU = Q.toUpperCase();
    return ALL.filter(x => ST.displayName(x.src,x.key).includes(Q) ||
      String(x.key).toUpperCase().includes(qU) || String(x.e[0]).includes(Q))
      .sort((a,b)=>b.sc-a.sc);
  }
  let p = ALL.filter(catFn[CAT]);
  if (MKT==="us") p = p.filter(x=>x.us);
  else if (MKT!=="all") p = p.filter(x=>x.e[1]===MKT);
  p.sort((a,b)=> SORT==="sc" ? b.sc-a.sc : SORT==="chg" ? b.e[3]-a.e[3] : SORT==="cap" ? b.e[8]-a.e[8] : a.rk-b.rk);
  return p;
}
function drawBar(){
  document.getElementById("catbar").innerHTML =
    CATS.map(([k,t])=>`<span class="fchip ${CAT===k?"on":""}" onclick="setCat('${k}')">${t}</span>`).join("") +
    `<span style="margin-left:auto;display:flex;gap:6px;align-items:center;">
      ${[["all","전체"],["KOSPI","코스피"],["KOSDAQ","코스닥"],["us","미국"]].map(([k,t])=>
        `<span class="fchip ${MKT===k?"on":""}" onclick="setMkt('${k}')">${t}</span>`).join("")}
      <span style="font-size:11px;color:var(--dim);display:flex;gap:6px;align-items:center;margin-left:6px;">정렬
      <select onchange="setSort(this.value)">
        <option value="sc" ${SORT==="sc"?"selected":""}>종합점수</option>
        <option value="chg" ${SORT==="chg"?"selected":""}>당일 등락</option>
        <option value="cap" ${SORT==="cap"?"selected":""}>시가총액</option>
        <option value="rk" ${SORT==="rk"?"selected":""}>안정성</option></select></span></span>`;
}
window.setCat = k => { CAT = k; SHOW = 30; drawBar(); drawTbl(); };
window.setSort = v => { SORT = v; SHOW = 30; drawTbl(); };
window.setMkt = v => { MKT = v; SHOW = 30; drawBar(); drawTbl(); };
document.getElementById("tierq").addEventListener("input", e => { Q = e.target.value.trim(); SHOW = 30; drawTbl(); });
function drawTbl(){
  const p = pool();
  document.getElementById("tbody").innerHTML = p.slice(0,SHOW).map((x,i)=>`
    <tr onclick="location.href='${ST.stockUrl(x.src,x.key)}'">
      <td class="num" style="color:var(--muted);">${i+1}</td>
      <td class="nm">${logo(x)}${ST.displayName(x.src,x.key)}</td>
      <td><span class="tierb tier-${x.gNow.g}">${x.gNow.g}</span></td>
      <td class="num" style="font-weight:800;">${x.sc}</td>
      <td><span class="vbadge ${x.outlook[1]}">${x.outlook[0]}</span></td>
      <td>${x.gPast.g!==x.gNow.g
        ? `<span class="tchg" style="background:#22303c;color:#9db9d4;">${x.gPast.g}</span> <span style="color:var(--dim);">→</span> <span class="tchg" style="background:#3d3313;color:#f0c948;">${x.gNow.g}</span>`
        : `<span style="color:var(--dim);font-size:11px;">유지</span>`}</td>
      <td class="num">${x.supply}</td>
      <td class="num">${x.momentum}</td>
      <td class="num">${x.value}</td>
      <td><span class="vbadge ${x.rk<40?"r-low":x.rk<70?"r-med":"r-high"}">${x.rk<40?"Low":x.rk<70?"Medium":"High"}</span></td>
    </tr>`).join("");
  document.getElementById("morebtn").style.display = p.length > SHOW ? "block" : "none";
}
document.getElementById("morebtn").addEventListener("click", () => { SHOW += 30; drawTbl(); });
drawBar(); drawTbl();

// ── 하단 3분할
(function(){
  const kr = ALL.filter(x=>!x.us);
  const ups = kr.filter(x=>x.up).sort((a,b)=>b.sc-a.sc).slice(0,5);
  document.getElementById("upgrades").innerHTML = ups.length ? ups.map((x,i)=>`
    <div class="rrow" onclick="location.href='${ST.stockUrl(x.src,x.key)}'">
      <span class="rank">${i+1}</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${x.key}</span>
      <span class="tchg" style="background:#22303c;color:#9db9d4;">${x.gPast.g}</span><span style="color:var(--dim);">→</span><span class="tchg" style="background:#3d3313;color:#f0c948;">${x.gNow.g}</span>
      <span class="num up" style="font-size:11.5px;">▲${Math.max(1,Math.round((x.e[14]||0)*0.9))}점</span></div>`).join("")
  : `<div style="font-size:12px;color:var(--dim);padding:10px 0;">오늘 등급 상향 종목이 없습니다</div>`;

  const ind = {};
  for (const x of kr) if (x.sc>=80 && x.e.length>20 && x.e[20]) ind[x.e[20]] = (ind[x.e[20]]||0)+1;
  const inds = Object.entries(ind).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const mx = inds.length ? inds[0][1] : 1;
  document.getElementById("indbars").innerHTML = inds.length ? inds.map(([nm,c])=>`
    <div class="hbar"><span class="lb2">${nm}</span><div class="m"><i style="width:${Math.max(8,c/mx*100)}%"></i></div><b>${c}</b></div>`).join("")
  : `<div style="font-size:12px;color:var(--dim);padding:10px 0;">업종 데이터 수집 후 표시됩니다</div>`;

  const sTop = kr.filter(x=>x.sc>=80).sort((a,b)=>b.sc-a.sc);
  const notes = [];
  if (inds.length) notes.push(`${inds.slice(0,2).map(x2=>x2[0]).join("·")} 중심으로 상위 티어 집중`);
  if (sTop.length) notes.push(`${sTop[0].key} 종합점수 ${sTop[0].sc}점으로 전체 1위`);
  notes.push(`외국인 순매수 상위 종목의 지표 개선 흐름`);
  notes.push(`밸류 매력은 ${kr.filter(x=>x.value>=60).length}개 종목에서 상대적으로 우수`);
  notes.push("단기 과열 종목은 리스크 지표 점검 필요");
  document.getElementById("notes").innerHTML = notes.slice(0,5).map(n=>`<li>${n}</li>`).join("");
})();

// ── 사이드: 티어 분포 도넛
(function(){
  const cnt = {S:0,A:0,B:0,C:0,D:0};
  for (const x of ALL) cnt[x.gNow.g]++;
  const cols = {S:"#f0c948",A:"#4cc3d7",B:"#4cd7a5",C:"#8fa5ad",D:"#d6564a"};
  let acc = 0; const segs = [];
  const legend = Object.keys(cnt).map(k=>{
    const p = cnt[k]/ALL.length*100;
    segs.push(`${cols[k]} ${acc}% ${acc+p}%`); acc += p;
    return `<div class="r"><span class="dot" style="background:${cols[k]};"></span><span class="lb">${k} 티어</span><b>${p.toFixed(1)}%</b><span style="color:var(--dim);font-size:10.5px;">(${ST.num(cnt[k])})</span></div>`;
  }).join("");
  document.getElementById("dist").innerHTML = `
    <div class="donut" style="background:conic-gradient(${segs.join(",")});"><div class="hole"><small>총</small><b class="num">${ST.num(ALL.length)}개</b></div></div>
    <div class="dlegend">${legend}</div>`;
})();

// ── 사이드: 오늘의 신규 S 티어
(function(){
  const list = ALL.filter(x=>!x.us && x.gNow.g==="S" && x.gPast.g!=="S").sort((a,b)=>b.sc-a.sc).slice(0,5);
  document.getElementById("newS").innerHTML = list.length ? list.map((x,i)=>`
    <div class="nrow2" onclick="location.href='${ST.stockUrl(x.src,x.key)}'">
      <span class="rank">${i+1}</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${x.key}</span>
      <span class="tchg" style="background:#22303c;color:#9db9d4;">${x.gPast.g}</span><span style="color:var(--dim);">→</span><span class="tchg" style="background:#3d3313;color:#f0c948;">S</span>
      <span class="sub2">${x.momentum>=70?"모멘텀 강화":x.supply>=70?"수급 급증":"지표 개선"}</span></div>`).join("")
  : `<div style="font-size:12px;color:var(--dim);padding:8px 0;">오늘 신규 S 티어가 없습니다</div>`;
})();

// ── 사이드: 평가 기준
document.getElementById("crit").innerHTML = [["수급",25],["모멘텀",25],["펀더멘털",20],["밸류에이션",15],["리스크",15]]
  .map(([lb,v])=>`<div class="gbar"><span class="lb2">${lb}</span><div class="m"><i style="width:${v*3.2}%"></i></div><b>${v}%</b></div>`).join("");
</script>
