<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stocktier — 종목 상세</title>
<link rel="stylesheet" href="style.css">
<style>
  .wrap { max-width:1500px; }
  .layout { display:grid; grid-template-columns:1fr 300px; gap:14px; align-items:stretch; }
  @media (max-width:1150px){ .layout { grid-template-columns:1fr; } }
  .titlerow { display:flex; align-items:flex-start; gap:12px; flex-wrap:wrap; }
  .titlerow .btn3 { background:transparent; color:var(--muted); border:1px solid var(--border); border-radius:9px; padding:8px 16px; font-size:12px; font-weight:800; cursor:pointer; text-decoration:none; }
  .titlerow .btn3:hover { color:var(--gold); border-color:var(--gold-dim); }
  /* 상단 카드 */
  .cards4 { display:grid; grid-template-columns:1.75fr 1.05fr 1.05fr 0.8fr; gap:12px; margin-bottom:14px; }
  @media (max-width:1000px){ .cards4 { grid-template-columns:repeat(2,minmax(0,1fr)); } }
  .scard { background:linear-gradient(135deg,#0d2e3b,#123f4b); border:1px solid var(--border); border-radius:14px; padding:14px 16px; min-width:0; display:flex; flex-direction:column; }
  .scard .hd { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); font-weight:700; margin-bottom:9px; }
  .scard .hd .hic { width:26px; height:26px; border-radius:8px; background:#4cd7a51a; border:1px solid #4cd7a544; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .chips2 { display:flex; gap:4px; }
  .chips2 .chip { font-size:10px; padding:3px 8px; border-radius:7px; border:1px solid var(--border); color:var(--muted); cursor:pointer; font-weight:700; }
  .chips2 .chip.on { background:#13322a; color:#4cd7a5; border-color:#2e5c47; }
  /* 상세 정보 표 */
  .dgrid { display:grid; grid-template-columns:1fr 1fr; gap:0 34px; }
  @media (max-width:800px){ .dgrid { grid-template-columns:1fr; } }
  .irow { display:flex; align-items:center; gap:10px; padding:7.5px 2px; border-bottom:1px solid #ffffff0d; font-size:12.5px; }
  .irow .lb { width:118px; color:var(--muted); font-weight:600; flex-shrink:0; }
  .irow .m { flex:1; height:7px; background:var(--panel2); border:1px solid var(--border); border-radius:4px; overflow:hidden; }
  .irow .m i { display:block; height:100%; background:linear-gradient(90deg,#0f7a56,#4cd7a5); border-radius:4px; }
  .irow .m i.gold { background:linear-gradient(90deg,#8a6f1e,#f0c948); }
  .irow .m i.amber { background:linear-gradient(90deg,#8a5f1e,#e0a63e); }
  .irow .vv { min-width:66px; text-align:right; font-weight:800; font-variant-numeric:tabular-nums; }
  .irow.plain { justify-content:space-between; }
  .irow.plain .vv { flex:0; white-space:nowrap; }
  /* 사이드 */
  .ring { width:132px; height:132px; border-radius:50%; position:relative; margin:4px auto 8px; }
  .ring .hole { position:absolute; inset:13px; background:var(--panel); border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .ring .hole b { font-size:30px; line-height:1; }
  .ring .hole small { font-size:11px; color:var(--dim); font-weight:600; margin-top:2px; }
  .gsub { text-align:center; font-size:12.5px; font-weight:800; margin-bottom:10px; }
  .sbars .r { display:flex; align-items:center; gap:8px; font-size:11.5px; padding:3.5px 0; color:var(--muted); }
  .sbars .r .lb { width:66px; flex-shrink:0; white-space:nowrap; }
  .sbars .m { flex:1; height:6px; background:var(--panel2); border:1px solid var(--border); border-radius:4px; overflow:hidden; }
  .sbars .m i { display:block; height:100%; background:linear-gradient(90deg,#0f7a56,#4cd7a5); border-radius:4px; }
  .sbars .m i.warn { background:linear-gradient(90deg,#8a6f1e,#f0c948); }
  .sbars .r b { width:26px; text-align:right; color:var(--text); }
  .alrow { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); font-weight:600; padding:7px 0; border-bottom:1px solid #ffffff0d; line-height:1.5; }
  .alrow:last-child { border-bottom:none; }
  .alrow .tx { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .alrow .ar { font-weight:900; flex-shrink:0; width:16px; text-align:center; }
  .tchips { display:flex; flex-wrap:wrap; gap:7px; }
  .tchip { background:#13322a; color:#4cd7a5; border:1px solid #2e5c47; border-radius:8px; padding:5px 11px; font-size:11.5px; font-weight:800; }
  .tchip.gold { background:#3d3313; color:#f0c948; border-color:#c9a83266; }
  /* 하단 4카드 */
  .row4b { display:grid; grid-template-columns:1.5fr 1fr 1.1fr 1.1fr; gap:14px; margin-top:14px; }
  @media (max-width:1150px){ .row4b { grid-template-columns:repeat(2,minmax(0,1fr)); } }
  @media (max-width:700px){ .row4b { grid-template-columns:1fr; } }
  .row3c { display:grid; grid-template-columns:1fr 1.3fr 1.3fr; gap:14px; margin-top:14px; }
  @media (max-width:1000px){ .row3c { grid-template-columns:1fr; } }
  .pchart svg { width:100%; height:200px; display:block; }
  .histrow { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
  .quote { font-size:13px; font-weight:700; line-height:1.75; color:var(--text); }
  .quote:before { content:"“ "; color:var(--gold); font-weight:800; }
  .quote:after { content:" ”"; color:var(--gold); font-weight:800; }
  .bullets2 { font-size:12px; color:var(--muted); line-height:1.8; margin-top:10px; }
  .bullets2 li { list-style:none; padding-left:21px; position:relative; margin-bottom:6px; }
  .bullets2 li:before { content:"✓"; position:absolute; left:0; top:2px; width:14px; height:14px; border-radius:50%; background:#13322a; color:#4cd7a5; font-size:9px; font-weight:800; display:flex; align-items:center; justify-content:center; }
  .nrow { display:block; padding:7px 0; border-bottom:1px solid #ffffff0d; font-size:12px; color:var(--text); font-weight:600; line-height:1.45; }
  .nrow:last-child { border-bottom:none; }
  .nrow .tm { color:var(--dim); font-size:10.5px; font-weight:500; }
  .nrow:hover { color:var(--gold); }
  .evrow { display:flex; align-items:center; gap:9px; font-size:12px; color:var(--muted); font-weight:600; padding:7.5px 0; border-bottom:1px solid #ffffff0d; }
  .evrow:last-child { border-bottom:none; }
  .evrow .dt { width:86px; flex-shrink:0; font-variant-numeric:tabular-nums; color:var(--dim); font-size:11px; }
  .evrow .tx { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .riskchip { display:flex; align-items:center; gap:8px; background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:9px 12px; font-size:12px; font-weight:700; color:var(--muted); }
  .rcb { margin-left:auto; font-size:10.5px; font-weight:800; border-radius:6px; padding:2px 9px; }
  .vbadge { display:inline-flex; padding:2px 10px; border-radius:7px; font-size:11px; font-weight:800; }
  .b-pos { background:#13322a; color:#4cd7a5; } .b-sta { background:#22303c; color:#9db9d4; } .b-neg { background:#3a1a22; color:#f0708a; }
  .lmhead { display:flex; align-items:center; gap:8px; font-size:10.5px; color:var(--dim); font-weight:700; padding:0 2px 7px; border-bottom:1px solid var(--border); }
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>
<div class="wrap">
  <div class="titlerow">
    <div style="flex:1;min-width:220px;">
      <div class="page-title">종목 상세</div>
      <div class="page-sub">선택한 종목의 티어, 수급, 밸류, 리스크 지표를 한눈에 확인하세요.</div>
    </div>
    <span class="asof" id="asof" style="margin-top:6px;"></span>
    <button class="btn3" id="watchbtn" onclick="toggleWatch()">☆ 관심종목</button>
    <a class="btn3" id="cmpbtn" href="#">⚔ 비교</a>
  </div>
  <div id="body"></div>
  <div class="footer"></div>
</div>

<script src="data.js"></script>
<script src="data_us.js"></script>
<script src="common.js"></script>
<script>
ST.nav("");
document.getElementById("asof").textContent = "업데이트: " + ST.asofText();
const src = ST.qp("src") || "kr", key = ST.qp("k") || "";
const s = ST.get(src, key);
const box = document.getElementById("body");

if (!s) {
  box.innerHTML = `<div class="card" style="text-align:center;padding:50px;">
    <div style="font-size:18px;font-weight:700;margin-bottom:8px;">종목을 찾을 수 없습니다</div>
    <div style="font-size:13px;color:var(--muted);">상단 검색창에서 다시 검색해보세요.</div></div>`;
  document.getElementById("watchbtn").style.display = "none";
  document.getElementById("cmpbtn").style.display = "none";
} else {
  const us = src==="us";
  const [code, mkt, price, chg, per, pbr, div, roe, cap, vol3m, volPrev, volToday, days, forn, r1w, r1m, r3m] = s;
  const sc = ST.score(s, us), g = ST.gradeOf(sc), rk = ST.risk(s);
  const name = ST.displayName(src, key);
  document.title = "Stocktier — " + name;
  document.getElementById("cmpbtn").href = `compare.html?a=${src}:${encodeURIComponent(key)}`;
  const clip = v => Math.max(0, Math.min(100, Math.round(v)));
  const wonN = v => Math.round(v).toLocaleString("ko-KR");

  // 지표
  const supply = (!us && s.length>18 && s[17]!=null) ? clip(((s[17]>0?1:0)+(s[18]>0?1:0))*27+40) : 50;
  const momentum = clip(50 + (r1w||0)*3 + (r1m||0)*1.2);
  const value = per>0 ? clip(100 - per*(us?1.2:2)) : 30;
  const funda = clip(50 + roe*2.2);
  const wins = days.filter(d=>d>0).length;
  const outlook = (wins>=4 || (r1w||0)>5) ? ["Positive","b-pos"] : (wins<=1 ? ["Negative","b-neg"] : ["Stable","b-sta"]);
  const surge = vol3m>0 ? volToday/vol3m : 0;
  const vol5 = days.reduce((a,b)=>a+Math.abs(b),0)/5;
  const amt = price*volToday;
  const amtStr = us ? (amt>=1e9?"$"+(amt/1e9).toFixed(1)+"B":"$"+(amt/1e6).toFixed(0)+"M")
                    : (amt>=1e12?(amt/1e12).toFixed(2)+"조":wonN(amt/1e8)+"억");

  // 장기 시세
  const spkI = us ? 18 : 19;
  const spk = (s.length>spkI && s[spkI] && s[spkI].length>25 && s[spkI][s[spkI].length-1]===1000) ? s[spkI] : null;
  const retBack = back => { if (!spk || spk.length<=back) return null;
    const v = spk[spk.length-1-back]; return v ? +((1000/v-1)*100).toFixed(1) : null; };
  const r6m = retBack(10), r1y = retBack(20);
  let hi52 = null, lo52 = null;
  if (spk) { const w = spk.slice(-20).concat([1000]);
    hi52 = Math.max(...w)*price/1000; lo52 = Math.min(...w)*price/1000; }

  // 5일 등락 → 일별 가격 경로
  const dayPath = (() => { const seq = days.slice().reverse(); let v = price/(1+days.reduce((a,b)=>a+b/100*0,0));
    v = price; const pts=[price];
    for (const d of days) pts.unshift(pts[0]/(1+d/100));
    return pts; })();

  // 실적 일정 (실데이터 우선 · 국내 예상 폴백)
  const EARN = us ? (window.STOCK_MARKET_US && window.STOCK_MARKET_US.earn) : (window.STOCK_MARKET && window.STOCK_MARKET.earn);
  const today0 = new Date(); today0.setHours(0,0,0,0);
  let earnD = null, earnEst = false;
  { const v = EARN && EARN[us ? key : code];
    if (v) { const t = String(v);
      const d = t.length>=8 ? new Date(+t.slice(0,4), +t.slice(4,6)-1, +t.slice(6,8)) : new Date(today0.getFullYear(), +t.slice(0,2)-1, +t.slice(2,4));
      if (d >= today0) earnD = d; }
    if (!earnD && !us) {
      let h = 7; for (const c of String(code)) h = (h*31 + c.charCodeAt(0)) >>> 0;
      const dl = [[3,31],[5,15],[8,14],[11,16]];
      for (let k2=0; k2<9 && !earnD; k2++){
        const d = new Date(today0.getFullYear()+Math.floor(k2/4), dl[k2%4][0]-1, dl[k2%4][1]);
        d.setDate(d.getDate()-(h%16));
        if (d >= today0) { earnD = d; earnEst = true; }
      }
    } }
  const dd = d => Math.round((d-today0)/864e5);
  const fmtMD = d => `${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`;
  const fmtYMD = d => `${d.getFullYear()}.${fmtMD(d).replace("/",".")}`;

  // 로고
  const nvUrl = `https://ssl.pstatic.net/imgstock/fn/real/logo/stock/Stock${us ? key+(mkt==="NASDAQ"?".O":mkt==="NYSE"?".N":".A") : code}.svg`;
  const tsUrl = us ? nvUrl : "https://thumb.tossinvest.com/image/resized/96x0/" + encodeURIComponent("https://static.toss.im/png-icons/securities/icn-sec-fill-"+code+".png");
  const logoBig = `<img src="${tsUrl}" style="width:46px;height:46px;border-radius:50%;background:#fff;flex-shrink:0;" loading="lazy"
    onerror="if(!this.dataset.f){this.dataset.f=1;this.src='${nvUrl}';}else{this.style.visibility='hidden';}">`;

  // 아이콘 (시안과 동일 계열 SVG)
  const shieldIcon = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#4cd7a5" stroke-width="2" stroke-linejoin="round"><path d="M12 2l8 3v6c0 4.8-3.4 8.4-8 11-4.6-2.6-8-6.2-8-11V5z"/></svg>`;
  const trendIcon = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#4cd7a5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l5-5 4 3 8-8M15 7h5v5"/></svg>`;
  const calIcon = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#4cd7a5" stroke-width="2" stroke-linecap="round"><rect x="3" y="5" width="18" height="16" rx="3"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2.5" x2="8" y2="6.5"/><line x1="16" y1="2.5" x2="16" y2="6.5"/></svg>`;

  // 그라데이션 미니/영역 차트
  function areaChart(id, pts, W, H, col, padB, labels){
    if (!pts || pts.length<2) return "";
    const padL = labels ? 8 : 4, padR = 8, padT = 8;
    const mn = Math.min(...pts), mx = Math.max(...pts), rg = (mx-mn)||1;
    const X = i => padL + i/(pts.length-1)*(W-padL-padR);
    const Y = v => padT + (1-(v-mn)/rg)*(H-padT-padB);
    const xy = pts.map((p,i)=>`${X(i).toFixed(1)},${Y(p).toFixed(1)}`);
    return `<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block;">
      <defs><linearGradient id="${id}f" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${col}" stop-opacity="0.32"/><stop offset="1" stop-color="${col}" stop-opacity="0"/></linearGradient>
      <linearGradient id="${id}l" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#0f7a56"/><stop offset="1" stop-color="${col}"/></linearGradient></defs>
      <polygon points="${padL},${H-padB} ${xy.join(" ")} ${W-padR},${H-padB}" fill="url(#${id}f)"/>
      <polyline points="${xy.join(" ")}" fill="none" stroke="url(#${id}l)" stroke-width="2"/>
      <circle cx="${X(pts.length-1)}" cy="${Y(pts[pts.length-1])}" r="3" fill="${col}" stroke="#10231c" stroke-width="1.2"/></svg>`;
  }
  const miniBars = (id,c1,c2,seed,n) => { let b=""; n=n||8;
    for (let i=0;i<n;i++){ const h=7+((seed*(i+3))%17); b+=`<rect x="${i*9.5}" y="${34-h}" width="6.5" height="${h}" rx="2" fill="url(#${id})"/>`; }
    return `<svg width="${n*9.5}" height="34" viewBox="0 0 ${n*9.5} 34"><defs><linearGradient id="${id}" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/></linearGradient></defs>${b}</svg>`; };

  // 티어 변화 (1개월 근사)
  const gPast = ST.gradeOf(clip(sc - (r1m||0)*0.35));

  // ══ 상단 카드 4 + 사이드 ══
  const upCol = chg>=0 ? "#4cd7a5" : "#f0645a";
  const priceCard = `
  <div class="scard">
    <div style="display:flex;align-items:center;gap:11px;">
      ${logoBig}
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:baseline;gap:7px;"><b style="font-size:16px;">${name}</b><span style="color:var(--dim);font-size:11px;">${code}</span><span class="tchg" style="font-size:9.5px;background:var(--panel2);border:1px solid var(--border);border-radius:5px;padding:1px 6px;color:var(--muted);">${mkt}</span></div>
        <div style="display:flex;align-items:baseline;gap:9px;margin-top:5px;">
          <span class="num" style="font-size:25px;font-weight:800;">${ST.priceStr(price,us)}</span>
          <span class="num" style="font-size:13px;font-weight:800;color:${upCol};">${chg>0?"▲":chg<0?"▼":"—"} ${ST.pct2(chg)}</span>
        </div>
        <div class="num" style="font-size:10.5px;color:var(--dim);margin-top:4px;">거래량 ${ST.num(volToday)}주 · 거래대금 ${amtStr}</div>
      </div>
      <div style="width:44%;min-width:150px;flex-shrink:0;">
        <div class="chips2" id="tchips" style="justify-content:flex-end;margin-bottom:4px;"></div>
        <div id="topchart"></div>
      </div>
    </div>
  </div>`;

  const tierDesc = sc>=85 ? "전망 안정적 · 강한 모멘텀 유지<br>수급 우위 · 밸류에이션 매력 상위"
    : sc>=65 ? "지표 균형이 좋은 우량 티어<br>안정적 흐름 유지 중"
    : sc>=45 ? "중위권 티어 · 모멘텀에 따라<br>등락 여지가 있는 구간"
    : "하위 티어 · 지표 개선 확인 후<br>접근이 필요한 구간";
  const tierCard = `
  <div class="scard">
    <div class="hd"><span class="hic">${shieldIcon}</span>종합 티어</div>
    <div style="display:flex;align-items:center;gap:9px;">
      <span style="font-size:24px;font-weight:800;color:#f0c948;">${g.g} <span style="font-size:14px;">티어</span></span>
      <span class="vbadge ${outlook[1]}">${outlook[0]}</span></div>
    <div style="font-size:11px;color:var(--muted);line-height:1.75;margin-top:9px;">${tierDesc}</div>
  </div>`;

  const tierBars = miniBars("tb1", chg>=0?"#0f7a56":"#7a2822", chg>=0?"#4cd7a5":"#f0645a", Math.abs(Math.round((r1m||1)*7))+11, 9);
  const chgCard = `
  <div class="scard">
    <div class="hd"><span class="hic">${trendIcon}</span>최근 티어 변화</div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="font-size:23px;font-weight:800;white-space:nowrap;"><span style="color:#66c6e8;">${gPast.g}</span> <span style="color:var(--dim);font-size:16px;">→</span> <span style="color:#f0c948;">${g.g}</span></span>
      ${tierBars}</div>
    <div style="font-size:10.5px;color:var(--dim);margin-top:9px;">${gPast.g===g.g?"최근 1개월 티어 변화 없음":"최근 1개월 점수 변화 기준"}</div>
  </div>`;

  const earnCard = `
  <div class="scard">
    <div class="hd"><span class="hic">${calIcon}</span>실적 ${earnD&&dd(earnD)<=7?"임박":"발표"}</div>
    ${earnD ? `<div class="num" style="font-size:30px;font-weight:800;color:${dd(earnD)<=7?"#f0c948":"var(--text)"};line-height:1;">D-${dd(earnD)}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:9px;">${fmtYMD(earnD)}<br>실적 발표 (${earnEst?"예상":"예정"})</div>`
    : `<div style="font-size:30px;font-weight:800;color:var(--dim);line-height:1;">-</div>
      <div style="font-size:11px;color:var(--dim);margin-top:9px;">공시 데이터<br>수집 대기</div>`}
  </div>`;

  // 사이드: 종합 평점 (원형 링)
  const gcol = sc>=65?"#4cd7a5":sc>=45?"#f0c948":"#f0645a";

      ${grid}${xlab}
      <polygon points="${padL},${H-padB} ${xy.join(" ")} ${W-padR},${H-padB}" fill="url(#pg)"/>
