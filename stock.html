<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stocktier — 종목 상세</title>
<link rel="stylesheet" href="style.css">
<style>
  .wrap { max-width:1500px; }
  .layout { display:grid; grid-template-columns:1fr 300px; gap:14px; align-items:stretch; }
  @media (max-width:1150px){ .layout { grid-template-columns:1fr; } }
  .titlerow { display:flex; align-items:flex-start; gap:12px; flex-wrap:wrap; }
  .titlerow .btn3 { background:transparent; color:var(--muted); border:1px solid var(--border); border-radius:9px; padding:8px 16px; font-size:12px; font-weight:800; cursor:pointer; text-decoration:none; }
  .titlerow .btn3:hover { color:var(--gold); border-color:var(--gold-dim); }
  /* 상단 카드 */
  .cards3 { display:grid; grid-template-columns:2.35fr 1fr 0.72fr; gap:12px; margin-bottom:14px; }
  @media (max-width:1000px){ .cards3 { grid-template-columns:1fr; } }
  .scard { background:linear-gradient(135deg,#0d2e3b,#123f4b); border:1px solid var(--border); border-radius:14px; padding:14px 16px; min-width:0; display:flex; flex-direction:column; }
  .scard .hd { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); font-weight:700; margin-bottom:9px; }
  .scard .hd .hic { width:26px; height:26px; border-radius:8px; background:#4cd7a51a; border:1px solid #4cd7a544; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .chips2 { display:flex; gap:4px; flex-wrap:wrap; }
  .chips2 .chip { font-size:10px; padding:3px 9px; border-radius:7px; border:1px solid var(--border); color:var(--muted); cursor:pointer; font-weight:700; }
  .chips2 .chip.on { background:#13322a; color:#4cd7a5; border-color:#2e5c47; }
  /* 중단: 상세 + 알림 */
  .midgrid { display:grid; grid-template-columns:1fr 258px; gap:14px; align-items:stretch; }
  @media (max-width:900px){ .midgrid { grid-template-columns:1fr; } }
  .dgrid { display:grid; grid-template-columns:1.1fr 0.9fr; gap:0 26px; }
  @media (max-width:800px){ .dgrid { grid-template-columns:1fr; } }
  .irow { display:flex; align-items:center; gap:10px; padding:7.5px 2px; border-bottom:1px solid #ffffff0d; font-size:12.5px; }
  .irow .lb { width:134px; color:var(--muted); font-weight:600; flex-shrink:0; white-space:nowrap; }
  .irow .m { flex:1; height:7px; background:var(--panel2); border:1px solid var(--border); border-radius:4px; overflow:hidden; }
  .irow .m i { display:block; height:100%; background:linear-gradient(90deg,#0f7a56,#4cd7a5); border-radius:4px; }
  .irow .m i.gold { background:linear-gradient(90deg,#8a6f1e,#f0c948); }
  .irow .m i.amber { background:linear-gradient(90deg,#8a5f1e,#e0a63e); }
  .irow .vv { min-width:56px; text-align:right; font-weight:800; font-variant-numeric:tabular-nums; }
  .irow.plain { justify-content:space-between; }
  .irow.plain .vv { flex:0 1 auto; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:58%; }
  /* 사이드 */
  .ring { width:132px; height:132px; border-radius:50%; position:relative; margin:4px auto 8px; }
  .ring .hole { position:absolute; inset:13px; background:var(--panel); border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .ring .hole b { font-size:30px; line-height:1; }
  .ring .hole small { font-size:11px; font-weight:800; margin-top:3px; }
  .sbars .r { display:flex; align-items:center; gap:8px; font-size:11.5px; padding:3.5px 0; color:var(--muted); }
  .sbars .r .lb { width:66px; flex-shrink:0; white-space:nowrap; }
  .sbars .m { flex:1; height:6px; background:var(--panel2); border:1px solid var(--border); border-radius:4px; overflow:hidden; }
  .sbars .m i { display:block; height:100%; background:linear-gradient(90deg,#0f7a56,#4cd7a5); border-radius:4px; }
  .sbars .m i.warn { background:linear-gradient(90deg,#8a6f1e,#f0c948); }
  .sbars .r b { width:26px; text-align:right; color:var(--text); }
  .alrow { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); font-weight:600; padding:7.5px 0; border-bottom:1px solid #ffffff0d; line-height:1.5; }
  .alrow:last-child { border-bottom:none; }
  .alrow .tx { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .alrow .ar { font-weight:900; flex-shrink:0; width:16px; text-align:center; }
  .tchips { display:flex; flex-wrap:wrap; gap:7px; }
  .tchip { background:#13322a; color:#4cd7a5; border:1px solid #2e5c47; border-radius:8px; padding:5px 11px; font-size:11.5px; font-weight:800; }
  .tchip.gold { background:#3d3313; color:#f0c948; border-color:#c9a83266; }
  /* 하단 */
  .row2c { display:grid; grid-template-columns:1.1fr 1fr; gap:14px; margin-top:14px; align-items:stretch; }
  @media (max-width:1000px){ .row2c { grid-template-columns:1fr; } }
  .row2d { display:grid; grid-template-columns:0.8fr 2.2fr; gap:14px; margin-top:14px; }
  @media (max-width:1000px){ .row2d { grid-template-columns:1fr; } }
  .chartbox { position:relative; }
  .ctip { position:absolute; background:#021b27; border:1px solid var(--gold-dim); color:var(--text); font-size:11px; font-weight:600; padding:7px 10px; border-radius:8px; pointer-events:none; white-space:nowrap; transform:translate(-50%,-108%); z-index:5; font-variant-numeric:tabular-nums; line-height:1.7; display:none; }
  .histrow { display:flex; align-items:center; gap:5px; flex-wrap:wrap; row-gap:14px; justify-content:space-between; }
  .hcell { text-align:center; }
  .hcirc { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9.5px; font-weight:800; border:2px solid #ffffff14; }
  .harr { color:var(--dim); font-size:15px; font-weight:900; flex-shrink:0; }
  .nrow { display:block; padding:6.5px 0; border-bottom:1px solid #ffffff0d; font-size:12px; color:var(--text); font-weight:600; line-height:1.45; }
  .nrow:last-child { border-bottom:none; }
  .nrow .tm { color:var(--dim); font-size:10.5px; font-weight:500; }
  .nrow:hover { color:var(--gold); }
  .evrow { display:flex; align-items:center; gap:9px; font-size:12px; color:var(--muted); font-weight:600; padding:8px 0; border-bottom:1px solid #ffffff0d; }
  .evrow:last-child { border-bottom:none; }
  .evrow .dt { width:88px; flex-shrink:0; font-variant-numeric:tabular-nums; color:var(--dim); font-size:11px; }
  .evrow .tx { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .vbadge { display:inline-flex; padding:2px 10px; border-radius:7px; font-size:11px; font-weight:800; }
  .b-pos { background:#13322a; color:#4cd7a5; } .b-sta { background:#22303c; color:#9db9d4; } .b-neg { background:#3a1a22; color:#f0708a; }
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>
<div class="wrap">
  <div class="titlerow">
    <div style="flex:1;min-width:220px;">
      <div class="page-title">종목 상세</div>
      <div class="page-sub">선택한 종목의 티어, 수급, 밸류, 리스크 지표를 한눈에 확인하세요.</div>
    </div>
    <span class="asof" id="asof" style="margin-top:6px;"></span>
    <button class="btn3" id="watchbtn" onclick="toggleWatch()">☆ 관심종목</button>
    <a class="btn3" id="cmpbtn" href="#">⚔ 비교</a>
  </div>
  <div id="body"></div>
  <div class="footer"></div>
</div>

<script src="data.js"></script>
<script src="data_us.js"></script>
<script src="flows.js"></script>
<script src="common.js"></script>
<script>
ST.nav("");
document.getElementById("asof").textContent = "업데이트: " + ST.asofText();
const src = ST.qp("src") || "kr", key = ST.qp("k") || "";
const s = ST.get(src, key);
const box = document.getElementById("body");

if (!s) {
  box.innerHTML = `<div class="card" style="text-align:center;padding:50px;">
    <div style="font-size:18px;font-weight:700;margin-bottom:8px;">종목을 찾을 수 없습니다</div>
    <div style="font-size:13px;color:var(--muted);">상단 검색창에서 다시 검색해보세요.</div></div>`;
  document.getElementById("watchbtn").style.display = "none";
  document.getElementById("cmpbtn").style.display = "none";
} else {
  const us = src==="us";
  const [code, mkt, price, chg, per, pbr, div, roe, cap, vol3m, volPrev, volToday, days, forn, r1w, r1m, r3m] = s;
  const sc = ST.score(s, us), g = ST.gradeOf(sc), rk = ST.risk(s);
  const name = ST.displayName(src, key);
  document.title = "Stocktier — " + name;
  document.getElementById("cmpbtn").href = `compare.html?a=${src}:${encodeURIComponent(key)}`;
  const clip = v => Math.max(0, Math.min(100, Math.round(v)));
  const wonN = v => Math.round(v).toLocaleString("ko-KR");

  const supply = (!us && s.length>18 && s[17]!=null) ? clip(((s[17]>0?1:0)+(s[18]>0?1:0))*27+40) : 50;
  const momentum = clip(50 + (r1w||0)*3 + (r1m||0)*1.2);
  const value = per>0 ? clip(100 - per*(us?1.2:2)) : 30;
  const funda = clip(50 + roe*2.2);
  const wins = days.filter(d=>d>0).length;
  const outlook = (wins>=4 || (r1w||0)>5) ? ["Positive","b-pos"] : (wins<=1 ? ["Negative","b-neg"] : ["Stable","b-sta"]);
  const surge = vol3m>0 ? volToday/vol3m : 0;
  const amt = price*volToday;
  const amtStr = us ? (amt>=1e9?"$"+(amt/1e9).toFixed(1)+"B":"$"+(amt/1e6).toFixed(0)+"M")
                    : (amt>=1e12?(amt/1e12).toFixed(2)+"조":wonN(amt/1e8)+"억");

  const spkI = us ? 18 : 19;
  const spk = (s.length>spkI && s[spkI] && s[spkI].length>25 && s[spkI][s[spkI].length-1]===1000) ? s[spkI] : null;
  let hi52 = null, lo52 = null;
  if (spk) { const w = spk.slice(-20).concat([1000]);
    hi52 = Math.max(...w)*price/1000; lo52 = Math.min(...w)*price/1000; }
  const dayPath = (() => { const pts=[price];
    for (const d of days) pts.unshift(pts[0]/(1+d/100));
    return pts; })();

  // 실적 일정
  const EARN = us ? (window.STOCK_MARKET_US && window.STOCK_MARKET_US.earn) : (window.STOCK_MARKET && window.STOCK_MARKET.earn);
  const today0 = new Date(); today0.setHours(0,0,0,0);
  let earnD = null, earnEst = false;
  { const v = EARN && EARN[us ? key : code];
    if (v) { const t = String(v);
      const d = t.length>=8 ? new Date(+t.slice(0,4), +t.slice(4,6)-1, +t.slice(6,8)) : new Date(today0.getFullYear(), +t.slice(0,2)-1, +t.slice(2,4));
      if (d >= today0) earnD = d; }
    if (!earnD && !us) {
      let h = 7; for (const c of String(code)) h = (h*31 + c.charCodeAt(0)) >>> 0;
      const dl = [[3,31],[5,15],[8,14],[11,16]];
      for (let k2=0; k2<9 && !earnD; k2++){
        const d = new Date(today0.getFullYear()+Math.floor(k2/4), dl[k2%4][0]-1, dl[k2%4][1]);
        d.setDate(d.getDate()-(h%16));
        if (d >= today0) { earnD = d; earnEst = true; }
      }
    } }
  const dd = d => Math.round((d-today0)/864e5);
  const fmtMD = d => `${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`;
  const fmtYMD = d => `${d.getFullYear()}.${fmtMD(d).replace("/",".")}`;

  const nvUrl = `https://ssl.pstatic.net/imgstock/fn/real/logo/stock/Stock${us ? key+(mkt==="NASDAQ"?".O":mkt==="NYSE"?".N":".A") : code}.svg`;
  const tsUrl = us ? nvUrl : "https://thumb.tossinvest.com/image/resized/96x0/" + encodeURIComponent("https://static.toss.im/png-icons/securities/icn-sec-fill-"+code+".png");
  const logoBig = `<img src="${tsUrl}" style="width:64px;height:64px;border-radius:50%;background:#fff;flex-shrink:0;" loading="lazy"
    onerror="if(!this.dataset.f){this.dataset.f=1;this.src='${nvUrl}';}else{this.style.visibility='hidden';}">`;

  const shieldIcon = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#4cd7a5" stroke-width="2" stroke-linejoin="round"><path d="M12 2l8 3v6c0 4.8-3.4 8.4-8 11-4.6-2.6-8-6.2-8-11V5z"/></svg>`;
  const calIcon = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#4cd7a5" stroke-width="2" stroke-linecap="round"><rect x="3" y="5" width="18" height="16" rx="3"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2.5" x2="8" y2="6.5"/><line x1="16" y1="2.5" x2="16" y2="6.5"/></svg>`;

  const gPast = ST.gradeOf(clip(sc - (r1m||0)*0.35));
  const upCol = chg>=0 ? "#4cd7a5" : "#f0645a";
  const buyStr = q => q==null ? "-" : (q>=0?"+":"-")+wonN(Math.abs(q)*price/1e8)+"억";

  // ══ 인터랙티브 차트 (그라데이션 + 십자 점선 + 툴팁: 날짜/주가/시가총액) ══
  const CH = {};
  function mountChart(boxId, tipId, per, cfg){
    const el = document.getElementById(boxId), tip = document.getElementById(tipId);
    if (!el) return;
    let prices, daysN;
    if (per==="1w" || !spk) { prices = dayPath; daysN = 7; }
    else { prices = spk.slice(-(cfg.pts[per][0]+1)).map(v=>v*price/1000); daysN = cfg.pts[per][1]; }
    if (!prices || prices.length<2) { el.innerHTML=""; return; }
    const W = cfg.W, H = cfg.H, padL = cfg.axis?54:6, padR = cfg.badge?60:8, padT = 10, padB = cfg.axis?24:(cfg.xlab?16:6);
    const mn=Math.min(...prices),mx=Math.max(...prices),rg=(mx-mn)||1;
    const X=i=>padL+i/(prices.length-1)*(W-padL-padR), Y=v=>padT+(1-(v-mn)/rg)*(H-padT-padB);
    const xy = prices.map((p,i)=>`${X(i).toFixed(1)},${Y(p).toFixed(1)}`);
    const id = boxId;
    let grid = "";
    if (cfg.axis) for (let gz=0; gz<=3; gz++){
      const v = mn + rg*(1-gz/3), y = padT + (H-padT-padB)*gz/3;
      grid += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#0d3a52" stroke-width="1"/>
        <text x="${padL-6}" y="${y+4}" text-anchor="end" fill="#5a737d" font-size="9.5">${us?v.toFixed(0):wonN(v)}</text>`;
    }
    const dAt = i => { const d = new Date(); d.setDate(d.getDate() - Math.round(daysN*(1-i/(prices.length-1)))); return d; };
    let xlab = "";
    if (cfg.axis || cfg.xlab) for (const fr of [0, 1/3, 2/3, 1]){
      const i = Math.round(fr*(prices.length-1));
      xlab += `<text x="${X(i).toFixed(1)}" y="${H-6}" text-anchor="${fr===0?"start":fr===1?"end":"middle"}" fill="#5a737d" font-size="9.5">${fmtMD(dAt(i))}</text>`;
    }
    const yE = Y(prices[prices.length-1]);
    const badge = cfg.badge ? `<g><rect x="${W-padR+4}" y="${Math.max(padT,yE-9).toFixed(1)}" width="54" height="18" rx="5" fill="${cfg.col}"/>
      <text x="${W-padR+31}" y="${(Math.max(padT,yE-9)+13).toFixed(1)}" text-anchor="middle" fill="#10231c" font-size="9" font-weight="800">${us?price.toFixed(0):wonN(price)}</text></g>` : "";
    el.innerHTML = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:${cfg.px||H}px;display:block;">
      <defs><linearGradient id="${id}f" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${cfg.col}" stop-opacity="0.3"/><stop offset="1" stop-color="${cfg.col}" stop-opacity="0"/></linearGradient>
      <linearGradient id="${id}l" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="${cfg.col2||"#0f7a56"}"/><stop offset="1" stop-color="${cfg.col}"/></linearGradient></defs>
      ${grid}${xlab}
      <polygon points="${padL},${H-padB} ${xy.join(" ")} ${W-padR},${H-padB}" fill="url(#${id}f)"/>
      <polyline points="${xy.join(" ")}" fill="none" stroke="url(#${id}l)" stroke-width="2"/>
      ${badge}
      <g class="cross" style="display:none;">
        <line class="cxv" y1="${padT}" y2="${H-padB}" stroke="#8da4ac" stroke-width="1" stroke-dasharray="4,4"/>
        <line class="cxh" x1="${padL}" x2="${W-padR}" stroke="#8da4ac" stroke-width="1" stroke-dasharray="4,4"/>
        <circle class="cp" r="4" fill="${cfg.col}" stroke="#10231c" stroke-width="1.5"/></g>`;
    const svg = el.querySelector("svg");
    const cross = svg.querySelector(".cross");
    svg.onmousemove = ev => {
      const r = svg.getBoundingClientRect();
      const vx = (ev.clientX - r.left)/r.width*W;
      let i = Math.round((vx-padL)/(W-padL-padR)*(prices.length-1));
      i = Math.max(0, Math.min(prices.length-1, i));
      const x = X(i), y = Y(prices[i]);
      svg.querySelector(".cxv").setAttribute("x1",x); svg.querySelector(".cxv").setAttribute("x2",x);
      svg.querySelector(".cxh").setAttribute("y1",y); svg.querySelector(".cxh").setAttribute("y2",y);
      const cp = svg.querySelector(".cp"); cp.setAttribute("cx",x); cp.setAttribute("cy",y);
      cross.style.display = "";
      const capT = cap * prices[i] / price;
      tip.innerHTML = `날짜: ${fmtYMD(dAt(i))}<br>주가: ${us?ST.priceStr(+prices[i].toFixed(2),true):wonN(prices[i])+"원"}<br>시가총액: ${ST.capStr(Math.round(capT), us)}`;
      tip.style.left = (x/W*100)+"%";
      tip.style.top = (y/H*100)+"%";
      tip.style.transform = y < H*0.42 ? "translate(-50%, 16px)" : "translate(-50%,-108%)";
      tip.style.display = "block";
    };
    svg.onmouseleave = () => { cross.style.display="none"; tip.style.display="none"; };
  }
  const PTS = { "1w":[0,7], "1m":[2,30], "3m":[5,91], "6m":[10,182], "1y":[20,365], "3y":[60,1095], "5y":[99,1825] };
  const PLBL = { "1w":"1주", "1m":"1개월", "3m":"3개월", "6m":"6개월", "1y":"1년", "3y":"3년", "5y":"5년" };

  // ══ 상단 카드 ══
  const priceCard = `
  <div class="scard">
    <div style="display:flex;gap:14px;align-items:stretch;">
      <div style="display:flex;align-items:center;gap:14px;flex:1;min-width:0;">
        ${logoBig}
        <div style="min-width:0;">
          <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;"><b style="font-size:19px;">${name}</b><span style="color:var(--dim);font-size:12px;">${code}</span><span style="font-size:10px;background:var(--panel2);border:1px solid var(--border);border-radius:5px;padding:1.5px 7px;color:var(--muted);font-weight:700;">${mkt}</span></div>
          <div style="display:flex;align-items:baseline;gap:10px;margin-top:8px;flex-wrap:wrap;">
            <span class="num" style="font-size:31px;font-weight:800;">${ST.priceStr(price,us)}</span>
            <span class="num" style="font-size:15px;font-weight:800;color:${upCol};">${chg>0?"▲":chg<0?"▼":"—"} ${us?Math.abs(price-price/(1+chg/100)).toFixed(2):wonN(Math.abs(price-price/(1+chg/100)))} <span style="margin-left:2px;">${ST.pct2(chg)}</span></span>
          </div>
          <div class="num" style="font-size:11.5px;color:var(--dim);margin-top:8px;">거래량 ${ST.num(volToday)}주 · 거래대금 ${amtStr}</div>
        </div>
      </div>
      <div style="width:52%;min-width:180px;flex-shrink:0;display:flex;flex-direction:column;">
        <div class="chips2" id="topchips" style="justify-content:flex-end;margin-bottom:3px;"></div>
        <div class="chartbox" style="flex:1;"><div id="topbox"></div><div class="ctip" id="toptip"></div></div>
      </div>
    </div>
  </div>`;

  const tierDesc = sc>=85 ? "전망 안정적 · 강한 펀더멘털과<br>수급 우위를 보유한 최상위 티어"
    : sc>=65 ? "지표 균형이 좋은 우량 티어<br>안정적 흐름 유지 중"
    : sc>=45 ? "중위권 티어 · 모멘텀에 따라<br>등락 여지가 있는 구간"
    : "하위 티어 · 지표 개선 확인 후<br>접근이 필요한 구간";
  const tierCard = `
  <div class="scard">
    <div class="hd"><span class="hic">${shieldIcon}</span>종합 티어</div>

    const FDEF = FOPT[FOPT.length-1][0];

    function drawFlow(id){
      const c = FP[id];

      const rows = FLOWS.slice(-n);
      const el = document.getElementById(id+"box"), tip = document.getElementById(id+"tip");
      const W=420, H=130, padL=50, padR=8, padT=8, padB=18;
      const vals = rows.map(r=>r[c.idx]);
      const mxA = Math.max(...vals.map(v=>Math.abs(v)), 1);
      const mid = padT + (H-padT-padB)/2;
      const Y = v => mid - v/mxA*(H-padT-padB)/2;

      el.innerHTML = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:130px;display:block;">
        <defs><linearGradient id="${id}u" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="#0f7a56"/><stop offset="1" stop-color="#4cd7a5"/></linearGradient>
        <linearGradient id="${id}d" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7a2822"/><stop offset="1" stop-color="#f0645a"/></linearGradient></defs>
        <text x="${padL-6}" y="${(Y(mxA)+4).toFixed(1)}" text-anchor="end" fill="#5a737d" font-size="9">+${mxA.toLocaleString("ko-KR")}억</text>
        <text x="${padL-6}" y="${mid+3}" text-anchor="end" fill="#5a737d" font-size="9">0</text>
        <text x="${padL-6}" y="${(Y(-mxA)+2).toFixed(1)}" text-anchor="end" fill="#5a737d" font-size="9">-${mxA.toLocaleString("ko-KR")}억</text>
        <line x1="${padL}" y1="${mid}" x2="${W-padR}" y2="${mid}" stroke="#1c3440" stroke-width="1"/>
        ${bars}${xlab}

          <line class="cxh" x1="${padL}" x2="${W-padR}" stroke="#8da4ac" stroke-width="1" stroke-dasharray="4,4"/></g>`;

      svg.onmousemove = ev => {
        const r2 = svg.getBoundingClientRect();
        const vx = (ev.clientX - r2.left)/r2.width*W;
        let i = Math.round((vx-padL)/(W-padL-padR)*rows.length - 0.5);
        i = Math.max(0, Math.min(rows.length-1, i));

        tip.style.left = (x/W*100)+"%";
        tip.style.top = (y/H*100)+"%";
        tip.style.transform = y < H*0.45 ? "translate(-50%, 14px)" : "translate(-50%,-108%)";
        tip.style.display = "block";
      };
      svg.onmouseleave = () => { cross.style.display="none"; tip.style.display="none"; };

    if (ST.watchHas(src,key)) { b.textContent = "★ 관심종목 해제"; b.style.color = "var(--gold)"; b.style.borderColor = "var(--gold-dim)"; }
    else { b.textContent = "☆ 관심종목"; b.style.color = ""; b.style.borderColor = ""; }
  }
  updateWatchBtn();
}
</script>
