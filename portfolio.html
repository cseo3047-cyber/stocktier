<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stocktier — 포트폴리오 진단</title>
<link rel="stylesheet" href="style.css">
<style>
  .wrap { max-width:1460px; }
  .layout { display:grid; grid-template-columns:1fr 310px; gap:14px; align-items:stretch; }
  @media (max-width:1080px){ .layout { grid-template-columns:1fr; } }
  .cards4 { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; margin-bottom:14px; }
  @media (max-width:900px){ .cards4 { grid-template-columns:repeat(2,minmax(0,1fr)); } }
  .scard { background:linear-gradient(135deg,#0d2e3b,#123f4b); border:1px solid var(--border); border-radius:14px; padding:15px 15px; display:flex; gap:11px; align-items:center; min-width:0; }
  .scard .ic { width:46px; height:46px; border-radius:12px; background:#4cd7a51a; border:1px solid #4cd7a544; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .scard .l { flex:1; min-width:0; }
  .scard .lb { font-size:11.5px; color:var(--muted); font-weight:700; margin-bottom:3px; white-space:nowrap; }
  .scard .vl { font-size:23px; font-weight:800; line-height:1.1; }
  .scard .vl small { font-size:12px; color:var(--dim); font-weight:600; }
  .scard .sub { font-size:10.5px; color:var(--dim); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .scard svg.mini { flex-shrink:0; }
  .icgauge { width:46px; height:46px; border-radius:50%; flex-shrink:0; position:relative; }
  .icgauge .ih { position:absolute; inset:6px; background:#0f333e; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; color:#4cd7a5; }
  .avat { display:inline-flex; width:21px; height:21px; border-radius:6px; align-items:center; justify-content:center; font-size:10.5px; font-weight:800; color:#052018; margin-right:7px; vertical-align:-5px; flex-shrink:0; }
  /* 세부내역 팝업 */
  .modal { position:fixed; inset:0; background:#000000aa; display:flex; align-items:center; justify-content:center; z-index:120; }
  .modal.hidden { display:none; }
  .mbox { background:var(--panel); border:1px solid var(--border); border-radius:16px; width:min(440px,92vw); max-height:78vh; overflow:auto; padding:18px 20px; }
  .mhead { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .mhead b { font-size:15px; }
  .mclose { cursor:pointer; color:var(--muted); font-size:16px; padding:2px 6px; }
  .mclose:hover { color:var(--text); }
  .mgrp { font-size:12px; font-weight:800; color:var(--gold); margin:13px 0 4px; }
  .mrow { display:flex; align-items:center; gap:9px; font-size:12.5px; padding:6.5px 2px; border-bottom:1px solid #ffffff0d; color:var(--muted); }
  .mrow:last-child { border-bottom:none; }
  .mrow b { color:var(--text); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:700; }
  .mrow .num { font-variant-numeric:tabular-nums; }
  /* 테이블: 헤더 가운데, 본문 종목명만 좌측 */
  .ptbl { width:100%; border-collapse:collapse; font-size:12.5px; }
  .ptbl th { text-align:center; color:var(--muted); font-size:11.5px; font-weight:700; padding:8px 6px; border-bottom:1px solid var(--border); white-space:nowrap; }
  .ptbl td { padding:9px 6px; border-bottom:1px solid var(--border); text-align:center; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .ptbl td.nm { text-align:left; font-weight:700; max-width:165px; overflow:hidden; text-overflow:ellipsis; }
  .ptbl tr:hover td { background:var(--panel2); }
  .ptbl a.stock:hover { color:var(--gold); }
  /* 도넛 (우측 범례) */
  .drow3 { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; margin-top:14px; }
  @media (max-width:1000px){ .drow3 { grid-template-columns:1fr; } }
  .dwrap { display:flex; gap:16px; align-items:center; }
  .donut { width:118px; height:118px; border-radius:50%; position:relative; flex-shrink:0; }
  .donut .hole { position:absolute; inset:27px; background:var(--panel); border-radius:50%; }
  .dlegend { flex:1; min-width:0; font-size:12px; }
  .dlegend .r { display:flex; align-items:center; gap:8px; padding:3.5px 0; color:var(--muted); }
  .dlegend .dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
  .dlegend .lb { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .dlegend b { color:var(--text); font-variant-numeric:tabular-nums; }
  .dfoot { font-size:10.5px; color:var(--dim); border-top:1px solid var(--border); padding-top:8px; margin-top:10px; }
  /* 사이드 */
  .gauge { width:150px; height:80px; position:relative; overflow:hidden; margin:2px auto 6px; }
  .gauge .arc { width:150px; height:150px; border-radius:50%; }
  .gauge .hole { position:absolute; left:21px; top:21px; width:108px; height:108px; background:var(--panel); border-radius:50%; text-align:center; }
  .gauge .hole b { font-size:25px; display:block; margin-top:20px; }
  .gauge .hole small { font-size:12px; color:var(--dim); font-weight:500; }
  .gsub { text-align:center; font-size:11px; color:var(--muted); font-weight:700; margin-bottom:8px; }
  .sbars .r { display:flex; align-items:center; gap:8px; font-size:11.5px; padding:3px 0; color:var(--muted); }
  .sbars .r .lb { width:66px; flex-shrink:0; white-space:nowrap; }
  .sbars .m { flex:1; height:6px; background:var(--panel2); border:1px solid var(--border); border-radius:4px; overflow:hidden; }
  .sbars .m i { display:block; height:100%; background:linear-gradient(90deg,#0f7a56,#4cd7a5); border-radius:4px; }
  .sbars .r b { width:26px; text-align:right; color:var(--text); }
  .warnrow { display:flex; align-items:center; gap:8px; background:var(--panel2); border:1px solid var(--border); border-radius:9px; padding:8px 11px; font-size:12px; color:var(--muted); margin-bottom:7px; font-weight:600; }
  .cmts { font-size:12px; color:var(--muted); line-height:2.1; }
  .cmts li { list-style:none; padding-left:15px; position:relative; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cmts li:before { content:"•"; position:absolute; left:2px; color:var(--gold); }
  .riskb { display:inline-flex; padding:2px 9px; border-radius:7px; font-size:11px; font-weight:800; }
  .r-low { background:#13322a; color:#4cd7a5; } .r-med { background:#3d3313; color:#f0c948; } .r-high { background:#3a1a22; color:#f0708a; }
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>
<div class="wrap">
  <span class="asof" id="asof"></span>
  <div class="page-title">포트폴리오 진단</div>
  <div class="page-sub">관심종목(보유 종목) 구성과 리스크를 분석하고, 개선 방향을 제시합니다.</div>
  <div id="body"></div>
  <div class="footer">Stocktier는 재미용 사이트입니다. 지표는 오락 목적의 가공 수치이며 투자 권유·조언이 아닙니다.</div>
</div>
<div class="modal hidden" id="dmodal" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="mbox">
    <div class="mhead"><b id="mtitle"></b><span class="mclose" onclick="document.getElementById('dmodal').classList.add('hidden')">✕</span></div>
    <div id="mbody"></div>
  </div>
</div>

<script src="data.js"></script>
<script src="data_us.js"></script>
<script src="common.js"></script>
<script>
ST.nav("portfolio.html");
document.getElementById("asof").textContent = "업데이트: " + ST.asofText();

const clip = v => Math.max(0, Math.min(100, Math.round(v)));
const list = ST.watchGet().filter(w => ST.get(w[0],w[1]));
const box = document.getElementById("body");

if (!list.length) {
  box.innerHTML = `<div class="card" style="text-align:center;padding:56px;">
    <div style="font-size:18px;font-weight:800;margin-bottom:8px;">진단할 보유 종목이 없어요</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:20px;">종목 페이지에서 ☆ 관심종목을 눌러 담으면<br>포트폴리오 진단이 자동으로 만들어집니다.</div>
    <a class="btn" href="tier.html">종목 담으러 가기 →</a></div>`;
} else {
  const items = list.map(([src,key]) => {
    const e = ST.get(src,key);
    return { src, key, e, us:src==="us", sc:ST.score(e,src==="us"), rk:ST.risk(e) };
  }).sort((a,b)=>b.sc-a.sc);
  const n = items.length;
  const weight = 100/n;
  const avgOf = f => clip(items.reduce((a,x)=>a+f(x),0)/n);
  const supply = avgOf(x => x.e.length>18 && x.e[17]!=null ? ((x.e[17]>0?1:0)+(x.e[18]>0?1:0))*27+40 : 55);
  const momentum = avgOf(x => 50 + (x.e[14]||0)*4);
  const funda = avgOf(x => 50 + x.e[7]*2);
  const value = avgOf(x => x.e[4]>0 ? 100 - x.e[4]*2 : 30);
  const riskV = avgOf(x => 100 - x.rk);
  const surv = Math.round((supply+momentum+funda+value+riskV)/5);
  const g = ST.gradeOf(surv);
  const highRisk = items.filter(x=>x.rk>=70);
  const highPct = Math.round(highRisk.length/n*100);
  const hotN = items.filter(x=>x.e[11]/Math.max(1,x.e[9])>=2).length;
  const downN = items.filter(x=>(x.e[15]||0)<0).length;
  const gcol = surv>=65?"#4cd7a5":surv>=45?"#f0c948":"#f0645a";

  // 실적 일정 (수집된 실제 공시 데이터가 있을 때만 표시)
  const hashOf = s => { let h=7; for (const c of String(s)) h=(h*31+c.charCodeAt(0))>>>0; return h; };
  const today0 = new Date(); today0.setHours(0,0,0,0);
  const EARNK = (window.STOCK_MARKET && window.STOCK_MARKET.earn) || null;
  const EARNU = (window.STOCK_MARKET_US && window.STOCK_MARKET_US.earn) || null;
  function earnDate(x){
    const m = x.us ? EARNU : EARNK;
    const v = m && m[x.us ? x.key : x.e[0]];
    if (!v) return null;
    const s = String(v);
    const yy = s.length>=8 ? +s.slice(0,4) : today0.getFullYear();
    const mm = s.length>=8 ? +s.slice(4,6) : +s.slice(0,2);
    const dd = s.length>=8 ? +s.slice(6,8) : +s.slice(2,4);
    const d = new Date(yy, mm-1, dd);
    return d >= today0 ? d : null;
  }
  const dday = d => Math.round((d-today0)/864e5);
  const hasEarn = !!(EARNK || EARNU);
  const earnSoon = items.filter(x=>{ const d=earnDate(x); return d && dday(d)<=7; }).length;

  // 카드 아이콘 + 미니 그래프
  const listIcon = `<svg width="24" height="22" viewBox="0 0 22 20"><g stroke="#4cd7a5" stroke-width="2" stroke-linecap="round"><circle cx="2.5" cy="3" r="1.6" fill="#4cd7a5" stroke="none"/><line x1="7" y1="3" x2="20" y2="3"/><circle cx="2.5" cy="10" r="1.6" fill="#4cd7a5" stroke="none"/><line x1="7" y1="10" x2="20" y2="10"/><circle cx="2.5" cy="17" r="1.6" fill="#4cd7a5" stroke="none"/><line x1="7" y1="17" x2="20" y2="17"/></g></svg>`;
  const warnIcon = `<svg width="26" height="24" viewBox="0 0 24 22" fill="none" stroke="#f0645a" stroke-width="1.8" stroke-linejoin="round"><path d="M12 2L22 20H2z"/><line x1="12" y1="9" x2="12" y2="14" stroke-linecap="round"/><circle cx="12" cy="17" r="1.2" fill="#f0645a" stroke="none"/></svg>`;
  const calIcon = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4cd7a5" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="5" width="18" height="16" rx="3"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2.5" x2="8" y2="6.5"/><line x1="16" y1="2.5" x2="16" y2="6.5"/><path d="M8 15.5l2.5 2.5 5.5-5.5" stroke-width="2"/></svg>`;
  const miniLine = (id,c1,c2,seed) => { const pts=[]; let v=15;
    for (let i=0;i<12;i++){ v=Math.max(4,Math.min(26,v+((seed>>(i%9))%7)-3)); pts.push(`${i*6},${30-v}`); }
    return `<svg class="mini" width="68" height="30" viewBox="0 0 68 30"><defs><linearGradient id="${id}" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/></linearGradient></defs><polyline points="${pts.join(" ")}" fill="none" stroke="url(#${id})" stroke-width="2"/></svg>`; };
  const miniBars = (id,c1,c2,seed) => { let b="";
    for (let i=0;i<7;i++){ const h=7+((seed*(i+3))%19); b+=`<rect x="${i*9}" y="${30-h}" width="6" height="${h}" rx="2" fill="url(#${id})"/>`; }
    return `<svg class="mini" width="63" height="30" viewBox="0 0 63 30"><defs><linearGradient id="${id}" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/></linearGradient></defs>${b}</svg>`; };

  const cards = `
  <div class="cards4">
    <div class="scard"><span class="ic">${listIcon}</span><div class="l"><div class="lb">전체 보유 종목</div><div class="vl num">${n}<small> 개</small></div><div class="sub">보유 종목 수</div></div>${miniLine("mg1","#1d9e75","#4cd7a5",n*17+5)}</div>
    <div class="scard"><span class="icgauge" style="background:conic-gradient(${gcol} 0% ${surv}%, #ffffff14 ${surv}% 100%);"><span class="ih" style="color:${gcol};">${g.g}</span></span><div class="l"><div class="lb">포트폴리오 생존점수</div><div class="vl num">${surv}<small> 점</small></div><div class="sub"><span class="tierb tier-${g.g}" style="font-size:9px;padding:1px 6px;">${g.g}</span> 티어 · ${surv>=65?"양호":surv>=45?"보통":"주의"}</div></div>${miniBars("mg2","#0f7a56","#4cd7a5",surv+13)}</div>
    <div class="scard"><span class="ic" style="background:#f0645a1a;border-color:#f0645a44;">${warnIcon}</span><div class="l"><div class="lb">고위험 종목 비중</div><div class="vl num" style="color:${highPct>=40?"#f0708a":"var(--text)"};">${highPct}<small> %</small></div><div class="sub">${highRisk.length}개 종목</div></div>${miniBars("mg3","#7a2822","#f0645a",highPct+7)}</div>
    <div class="scard"><span class="ic">${calIcon}</span><div class="l"><div class="lb">실적 임박 종목</div><div class="vl num">${hasEarn?earnSoon:"-"}<small>${hasEarn?" 개":""}</small></div><div class="sub">${hasEarn?"D-7 이내":"공시 데이터 수집 대기"}</div></div>${miniBars("mg4","#1d9e75","#8fd6b8",earnSoon*9+21)}</div>
  </div>`;

  // 구성 테이블
  const AVCOL = ["#4cd7a5","#f0c948","#8fd6b8","#c9c94e","#1d9e75","#e0a63e","#66c6e8","#d6866a"];
  const rows = items.map((x,i)=>{
    const gg = ST.gradeOf(x.sc);
    const rb = x.rk<40?["Low","r-low"]:x.rk<70?["Medium","r-med"]:["High","r-high"];
    const ind = (x.e.length>20 && x.e[20]) ? x.e[20] : `<span style="color:var(--dim);">수집 중</span>`;
    const thm = (x.e.length>21 && x.e[21]) ? x.e[21] : `<span style="color:var(--dim);">수집 중</span>`;
    const w1 = x.e[14];
    const chg = w1==null ? "-" : `<span class="${ST.cls(w1)}">${w1>0?"↗":w1<0?"↘":"→"} ${ST.pct(w1)}</span>`;
    const nm = ST.displayName(x.src,x.key);
    const rcode = x.us ? (x.key + (x.e[1]==="NASDAQ"?".O":x.e[1]==="NYSE"?".N":".A")) : x.e[0];
    const nvUrl = `https://ssl.pstatic.net/imgstock/fn/real/logo/stock/Stock${rcode}.svg`;
    const tsUrl = x.us ? nvUrl : "https://thumb.tossinvest.com/image/resized/96x0/" + encodeURIComponent("https://static.toss.im/png-icons/securities/icn-sec-fill-"+x.e[0]+".png");
    const av = `<img src="${tsUrl}" style="width:24px;height:24px;border-radius:50%;flex-shrink:0;background:#fff;object-fit:cover;" loading="lazy" onerror="if(!this.dataset.f&&this.src!=='${nvUrl}'){this.dataset.f=1;this.src='${nvUrl}';}else{this.style.display='none';this.nextElementSibling.style.display='inline-flex';}"><span class="avat" style="display:none;margin-right:0;background:${AVCOL[hashOf(x.key)%AVCOL.length]};">${nm.charAt(0).toUpperCase()}</span>`;
    const ed = earnDate(x);
    const eds = ed ? `${String(ed.getMonth()+1).padStart(2,"0")}/${String(ed.getDate()).padStart(2,"0")}${dday(ed)<=7?` <span style="color:#f0c948;font-weight:800;">D-${dday(ed)}</span>`:""}` : "-";
    return `<tr>
      <td class="num" style="color:var(--muted);">${i+1}</td>
      <td class="nm"><div style="display:flex;align-items:center;gap:8px;min-width:0;">${av}<a class="stock" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" href="${ST.stockUrl(x.src,x.key)}">${nm} <span style="color:var(--dim);font-weight:500;">(${x.e[0]})</span></a></div></td>
      <td style="color:var(--muted);font-size:11.5px;">${x.e[1]}</td>
      <td class="num">${weight.toFixed(1)}%</td>
      <td><span class="tierb tier-${gg.g}">${gg.g}</span></td>
      <td class="num" style="font-weight:800;">${x.sc}</td>
      <td style="color:var(--muted);font-size:11.5px;max-width:100px;overflow:hidden;text-overflow:ellipsis;">${ind}</td>
      <td style="color:var(--muted);font-size:11.5px;max-width:100px;overflow:hidden;text-overflow:ellipsis;">${thm}</td>
      <td><span class="riskb ${rb[1]}">${rb[0]}</span></td>
      <td class="num" style="font-size:11.5px;font-weight:700;">${chg}</td>
      <td class="num" style="font-size:11.5px;">${eds}</td></tr>`;
  }).join("");
  const table = `
  <div class="card"><h3>내 포트폴리오 구성 <span class="more" style="cursor:default;">균등 비중 가정 · 종합점수 순</span></h3>
    <table class="ptbl"><thead><tr><th>순위</th><th>종목명</th><th>시장</th><th>비중</th><th>현재 티어</th><th>종합점수</th><th>업종</th><th>테마</th><th>리스크</th><th>최근 변화</th><th>실적 일정</th></tr></thead>
    <tbody>${rows}</tbody></table>
    <div class="dfoot">실적 일정·업종·테마는 일일 데이터 수집 후 표시됩니다</div></div>`;

  // 도넛 3종 (우측 범례, 녹색 계열)
  const GREENS = ["#1d9e75","#4cd7a5","#2c6a4e","#8fd6b8","#476b58","#33413a"];
  function donutCard(id, title, counts, colors) {
    const total = Object.values(counts).reduce((a,b)=>a+b,0) || 1;
    let acc = 0; const segs = [];
    const legend = Object.keys(counts).filter(k=>counts[k]>0).map((k,i)=>{
      const p = counts[k]/total*100;
      segs.push(`${colors[i%colors.length]} ${acc}% ${acc+p}%`);
      acc += p;
      return `<div class="r"><span class="dot" style="background:${colors[i%colors.length]};"></span><span class="lb">${k}</span><b>${Math.round(p)}%</b><span style="color:var(--dim);font-size:11px;">(${counts[k]})</span></div>`;
    }).join("");
    return `<div class="card"><h3>${title} <span class="more" onclick="showDetail('${id}')">더보기 ›</span></h3>
      <div class="dwrap">
        <div class="donut" style="background:conic-gradient(${segs.join(",")});"><div class="hole"></div></div>
        <div class="dlegend">${legend}</div>
      </div></div>`;
  }
  const mktCnt = {};
  for (const x of items) mktCnt[x.e[1]] = (mktCnt[x.e[1]]||0)+1;
  const tierCnt = {};
  for (const x of items) { const t = ST.gradeOf(x.sc).g+"급"; tierCnt[t] = (tierCnt[t]||0)+1; }
  const riskCnt = {"안정":0,"주의":0,"고위험":0};
  for (const x of items) riskCnt[x.rk<40?"안정":x.rk<70?"주의":"고위험"]++;
  const maxMkt = Object.entries(mktCnt).sort((a,b)=>b[1]-a[1])[0];
  // 세부내역 팝업 데이터
  const DET = { mkt:{t:"시장 쏠림 세부 내역",g:{}}, tier:{t:"티어 구성 세부 내역",g:{}}, risk:{t:"리스크 구성 세부 내역",g:{}} };
  for (const x of items) {
    (DET.mkt.g[x.e[1]] = DET.mkt.g[x.e[1]] || []).push(x);
    const t = ST.gradeOf(x.sc).g+"급";
    (DET.tier.g[t] = DET.tier.g[t] || []).push(x);
    const rl = x.rk<40?"안정":x.rk<70?"주의":"고위험";
    (DET.risk.g[rl] = DET.risk.g[rl] || []).push(x);
  }
  window.showDetail = id => {
    const d = DET[id];
    document.getElementById("mtitle").textContent = d.t;
    document.getElementById("mbody").innerHTML = Object.entries(d.g).map(([k,arr]) =>
      `<div class="mgrp">${k} · ${arr.length}개 (${Math.round(arr.length/n*100)}%)</div>` +
      arr.map(x => `<div class="mrow"><b>${ST.displayName(x.src,x.key)}</b>
        <span class="num">점수 ${x.sc}</span><span class="num">위험도 ${x.rk}</span>
        <span class="tierb tier-${ST.gradeOf(x.sc).g}" style="font-size:10px;">${ST.gradeOf(x.sc).g}</span></div>`).join("")
    ).join("");
    document.getElementById("dmodal").classList.remove("hidden");
  };
  const donuts = `
  <div class="drow3">
    ${donutCard("mkt", "시장 쏠림", mktCnt, GREENS)}
    ${donutCard("tier", "티어 구성", tierCnt, GREENS)}
    ${donutCard("risk", "리스크 구성", riskCnt, ["#1d9e75","#c9c94e","#d6564a"])}
  </div>`;

  // 사이드
  const sideSurv = `
  <div class="card"><h3>포트폴리오 생존점수</h3>
    <div class="gauge"><div class="arc" style="background:conic-gradient(from 270deg, ${gcol} 0% ${surv/2}%, #ffffff14 ${surv/2}% 50%, transparent 50%);"></div>
      <div class="hole"><b>${surv}<small>/100</small></b></div></div>
    <div class="gsub"><span class="tierb tier-${g.g}">${g.g}</span> 티어 · ${surv>=65?"양호":surv>=45?"보통":"주의"}</div>
    <div class="sbars">
      ${[["수급",supply],["모멘텀",momentum],["펀더멘털",funda],["밸류에이션",value],["리스크",riskV]].map(([lb,v])=>
        `<div class="r"><span class="lb">${lb}</span><div class="m"><i style="width:${clip(v)}%"></i></div><b>${clip(v)}</b></div>`).join("")}
    </div>
  </div>`;
  const warns = [];
  if (highPct >= 30) warns.push(`⚠️ 고위험 종목 비중 ${highPct}%`);
  if (hotN) warns.push(`🔥 거래 과열 종목 ${hotN}개`);
  if (downN >= Math.ceil(n/2)) warns.push(`📉 절반 이상이 1개월 하락 중`);
  const worst = items[items.length-1];
  if (worst && worst.sc < 40) warns.push(`🕳 최저 점수: ${ST.displayName(worst.src,worst.key)} (${worst.sc}점)`);
  if (!warns.length) warns.push("✅ 특이 경고 없음 — 안정적인 구성입니다");
  const sideWarn = `<div class="card" style="min-height:228px;"><h3>포트폴리오 경고</h3>${warns.map(w=>`<div class="warnrow">${w}</div>`).join("")}</div>`;
  const sideCrit = `
  <div class="card"><h3>평가 기준</h3>
    <div class="sbars">
      ${[["분산도",20],["티어 품질",30],["리스크 노출",20],["모멘텀",20],["변동성",10]].map(([lb,v])=>
        `<div class="r"><span class="lb">${lb}</span><div class="m"><i style="width:${v*3}%;background:linear-gradient(90deg,#8a6f1e,#f0c948);"></i></div><b>${v}%</b></div>`).join("")}
    </div>
  </div>`;
  const rebal = [];
  if (highPct >= 40) rebal.push("고위험 비중 축소 필요");
  if (maxMkt && maxMkt[1]/n >= 0.7) rebal.push(`${maxMkt[0]} 쏠림 — 시장 분산 고려`);
  const lowVal = items.filter(x=>x.e[4]>50).length;
  if (lowVal) rebal.push(`고PER 종목 ${lowVal}개 밸류 점검`);
  if (downN) rebal.push(`하락 추세 ${downN}개 종목 점검`);
  if (!rebal.length) rebal.push("현재 구성 유지 무난");
  const sideRebal = `<div class="card" style="flex:1;min-height:178px;"><h3>리밸런싱 제안</h3><ul class="cmts">${rebal.map(r=>`<li title="${r}">${r}</li>`).join("")}</ul></div>`;

  box.innerHTML = `
  <div class="layout">
    <div>${cards}${table}${donuts}</div>
    <div style="display:flex;flex-direction:column;gap:14px;height:100%;">${sideSurv}${sideWarn}${sideCrit}${sideRebal}</div>
  </div>`;
}
</script>
</body>
</html>
