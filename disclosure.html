<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stocktier — 공시 충격도</title>
<link rel="stylesheet" href="style.css">
<style>
  .wrap { max-width:1440px; }
  .cards5 { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:11px; margin-bottom:14px; }
  @media (max-width:1000px){ .cards5 { grid-template-columns:repeat(2,minmax(0,1fr)); } }
  .scard { background:linear-gradient(135deg,#0d2e3b,#123f4b); border:1px solid var(--border); border-radius:14px; padding:14px; display:flex; gap:10px; align-items:center; min-width:0; }
  .scard.hov { cursor:pointer; transition:border-color .15s, box-shadow .15s; }
  .scard.hov:hover { border-color:#4cd7a5; box-shadow:0 0 0 1px #4cd7a555; }
  .scard .ic { width:42px; height:42px; border-radius:12px; background:#4cd7a51a; border:1px solid #4cd7a544; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .scard .l { flex:1; min-width:0; }
  .scard .lb { font-size:11px; color:var(--muted); font-weight:700; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .scard .vl { font-size:23px; font-weight:800; line-height:1.05; }
  .scard .vl small { font-size:12px; color:var(--dim); font-weight:600; }
  .scard .sub { font-size:10px; color:var(--dim); margin-top:3px; white-space:nowrap; }
  .scard svg.mini { flex-shrink:0; }
  .fbar { display:flex; gap:9px; row-gap:9px; flex-wrap:wrap; align-items:center; }
  .fchip { font-size:11.5px; padding:6px 13px; border-radius:8px; border:1px solid var(--border); color:var(--muted); cursor:pointer; font-weight:700; transition:border-color .15s,color .15s; }
  .fchip:hover { border-color:var(--gold-dim); color:var(--text); }
  .fchip.on { background:#13322a; color:#4cd7a5; border-color:#2e5c47; }
  .selbar { display:flex; gap:9px; align-items:center; flex-shrink:0; }
  .selbar select { background:var(--panel2); border:1px solid var(--border); color:var(--text); border-radius:7px; padding:6px 9px; font-size:11.5px; outline:none; }
  .xbtn { background:var(--panel2); border:1px solid var(--border); color:var(--muted); border-radius:7px; padding:6px 13px; font-size:11.5px; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:5px; transition:border-color .15s,color .15s; }
  .xbtn:hover { border-color:var(--gold-dim); color:var(--gold); }
  .stbl { width:100%; border-collapse:collapse; font-size:12px; }
  .stbl th { text-align:center; color:var(--dim); font-size:10.5px; font-weight:700; padding:8px 4px; border-bottom:1px solid var(--border); white-space:nowrap; }
  .stbl td { padding:9px 4px; border-bottom:1px solid #ffffff0d; text-align:center; vertical-align:middle; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .stbl tr:hover td { background:var(--panel2); }
  .stbl td.nm { text-align:left; font-weight:700; max-width:150px; overflow:hidden; text-overflow:ellipsis; }
  .stbl td.nm img, .stbl td.nm span.av { vertical-align:middle; }
  .stbl td.tt { text-align:left; max-width:320px; overflow:hidden; text-overflow:ellipsis; }
  .stbl td.tt a:hover { color:var(--gold); }
  .tchg { font-size:10px; font-weight:800; border-radius:5px; padding:1.5px 6px; }
  .impn { display:inline-flex; min-width:34px; justify-content:center; border-radius:6px; padding:3px 8px; font-size:11.5px; font-weight:800; color:#10231c; }
  .vbadge { display:inline-flex; padding:2.5px 10px; border-radius:7px; font-size:10px; font-weight:800; }
  .t-vgood { background:#0f5a3d; color:#8ff0c8; } .t-good { background:#13322a; color:#4cd7a5; }
  .t-neu { background:#22303c; color:#9db9d4; } .t-bad { background:#3a1a22; color:#f0708a; } .t-vbad { background:#5a1512; color:#ffb3ad; }
  .morebtn { display:block; margin:12px auto 0; background:var(--panel2); border:1px solid var(--border); color:var(--muted); border-radius:9px; padding:8px 26px; font-size:12px; font-weight:800; cursor:pointer; }
  .morebtn:hover { color:var(--gold); border-color:var(--gold-dim); }
  .row3b { display:grid; grid-template-columns:1.15fr 1fr 1.15fr; gap:14px; margin-top:14px; align-items:stretch; }
  @media (max-width:1000px){ .row3b { grid-template-columns:1fr; } }
  .alrow { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); font-weight:600; padding:8px 0; border-bottom:1px solid #ffffff0d; line-height:1.5; }
  .alrow:last-child { border-bottom:none; }
  .alrow .tx { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .bullets2 { font-size:12px; color:var(--muted); line-height:1.7; margin:0; padding:0; }
  .bullets2 li { list-style:none; padding-left:22px; position:relative; }
  .bullets2 li:before { content:"✓"; position:absolute; left:0; top:1px; width:15px; height:15px; border-radius:50%; background:#13322a; color:#4cd7a5; font-size:9px; font-weight:800; display:flex; align-items:center; justify-content:center; }
  .hicon { width:30px; height:30px; border-radius:9px; background:rgba(56,189,248,.1); border:1px solid rgba(56,189,248,.3); display:inline-flex; align-items:center; justify-content:center; margin-right:6px; vertical-align:middle; }
  .hicon.g { background:rgba(52,211,153,.1); border-color:rgba(52,211,153,.3); }
  .hii { color:var(--dim); font-size:13px; margin-left:6px; }
  .tyrow { display:flex; align-items:center; gap:12px; background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.05); border-radius:10px; padding:9px 13px; }
  .tyrow .k { width:78px; flex-shrink:0; font-size:12px; color:var(--text); font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .tyrow .track { display:block; flex:1; height:16px; background:#0a1e2a; border:1px solid rgba(56,189,248,.12); border-radius:8px; overflow:hidden; }
  .tyrow .fill { display:block; height:100%; min-width:6px; border-radius:8px; background:linear-gradient(90deg,#2ee6c6,#38bdf8 55%,#3b82f6); box-shadow:0 0 10px rgba(56,224,214,.5); }
  .tyrow .v { width:96px; text-align:right; flex-shrink:0; font-size:12px; white-space:nowrap; }
  .tyrow .v b { color:#fff; font-weight:800; }
  .tyrow .v .pc { color:#5ab0e0; font-weight:600; margin-left:4px; }
  .impchart { position:relative; flex:1; min-height:220px; margin:18px 0 6px; padding-left:34px; overflow:visible; }
  .impchart .grid { position:absolute; left:34px; right:6px; top:16px; bottom:24px; }
  .impchart .gl { position:absolute; left:0; right:0; border-top:1px dashed rgba(255,255,255,.09); }
  .impchart .gl span { position:absolute; left:-34px; top:-7px; width:28px; text-align:right; font-size:9.5px; color:var(--dim); }
  .impchart .cols { position:absolute; left:34px; right:6px; top:16px; bottom:24px; display:flex; align-items:flex-end; gap:16px; }
  .impchart .col { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; }
  .impchart .col .bar { width:100%; max-width:58px; border-radius:6px 6px 0 0; min-height:3px; }
  .impchart .col .lab { text-align:center; margin-bottom:7px; font-size:13px; font-weight:800; line-height:1.25; white-space:nowrap; }
  .impchart .col .lab .pc { display:block; font-size:11px; font-weight:600; }
  .impchart .xrow { position:absolute; left:34px; right:6px; bottom:0; height:20px; display:flex; gap:16px; }
  .impchart .xrow span { flex:1; text-align:center; font-size:11px; color:var(--dim); font-weight:600; }
  .chartfoot { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06); border-radius:10px; padding:9px 13px; font-size:11px; color:var(--dim); margin-top:8px; }
  .nrow2 { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid #ffffff0d; font-size:12px; font-weight:700; cursor:pointer; }
  .nrow2:last-child { border-bottom:none; }
  .nrow2:hover { color:var(--gold); }
  .nrow2 .rank { width:18px; height:18px; border-radius:5px; background:#13322a; color:#4cd7a5; font-size:10px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .nrow2 .tx { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .mag { position:absolute; right:11px; top:0; bottom:0; display:flex; align-items:center; color:var(--muted); font-size:15px; font-weight:700; pointer-events:none; }
  .dmodal { position:fixed; inset:0; background:#000000aa; display:none; align-items:center; justify-content:center; z-index:300; }
  .dmrow { display:flex; align-items:center; gap:9px; padding:8px 0; border-bottom:1px solid #ffffff0d; font-size:12px; }
  .dmrow:last-child { border-bottom:none; }
  .dmrow .tx { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:700; }
  .dmhead { display:flex; align-items:center; gap:9px; padding:0 0 7px; border-bottom:1px solid var(--border); font-size:10px; color:var(--dim); font-weight:700; }
  .dmhead .tx { flex:1; min-width:0; }
  .dmhead span { text-align:center !important; }
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>
<div class="wrap">
  <span class="asof" id="asof"></span>
  <div class="page-title">공시 충격도</div>
  <div class="page-sub">주요 공시를 충격도와 영향도로 실시간 분석합니다.</div>
  <div id="body"></div>
  <div class="footer"></div>
</div>

<script src="data.js"></script>
<script src="data_us.js"></script>
<script src="dart.js"></script>
<script src="dart_us.js"></script>
<script src="common.js"></script>
<script>
ST.nav("disclosure.html");
document.getElementById("asof").textContent = "업데이트: " + ST.asofText();
const box = document.getElementById("body");
const MK = window.STOCK_MARKET || {};
const STORE = window.STOCK_DART || null;              // 국내 30일 누적 (dart.js)
const STOREU = window.STOCK_DART_US || null;          // 미국 30일 누적 (dart_us.js — SEC EDGAR)
const FALLBACK = (MK.dart && MK.dart.items) || [];    // 구버전 호환
const dset = new Set();
if (STORE) for (const k of Object.keys(STORE)) if (STORE[k] && STORE[k].length) dset.add(k);
if (STOREU) for (const k of Object.keys(STOREU)) if (STOREU[k] && STOREU[k].length) dset.add(k);
const DATES = dset.size ? [...dset].sort().reverse()
                        : (FALLBACK.length ? [(MK.dart && MK.dart.date) || ""] : []);
let SELD = dset.size ? "all" : (DATES[0] || "");   // 기본: 전체 공시(옛날 방식)

if (!DATES.length) {
  box.innerHTML = `<div class="card" style="text-align:center;padding:56px;">
    <div style="font-size:18px;font-weight:800;margin-bottom:8px;">공시 데이터가 아직 없어요</div>
    <div style="font-size:13px;color:var(--muted);line-height:1.9;">GitHub 저장소에 <b>DART_API_KEY</b> 시크릿을 등록하고<br>국내 수집 워크플로(Run workflow)를 실행하면 여기에 공시 분석이 표시됩니다.</div></div>`;
} else { renderAll(); }

function renderAll() {
const DDATE = SELD==="all" ? (DATES[0] || "") : SELD;

const codeMap = {};
for (const k of Object.keys(ST.KR)) codeMap[ST.KR[k][0]] = k;
const mapRow = r => {
  const usR = r[7] === "US";
  const key = usR ? (ST.US[r[1]] ? r[1] : null) : codeMap[r[1]];
  const e = usR ? ST.US[r[1]] : (key ? ST.KR[key] : null);
  return { corp: usR && key ? ST.displayName("us", r[1]) : r[0],
           code:r[1], type:r[2], title:r[3], imp:r[4], tone:r[5], no:r[6],
           mkt: usR ? "미국" : (r[7]==="Y"?"KOSPI":"KOSDAQ"),
           us: usR, src: usR ? "us" : "kr", key, chg: e?e[3]:null };
};
const ALLD = [];
if (dset.size) {
  for (const dk of DATES) {
    for (const r of ((STORE && STORE[dk]) || [])) { const o = mapRow(r); o.date = dk; if (dk !== DATES[0]) o.chg = null; ALLD.push(o); }
    for (const r of ((STOREU && STOREU[dk]) || [])) { const o = mapRow(r); o.date = dk; if (dk !== DATES[0]) o.chg = null; ALLD.push(o); }
  }
} else {
  for (const r of FALLBACK) { const o = mapRow(r); o.date = DDATE; ALLD.push(o); }
}
const ITEMS = SELD==="all" ? ALLD : ALLD.filter(x=>x.date===SELD);

const toneLb = t => t>=2?["매우 호재","t-vgood"]:t===1?["호재","t-good"]:t===0?["중립","t-neu"]:t===-1?["악재","t-bad"]:["매우 악재","t-vbad"];
const impScore = x => { if (x.chg == null) return x.imp; const m = Math.min(1, Math.abs(x.chg)/12); return Math.max(1, Math.min(5, x.imp - 0.5 + m)); };
const impCol = v => v>=4.5?"#f0645a":v>=3.5?"#e0a63e":v>=2.5?"#f0c948":"#8fd6b8";
const dartUrl = no => "https://dart.fss.or.kr/dsaf001/main.do?rcpNo="+no;
const logo = x => {
  const usFx = x.us ? (ST.US[x.code] ? (ST.US[x.code][1]==="NASDAQ"?".O":ST.US[x.code][1]==="NYSE"?".N":".A") : ".O") : "";
  const nv = `https://ssl.pstatic.net/imgstock/fn/real/logo/stock/Stock${x.code}${usFx}.svg`;
  const ts = x.us ? nv : "https://thumb.tossinvest.com/image/resized/96x0/" + encodeURIComponent("https://static.toss.im/png-icons/securities/icn-sec-fill-"+x.code+".png");
  return `<img data-nm="${String(x.corp||"").replace(/"/g,"")}" src="${ts}" style="width:18px;height:18px;border-radius:50%;background:#fff;flex-shrink:0;vertical-align:middle;margin-right:5px;" loading="lazy"
    onerror="if(!this.dataset.f){this.dataset.f=1;this.src='${nv}';}else{this.style.visibility='hidden';}">`;
};
const linkOf = x => x.us ? x.no : dartUrl(x.no);
const mktBadge = x => `<span class="tchg" style="${x.us?"background:#13303d;color:#66c6e8;":"background:#1a2a20;color:#8fbfa0;"}">${x.mkt}</span>`;

const stat = arr => { const g=arr.filter(x=>x.tone>0).length, b=arr.filter(x=>x.tone<0).length;
  return { tot:arr.length, g, b, n:arr.length-g-b, avg: arr.length?arr.reduce((s,x)=>s+impScore(x),0)/arr.length:0 }; };
const cur = stat(ITEMS);
const prevDate = (SELD!=="all") ? DATES[DATES.indexOf(SELD)+1] : null;
const prv = stat(prevDate ? ALLD.filter(x=>x.date===prevDate) : []);
const hasPrev = !!prevDate;
const dlt = d => hasPrev ? `전일 대비 ${d>=0?"+":""}${d}건` : "";

// ── 상단 카드 5개
const docIcon = `<svg width="23" height="24" viewBox="0 0 22 24" fill="none" stroke="#4cd7a5" stroke-width="1.8" stroke-linecap="round"><path d="M4 2h9l5 5v15H4z"/><path d="M13 2v5h5"/><line x1="7.5" y1="12" x2="14.5" y2="12"/><line x1="7.5" y1="16" x2="14.5" y2="16"/></svg>`;
const upThumb = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4cd7a5" stroke-width="1.8" stroke-linejoin="round"><path d="M7 10v11H3.5V10z"/><path d="M7 11l4-8a2.2 2.2 0 0 1 2.5 2.2L13 9h6a2 2 0 0 1 2 2.4l-1.5 7.2A2.5 2.5 0 0 1 17 21H7z"/></svg>`;
const dnThumb = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f0645a" stroke-width="1.8" stroke-linejoin="round"><path d="M17 14V3h3.5v11z"/><path d="M17 13l-4 8a2.2 2.2 0 0 1-2.5-2.2L11 15H5a2 2 0 0 1-2-2.4l1.5-7.2A2.5 2.5 0 0 1 7 3h10z"/></svg>`;
const neuIcon = `<svg width="23" height="24" viewBox="0 0 22 24" fill="none" stroke="#9db9d4" stroke-width="1.8" stroke-linecap="round"><path d="M4 2h9l5 5v15H4z"/><path d="M13 2v5h5"/><line x1="7.5" y1="13.5" x2="14.5" y2="13.5"/></svg>`;
const boltIcon = `<svg width="22" height="24" viewBox="0 0 22 24"><path d="M12 1L4 13.5h5.5L9 23l8.5-12.5H12z" fill="none" stroke="#f0c948" stroke-width="1.8" stroke-linejoin="round"/></svg>`;
const dayCounts = fn => DATES.slice(0,10).reverse().map(dk => fn(ALLD.filter(x=>x.date===dk)));
const miniBars = (id,c1,c2,vals) => { const mx=Math.max(...vals,1); let b=""; const n=vals.length||1;
  vals.forEach((v,i)=>{ const h=Math.max(2,Math.round(v/mx*28)); b+=`<rect x="${i*(70/n)}" y="${32-h}" width="${Math.max(4,Math.floor(70/n)-2)}" height="${h}" rx="1.5" fill="url(#${id})"/>`; });
  return `<svg class="mini" width="70" height="34" viewBox="0 0 74 34"><defs><linearGradient id="${id}" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/></linearGradient></defs>${b}</svg>`; };
const miniLine = (id,c1,c2,vals) => { const mx=Math.max(...vals,0.1), mn=Math.min(...vals,0), rg=(mx-mn)||1, n=vals.length;
  const pts=vals.map((v,i)=>`${(i*(70/(n-1||1))).toFixed(1)},${(31-(v-mn)/rg*26).toFixed(1)}`);
  return `<svg class="mini" width="70" height="34" viewBox="0 0 72 34"><defs>
    <linearGradient id="${id}" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/></linearGradient>
    <linearGradient id="${id}f" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${c2}" stop-opacity="0.35"/><stop offset="1" stop-color="${c2}" stop-opacity="0"/></linearGradient></defs>
    <polygon points="0,34 ${pts.join(" ")} 70,34" fill="url(#${id}f)"/>
    <polyline points="${pts.join(" ")}" fill="none" stroke="url(#${id})" stroke-width="2"/></svg>`; };
const allLbl = SELD==="all" ? `최근 ${DATES.length}일 누적` : (DDATE ? `${DDATE.slice(4,6)}/${DDATE.slice(6,8)} 접수 기준` : "");
const cards = `
<div class="cards5">
  <div class="scard"><span class="ic">${docIcon}</span><div class="l"><div class="lb">${SELD==="all"?"최근 30일 공시":"오늘 전체 공시"}</div><div class="vl num">${ST.num(cur.tot)}<small> 건</small></div><div class="sub">${SELD==="all"?allLbl:(hasPrev?dlt(cur.tot-prv.tot):allLbl)}</div></div>${miniBars("dg1","#177052","#4cd7a5",dayCounts(a=>a.length))}</div>
  <div class="scard hov" onclick="openDetail('good')"><span class="ic">${upThumb}</span><div class="l"><div class="lb">호재 공시</div><div class="vl num up">${ST.num(cur.g)}<small> 건</small></div><div class="sub">${hasPrev?dlt(cur.g-prv.g):"공급계약 · 자사주 등"}</div></div>${miniBars("dg2","#0f7a56","#4cd7a5",dayCounts(a=>a.filter(x=>x.tone>0).length))}</div>
  <div class="scard hov" onclick="openDetail('bad')"><span class="ic" style="background:#f0645a1a;border-color:#f0645a44;">${dnThumb}</span><div class="l"><div class="lb">악재 공시</div><div class="vl num down">${ST.num(cur.b)}<small> 건</small></div><div class="sub">${hasPrev?dlt(cur.b-prv.b):"증자 · 소송 등"}</div></div>${miniBars("dg3","#7a2822","#f0645a",dayCounts(a=>a.filter(x=>x.tone<0).length))}</div>
  <div class="scard hov" onclick="openDetail('neu')"><span class="ic" style="background:#9db9d41a;border-color:#9db9d444;">${neuIcon}</span><div class="l"><div class="lb">중립 공시</div><div class="vl num">${ST.num(cur.n)}<small> 건</small></div><div class="sub">${hasPrev?dlt(cur.n-prv.n):"실적 · 지배구조 등"}</div></div>${miniBars("dg4","#3a4a5a","#9db9d4",dayCounts(a=>a.filter(x=>x.tone===0).length))}</div>
  <div class="scard hov" onclick="openDetail('imp')"><span class="ic" style="background:#f0c9481a;border-color:#c9a83255;">${boltIcon}</span><div class="l"><div class="lb">시장 영향도(평균)</div><div class="vl num">${cur.avg.toFixed(1)}<small> / 5</small></div><div class="sub">${hasPrev?`전일 ${prv.avg.toFixed(1)}`:"충격도 평균"}</div></div>${miniLine("dg5","#8a6f1e","#f0c948",dayCounts(a=>a.length?a.reduce((s,x)=>s+impScore(x),0)/a.length:0))}</div>
</div>`;

// ── 필터 + 테이블
let CAT = "all", SORT = "imp", MKT = "all", SHOW = 12, Q = "";
const TYPES = ["유상증자","전환사채","공급계약","최대주주 변경","소송","실적·영업","감사의견","증권 발행","거래정지","투자주의·경고","실적 보고","주요 사건","지분 공시"];
function pool(){
  let p = Q ? ALLD.filter(x => x.corp.includes(Q) || x.code.includes(Q) || x.title.includes(Q)) : ITEMS.slice();
  p = p.filter(x => CAT==="all" || x.type===CAT || (CAT==="기타" && !TYPES.includes(x.type)));
  if (MKT!=="all") p = p.filter(x=>x.mkt===MKT);
  p = p.slice();
  if (SORT==="imp") p.sort((a,b)=>impScore(b)-impScore(a) || Math.abs(b.chg||0)-Math.abs(a.chg||0));
  else if (SORT==="chg") p.sort((a,b)=>Math.abs(b.chg||0)-Math.abs(a.chg||0));
  else if (SORT==="time") p.sort((a,b)=>((b.date||"")+b.no).localeCompare((a.date||"")+a.no));
  return p;
}
const tblCard = `
<div class="card"><h3>${SELD==="all"?"최근 "+DATES.length+"일 공시":"오늘의 공시 충격도 TOP 10"}
  <span style="margin-left:auto;position:relative;flex-shrink:0;display:inline-flex;">
    <input id="dscq" placeholder="기업명 · 코드 · 제목 검색" autocomplete="off"
      style="width:230px;padding:8px 32px 8px 12px;font-size:12px;background:var(--panel2);border:1.5px solid var(--border);border-radius:9px;color:var(--text);outline:none;font-weight:500;">
    <span class="mag">⌕</span></span></h3>
  <div id="catbar" class="fbar" style="margin-bottom:12px;"></div>
  <div id="selbar" class="selbar" style="justify-content:flex-end;margin-bottom:14px;"></div>
  <table class="stbl"><thead><tr><th>공시일</th><th>종목명</th><th>공시 유형</th><th>시장</th><th>공시 제목</th><th>충격도 (1~5)</th><th>영향도</th><th>주가 반응(당일)</th></tr></thead>
  <tbody id="tbody"></tbody></table>
  <button class="morebtn" id="morebtn">더보기 ▾</button>
</div>`;
function drawBar(){
  document.getElementById("catbar").innerHTML =
    [["all","전체"]].concat(TYPES.map(t=>[t,t])).concat([["기타","기타"]]).map(([k,t])=>
      `<span class="fchip ${CAT===k?"on":""}" onclick="setCat('${k}')">${t}</span>`).join("");
  document.getElementById("selbar").innerHTML =
    `<select onchange="setDate(this.value)">
       <option value="all" ${SELD==="all"?"selected":""}>전체 공시 (${DATES.length}일)</option>
       ${DATES.map((d,i)=>`<option value="${d}" ${d===SELD?"selected":""}>${i===0?"오늘 ":""}${d.slice(4,6)}/${d.slice(6,8)}</option>`).join("")}
     </select>
     <select onchange="setMkt(this.value)">
       <option value="all" ${MKT==="all"?"selected":""}>전체 시장</option>
       <option value="KOSPI" ${MKT==="KOSPI"?"selected":""}>코스피</option>
       <option value="KOSDAQ" ${MKT==="KOSDAQ"?"selected":""}>코스닥</option>
       <option value="미국" ${MKT==="미국"?"selected":""}>미국</option></select>
     <select onchange="setSort(this.value)">
       <option value="imp" ${SORT==="imp"?"selected":""}>충격도 높은 순</option>
       <option value="chg" ${SORT==="chg"?"selected":""}>주가 반응 순</option>
       <option value="time" ${SORT==="time"?"selected":""}>접수 순</option></select>
     <button class="xbtn" onclick="dlExcel()">엑셀 다운로드 ⬇</button>`;
}
window.setCat = k => { CAT=k; SHOW=12; drawBar(); drawTbl(); };
window.setSort = v => { SORT=v; SHOW=12; drawTbl(); };
window.setMkt = v => { MKT=v; SHOW=12; drawTbl(); };
window.setDate = v => { SELD=v; renderAll(); };
window.dlExcel = () => {
  const p = pool();
  const head = ["순위","종목명","코드","공시유형","시장","공시제목","충격도","영향도","주가반응(%)","공시일"];
  const rows = p.map((x,i)=>[i+1,x.corp,x.code,x.type,x.mkt,x.title,impScore(x).toFixed(1),toneLb(x.tone)[0],x.chg!=null?x.chg:"",x.date||""]);
  const csv = "﻿" + [head,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\r\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));
  a.download = `공시충격도_${SELD==="all"?"전체":DDATE}.csv`; a.click();
};
function drawTbl(){
  const p = pool();
  document.getElementById("tbody").innerHTML = p.slice(0,SHOW).map(x=>{
    const [tl,tc] = toneLb(x.tone); const sc = impScore(x);
    return `<tr>
      <td class="num" style="color:var(--muted);font-size:11px;">${x.date?x.date.slice(4,6)+"/"+x.date.slice(6,8):"-"}</td>
      <td class="nm" ${x.key?`style="cursor:pointer;" onclick="location.href='${ST.stockUrl(x.src,x.key)}'"`:""}>${logo(x)}${x.corp}</td>
      <td><span class="tchg" style="${x.us?"background:#13303d;color:#66c6e8;":"background:#22303c;color:#9db9d4;"}">${x.type}</span></td>
      <td>${mktBadge(x)}</td>
      <td class="tt"><a href="${linkOf(x)}" target="_blank" rel="noopener" title="${x.title}">${x.title}</a></td>
      <td><span class="impn" style="background:${impCol(sc)};">${sc.toFixed(1)}</span></td>
      <td><span class="vbadge ${tc}">${tl}</span></td>
      <td class="num ${x.chg!=null?ST.cls(x.chg):""}" style="font-weight:800;">${x.chg!=null?ST.pct2(x.chg):"-"}</td>
    </tr>`;
  }).join("") || `<tr><td colspan="8" style="color:var(--dim);padding:16px;">해당 유형 공시가 없습니다</td></tr>`;
  document.getElementById("morebtn").style.display = p.length > SHOW ? "block" : "none";
}
window.moreRows = () => { SHOW += 20; drawTbl(); };

// ── 상세 팝업 (호재/악재/중립/영향도)
window.openDetail = kind => {
  let list, title;
  if (kind==="good") { list = ITEMS.filter(x=>x.tone>0); title = "호재 공시 상세"; }
  else if (kind==="bad") { list = ITEMS.filter(x=>x.tone<0); title = "악재 공시 상세"; }
  else if (kind==="neu") { list = ITEMS.filter(x=>x.tone===0); title = "중립 공시 상세"; }
  else { list = ITEMS.slice(); title = "시장 영향도 상세"; }
  list = list.slice().sort((a,b)=>impScore(b)-impScore(a) || Math.abs(b.chg||0)-Math.abs(a.chg||0));
  const g=ITEMS.filter(x=>x.tone>0).length, b=ITEMS.filter(x=>x.tone<0).length, n=ITEMS.length-g-b;
  const head = kind==="imp"
    ? `<div style="font-size:11.5px;color:var(--muted);line-height:1.9;margin-bottom:10px;">평균 충격도 <b style="color:var(--gold);">${cur.avg.toFixed(1)} / 5</b> · 호재 <b style="color:#4cd7a5;">${g}</b> · 악재 <b style="color:#f0708a;">${b}</b> · 중립 <b style="color:#9db9d4;">${n}</b></div>`
    : `<div style="font-size:11.5px;color:var(--muted);margin-bottom:10px;">${title.replace(" 상세","")} 총 <b style="color:var(--text);">${list.length}건</b> · 충격도 높은 순</div>`;
  document.getElementById("dmTitle").textContent = `${title} (${list.length}건)`;
  const colHead = `<div class="dmhead">
    <span style="width:56px;flex-shrink:0;">유형</span>
    <span class="tx">기업명 · 공시 제목</span>
    <span style="width:52px;text-align:center;flex-shrink:0;">판정</span>
    <span style="width:40px;text-align:center;flex-shrink:0;">충격도</span>
    <span style="width:58px;text-align:right;flex-shrink:0;">등락률</span></div>`;
  document.getElementById("dmBody").innerHTML = head + colHead + (list.length ? list.slice(0,80).map(x=>{
    const [tl,tc] = toneLb(x.tone);
    return `<div class="dmrow">
      <span class="tchg" style="${x.us?"background:#13303d;color:#66c6e8;":"background:#22303c;color:#9db9d4;"};flex-shrink:0;">${x.type}</span>
      <span class="tx">${x.corp} <a href="${linkOf(x)}" target="_blank" rel="noopener" style="color:var(--muted);font-weight:500;">${x.title}</a></span>
      <span class="vbadge ${tc}" style="flex-shrink:0;">${tl}</span>
      <span class="impn" style="background:${impCol(impScore(x))};flex-shrink:0;">${impScore(x).toFixed(1)}</span>
      ${x.chg!=null?`<b class="num ${ST.cls(x.chg)}" style="font-size:11px;width:58px;text-align:right;flex-shrink:0;">${ST.pct2(x.chg)}</b>`:`<span style="width:58px;flex-shrink:0;"></span>`}
    </div>`;}).join("") : `<div style="font-size:12px;color:var(--dim);padding:14px;">해당 공시가 없습니다</div>`);
  document.getElementById("detailModal").style.display = "flex";
};

// ── 분포: 유형별(막대) + 충격도(막대)
const typeCnt = {};
for (const x of ITEMS) typeCnt[x.type] = (typeCnt[x.type]||0)+1;
const tEntries = Object.entries(typeCnt).sort((a,b)=>b[1]-a[1]).slice(0,9);
const mxT = Math.max(...tEntries.map(e=>e[1]),1);
const barIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2.2" stroke-linecap="round"><line x1="6" y1="20" x2="6" y2="11"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="18" y1="20" x2="18" y2="14"/></svg>`;
const typeBars = tEntries.map(([k,c])=>{
  const p = ITEMS.length?c/ITEMS.length*100:0;
  return `<div class="tyrow"><span class="k">${k}</span>
    <span class="track"><span class="fill" style="width:${Math.max(3,c/mxT*100).toFixed(1)}%;"></span></span>
    <span class="v"><b>${ST.num(c)}건</b><span class="pc">${p.toFixed(1)}%</span></span></div>`;
}).join("");
const distCard = `<div class="card" style="display:flex;flex-direction:column;">
  <h3><span class="hicon">${barIcon}</span>공시 유형별 분포<span class="hii">ⓘ</span></h3>
  <div style="flex:1;display:flex;flex-direction:column;gap:8px;justify-content:center;margin-top:6px;">${typeBars || `<div style="font-size:12px;color:var(--dim);">데이터 없음</div>`}</div></div>`;

const impCnt = [0,0,0,0,0];
for (const x of ITEMS) impCnt[Math.min(5,Math.max(1,Math.round(impScore(x))))-1]++;
const mxI = Math.max(...impCnt,1);
const impLb = ["1 (미미)","2 (낮음)","3 (보통)","4 (높음)","5 (매우)"];
const barIconG = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2.2" stroke-linecap="round"><line x1="6" y1="20" x2="6" y2="11"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="18" y1="20" x2="18" y2="14"/></svg>`;
const impPct = impCnt.map(c=>ITEMS.length?c/ITEMS.length*100:0);
const axisMax = Math.max(20, Math.ceil(Math.max(...impPct,1)/20)*20);
const gridVals = []; for (let v=axisMax; v>=0; v-=20) gridVals.push(v);
const impGrad = ["linear-gradient(180deg,#2dd4bf,#0f766e)","linear-gradient(180deg,#34d399,#059669)","linear-gradient(180deg,#fbbf24,#d97706)","linear-gradient(180deg,#fb923c,#ea580c)","linear-gradient(180deg,#f87171,#dc2626)"];
const impLabCol = ["#2dd4bf","#34d399","#fbbf24","#fb923c","#f87171"];
const maxIdx = impPct.indexOf(Math.max(...impPct));
const impCard = `<div class="card" style="display:flex;flex-direction:column;">
  <h3><span class="hicon g">${barIconG}</span>충격도 분포</h3>
  <div style="font-size:11px;color:var(--muted);margin:-2px 0 0 2px;">전체 종목 대상 충격도 등급 분포 현황</div>
  <div class="impchart">
    <div class="grid">${gridVals.map(v=>`<div class="gl" style="top:${((axisMax-v)/axisMax*100).toFixed(1)}%;"><span>${v}%</span></div>`).join("")}</div>
    <div class="cols">${impCnt.map((c,i)=>`<div class="col">
      <div class="lab" style="color:${impLabCol[i]};">${ST.num(c)}건<span class="pc">${impPct[i].toFixed(1)}%</span></div>
      <div class="bar" style="height:${(impPct[i]/axisMax*100).toFixed(1)}%;background:${impGrad[i]};"></div></div>`).join("")}</div>
    <div class="xrow">${impLb.map((l,i)=>`<span style="${i===maxIdx?`color:${impLabCol[i]};font-weight:800;`:""}">${l}</span>`).join("")}</div>
  </div>
  <div class="chartfoot"><span style="color:#5ab0e0;">ⓘ</span> 기준: 전체 종목 &nbsp;|&nbsp; 단위: 종목 수, 비율(%)</div>
</div>`;

const critRows = [["5점","#f0645a","거래정지 · 상폐 · 횡령/배임 · 투자위험"],
                  ["4점","#f0c948","유상증자 · 전환사채 · 대형 공급계약 · 소송"],
                  ["3점","#4cd7a5","실적 · 자사주 · 최대주주 변경 · 배당"],
                  ["2점","#4aa8d8","정정 · 정기보고서 · 기타"]];
const critCard = `<div class="card" style="display:flex;flex-direction:column;">
  <h3><span style="width:26px;height:26px;border-radius:8px;background:#13322a;border:1px solid #2e5c47;display:inline-flex;align-items:center;justify-content:center;margin-right:2px;">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#4cd7a5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 4V2.5h6V4"/><path d="M8.5 12l2 2 4-4.5"/></svg></span>
    충격도 산정 기준</h3>
  <div style="flex:1;display:flex;flex-direction:column;gap:14px;justify-content:space-between;margin:10px 0;">
    ${critRows.map(([sc,col,desc])=>`
      <div style="flex:1;min-height:58px;display:flex;align-items:center;gap:16px;background:linear-gradient(90deg,${col}26,transparent 60%);border:1px solid var(--border);border-left:4px solid ${col};border-radius:12px;padding:16px 18px;">
        <b style="color:${col};font-size:15px;flex-shrink:0;width:32px;">${sc}</b>
        <span style="width:1px;height:22px;background:var(--border);flex-shrink:0;"></span>
        <span style="font-size:13px;color:var(--text);font-weight:600;">${desc}</span></div>`).join("")}
  </div>
  <div style="display:flex;gap:11px;align-items:flex-start;background:var(--panel2);border:1px solid var(--border);border-radius:11px;padding:12px 14px;">
    <span style="color:#66c6e8;flex-shrink:0;font-size:15px;line-height:1.3;">ⓘ</span>
    <span style="font-size:11px;color:var(--dim);line-height:1.7;">충격도 = 공시 유형 심각도 + 당일 주가 반응을 종합한 지표. 제목 키워드 기반 자동 분류이며 실제 영향과 다를 수 있습니다.</span></div>
</div>`;

// ── 하단 3분할
const alertCard = `<div class="card" style="display:flex;flex-direction:column;"><h3>실시간 공시 알림 <span class="more" style="cursor:default;">접수 최신순</span></h3>
  <div style="flex:1;">${ITEMS.slice().sort((a,b)=>((b.date||"")+b.no).localeCompare((a.date||"")+a.no)).slice(0,5).map(x=>`<div class="alrow">
    <span class="tchg" style="background:#22303c;color:#9db9d4;flex-shrink:0;display:inline-flex;justify-content:center;width:76px;box-sizing:border-box;">${x.type}</span>
    <span class="tx"><b style="color:var(--text);">${x.corp}</b> <a href="${linkOf(x)}" target="_blank" rel="noopener" style="color:var(--muted);">${x.title}</a></span>
    <span class="impn" style="background:${impCol(impScore(x))};flex-shrink:0;">${impScore(x).toFixed(1)}</span></div>`).join("")}</div></div>`;

const hotDisc = ITEMS.filter(x=>x.chg!=null).sort((a,b)=>Math.abs(b.chg)-Math.abs(a.chg)).slice(0,5);
const hotCard = `<div class="card" style="display:flex;flex-direction:column;"><h3>시장 영향도 높은 공시 <span class="more" style="cursor:default;">주가 반응 순</span></h3>
  <div style="flex:1;">${hotDisc.length ? hotDisc.map((x,i)=>`<div class="nrow2" ${x.key?`onclick="location.href='${ST.stockUrl(x.src,x.key)}'"`:""}>
    <span class="rank">${i+1}</span><span class="tx">${x.corp}</span>
    <span class="tchg" style="background:#22303c;color:#9db9d4;">${x.type}</span>
    <b class="num ${ST.cls(x.chg)}" style="font-size:11.5px;">${ST.pct2(x.chg)}</b>
    <span class="impn" style="background:${impCol(impScore(x))};font-size:10px;">${impScore(x).toFixed(1)}</span></div>`).join("")
  : `<div style="font-size:12px;color:var(--dim);">주가 매칭 가능한 공시가 없습니다</div>`}</div></div>`;

const sums = [];
const realTypes = tEntries.filter(([k])=>k!=="기타" && k!=="주요 사건");
if (realTypes.length) sums.push(`가장 많은 공시 유형은 <b style="color:var(--text);">${realTypes[0][0]}</b> (${ST.num(realTypes[0][1])}건)`);
const halt = ITEMS.filter(x=>x.type==="거래정지").length;
if (halt) sums.push(`<b style="color:#f0708a;">거래정지 관련 ${ST.num(halt)}건</b> — 상장폐지·정리매매 리스크 점검 필요`);
if (hotDisc.length) sums.push(`주가 반응 최대: <b style="color:var(--text);">${hotDisc[0].corp}</b> (<span class="${ST.cls(hotDisc[0].chg)}">${ST.pct2(hotDisc[0].chg)}</span>)`);
const imp5 = ITEMS.filter(x=>Math.round(impScore(x))>=5).length;
if (imp5) sums.push(`충격도 5 공시 <b style="color:var(--text);">${ST.num(imp5)}건</b> — 단기 변동성 확대 주의`);
sums.push(`${cur.g>=cur.b?"호재":"악재"} 우위 (호재 ${ST.num(cur.g)} · 악재 ${ST.num(cur.b)}) — 시장 심리 <b style="color:var(--text);">${cur.g>=cur.b?"우호적":"보수적"}</b>`);
sums.push("공시 원문은 제목 클릭 시 DART에서 확인할 수 있습니다");
const sumCard = `<div class="card" style="display:flex;flex-direction:column;"><h3>공시 해석 요약</h3>
  <ul class="bullets2" style="flex:1;display:flex;flex-direction:column;justify-content:space-around;">${sums.slice(0,5).map(s=>`<li>${s}</li>`).join("")}</ul></div>`;

box.innerHTML = `
${cards}
${tblCard}
<div class="row3b">${distCard}${impCard}${critCard}</div>
<div class="row3b">${alertCard}${hotCard}${sumCard}</div>
<div class="dmodal" id="detailModal" onclick="if(event.target===this)this.style.display='none'">
  <div style="background:var(--panel);border:1px solid var(--border);border-radius:16px;width:min(600px,94vw);max-height:82vh;display:flex;flex-direction:column;padding:20px 22px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <b id="dmTitle" style="font-size:16px;"></b>
      <span style="cursor:pointer;color:var(--muted);padding:2px 6px;font-size:16px;" onclick="document.getElementById('detailModal').style.display='none'">✕</span></div>
    <div id="dmBody" style="overflow:auto;flex:1;"></div>
  </div>
</div>`;

drawBar(); drawTbl();
document.getElementById("morebtn").onclick = () => window.moreRows();
document.getElementById("dscq").addEventListener("input", e => { Q = e.target.value.trim(); SHOW = 12; drawTbl(); });
}
</script>
</body>
</html>
