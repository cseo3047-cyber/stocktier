<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stocktier — 오늘의 시장</title>
<link rel="stylesheet" href="style.css">
<style>
  .wrap { max-width:1460px; }
  .idxgrid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:14px; margin-bottom:14px; }
  @media (max-width:1080px){ .idxgrid { grid-template-columns:repeat(2,minmax(0,1fr)); } }
  @media (max-width:600px){ .idxgrid { grid-template-columns:1fr; } }
  .idxcard { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:16px 18px; display:flex; gap:12px; align-items:center; }
  .idxcard .l { flex:1; min-width:0; }
  .idxcard .nm { font-size:13px; color:var(--muted); font-weight:700; margin-bottom:4px; }
  .idxcard .pr { font-size:23px; font-weight:800; font-variant-numeric:tabular-nums; }
  .idxcard .ch { font-size:12.5px; font-weight:700; margin-top:2px; }
  .idxcard .hl { font-size:11px; color:var(--dim); margin-top:5px; line-height:1.6; }
  .row2 { display:grid; grid-template-columns:1.4fr 1fr; gap:14px; margin-bottom:14px; }
  @media (max-width:1000px){ .row2 { grid-template-columns:1fr; } }
  .row3 { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:14px; margin-bottom:14px; }
  @media (max-width:1000px){ .row3 { grid-template-columns:1fr; } }
  .row4 { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:14px; margin-bottom:14px; }
  @media (max-width:1080px){ .row4 { grid-template-columns:repeat(2,minmax(0,1fr)); } }
  @media (max-width:600px){ .row4 { grid-template-columns:1fr; } }
  /* 지수 차트 */
  .chartbox { position:relative; }
  .chartbox svg { width:100%; height:280px; display:block; }
  .lastbadge { position:absolute; right:8px; background:var(--gold); color:#1a1608; font-size:11px; font-weight:800; border-radius:6px; padding:2px 8px; }
  .chartfoot { display:flex; gap:18px; border-top:1px solid var(--border); padding-top:11px; margin-top:8px; font-size:12.5px; flex-wrap:wrap; }
  .chartfoot b { font-weight:800; }
  /* 업종 지도 */
  .umap { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
  .umap .tile { border-radius:8px; padding:11px 6px; text-align:center; min-width:0; }
  .umap .tile .nm { font-size:11.5px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .umap .tile .pc { font-size:12px; font-weight:800; margin-top:3px; }
  .maplegend { display:flex; justify-content:space-between; font-size:10px; color:var(--dim); margin-top:9px; }
  .maplegend .bar { flex:1; height:5px; margin:5px 8px 0; border-radius:3px; background:linear-gradient(90deg,#c14a42,#5a4a44 45%,#3c5a4a 55%,#1d9e75); }
  /* 강도 지표 */
  .gaugerow { display:flex; align-items:center; gap:10px; padding:7px 0; font-size:13px; }
  .gaugerow .lb { width:118px; color:var(--muted); flex-shrink:0; }
  .gaugerow .vl { width:86px; font-weight:800; text-align:right; flex-shrink:0; }
  .gaugerow .m { flex:1; height:6px; background:var(--panel2); border:1px solid var(--border); border-radius:4px; overflow:hidden; }
  .gaugerow .m i { display:block; height:100%; background:var(--up); border-radius:4px; }
  /* 불릿 */
  .bullets { font-size:13px; color:var(--muted); line-height:2.0; }
  .bullets li { list-style:none; padding-left:20px; position:relative; }
  .bullets li:before { content:"✓"; position:absolute; left:0; color:var(--up); font-weight:800; }
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>
<div class="wrap">
  <span class="asof" id="asof"></span>
  <div class="page-title">오늘의 시장</div>
  <div class="page-sub">국내 증시 흐름과 자금의 방향을 한눈에 확인하세요.</div>
  <div class="notice hidden" id="notice"></div>

  <div class="idxgrid" id="idxcards"></div>

  <div class="row2">
    <div class="card">
      <h3>국내 증시 추이
        <span style="margin-left:14px;display:flex;gap:6px;" class="chips" id="idxchips"></span>
        <span style="margin-left:auto;display:flex;gap:6px;" class="chips" id="perchips"></span>
      </h3>
      <div class="chartbox"><svg id="chart" viewBox="0 0 800 280" preserveAspectRatio="none"></svg><span class="lastbadge hidden" id="lastb"></span></div>
      <div class="chartfoot" id="chartfoot"></div>
    </div>
    <div class="card">
      <h3>업종별 등락 지도 <span class="more" style="cursor:default;" id="mapnote"></span></h3>
      <div class="umap" id="umap"></div>
      <div class="maplegend"><span>하락</span><span class="bar"></span><span>상승</span></div>
    </div>
  </div>

  <div class="row3">
    <div class="card"><h3>📊 시장 강도 지표</h3><div id="strength"></div></div>
    <div class="card"><h3>💰 오늘의 자금 흐름 <span class="more" style="cursor:default;">외인+기관 순매수 상위</span></h3><div class="rowlist" id="flow"></div></div>
    <div class="card"><h3>📋 오늘의 시장 한줄 요약</h3><ul class="bullets" id="checkpts"></ul></div>
  </div>

  <div class="row4">
    <div class="card"><h3>📈 상승 업종 TOP 5</h3><div class="rowlist" id="upTop"></div></div>
    <div class="card"><h3>📉 하락 업종 TOP 5</h3><div class="rowlist" id="dnTop"></div></div>
    <div class="card"><h3>🔥 돈 몰리는 테마 <span class="more" style="cursor:default;">등락률 순</span></h3><div class="rowlist" id="themes"></div></div>
    <div class="card"><h3>🚨 과열 경고 <span class="more" onclick="location.href='risk.html'">더보기 ›</span></h3><div class="rowlist" id="warn"></div></div>
  </div>

  <div class="footer">Stocktier는 재미용 사이트입니다. 지표는 오락 목적의 가공 수치이며 투자 권유·조언이 아닙니다.<br>데이터 출처: 네이버 증권 공개 데이터</div>
</div>

<script src="data.js"></script>
<script src="data_us.js"></script>
<script src="common.js"></script>
<script>
ST.nav("market.html");
document.getElementById("asof").textContent = "업데이트: " + ST.asofText();

const MK = window.STOCK_MARKET || null;
const A = ST.all().filter(x=>x.src==="kr");
for (const x of A) { x.rk = ST.risk(x.e); x.sc = ST.score(x.e, false); }

const fmt2 = n => n==null ? "-" : Number(n).toLocaleString("ko-KR",{minimumFractionDigits:2,maximumFractionDigits:2});
const arrow = r => r>0?"▲":r<0?"▼":"";
let amt = 0; for (const x of A) amt += x.e[2]*x.e[11];
const upN = A.filter(x=>x.e[3]>0).length, dnN = A.filter(x=>x.e[3]<0).length, flN = A.length-upN-dnN;

if (!MK) {
  const n = document.getElementById("notice");
  n.textContent = "시장 데이터(지수·업종·테마)가 아직 없습니다. 새 collect_data.py로 워크플로를 실행하면 이 페이지가 채워집니다.";
  n.classList.remove("hidden");
}

// ── 상단 지수 카드 4개
(function(){
  const defs = [["kospi","KOSPI"],["kosdaq","KOSDAQ"],["kpi200","코스피200"]];
  let html = "";
  for (const [k, nm] of defs) {
    const o = MK && MK[k];
    if (!o) { html += `<div class="idxcard"><div class="l"><div class="nm">${nm}</div><div class="pr" style="color:var(--dim);font-size:15px;">데이터 수집 대기</div></div></div>`; continue; }
    const spark = o.hist ? ST.spark(histToDays(o.hist), 96, 44) : "";
    html += `<div class="idxcard">
      <div class="l">
        <div class="nm">${nm}</div>
        <div class="pr num">${fmt2(o.price)}</div>
        <div class="ch ${o.ratio>0?"up":o.ratio<0?"down":"flat"} num">${arrow(o.ratio)}${Math.abs(o.chg||0).toLocaleString("ko-KR")} ${ST.pct2(o.ratio)}</div>
        ${o.high ? `<div class="hl num">고가 ${fmt2(o.high)} · 저가 ${fmt2(o.low)}</div>` : ""}
      </div>${spark}</div>`;
  }
  html += `<div class="idxcard"><div class="l">
    <div class="nm">거래대금 (추정)</div>
    <div class="pr num">${(amt/1e12).toFixed(1)}조</div>
    <div class="hl num">상승 <b class="up">${ST.num(upN)}</b> · 하락 <b class="down">${ST.num(dnN)}</b> · 보합 ${ST.num(flN)}</div></div></div>`;
  document.getElementById("idxcards").innerHTML = html;
})();
// hist(종가 배열) → 스파크라인용 일별 등락 배열
function histToDays(hist){
  const days = [];
  for (let i = hist.length-1; i > 0 && days.length < 20; i--) {
    days.push(hist[i-1] ? (hist[i]-hist[i-1])/hist[i-1]*100 : 0);
  }
  return days;
}

// ── 메인 차트
let curIdx = "kospi", curPer = 65;
const IDXS = [["kospi","KOSPI"],["kosdaq","KOSDAQ"],["kpi200","코스피200"]];
const PERS = [["1개월",21],["3개월",65]];
document.getElementById("idxchips").innerHTML = IDXS.map(([v,t],i)=>`<span class="chip ${i===0?"on":""}" data-v="${v}" onclick="setIdx('${v}')">${t}</span>`).join("");
document.getElementById("perchips").innerHTML = PERS.map(([t,v],i)=>`<span class="chip ${i===1?"on":""}" data-v="${v}" onclick="setPer(${v})">${t}</span>`).join("");
window.setIdx = v => { curIdx=v; document.querySelectorAll("#idxchips .chip").forEach(c=>c.classList.toggle("on",c.dataset.v===v)); drawChart(); };
window.setPer = v => { curPer=v; document.querySelectorAll("#perchips .chip").forEach(c=>c.classList.toggle("on",+c.dataset.v===v)); drawChart(); };

function drawChart(){
  const svg = document.getElementById("chart"), badge = document.getElementById("lastb");
  const o = MK && MK[curIdx];
  if (!o || !o.hist || o.hist.length < 5) {
    svg.innerHTML = `<text x="400" y="140" text-anchor="middle" fill="#5a737d" font-size="14">지수 추이 데이터가 아직 없습니다</text>`;
    badge.classList.add("hidden");
    document.getElementById("chartfoot").innerHTML = "";
    return;
  }
  const h = o.hist.slice(-curPer);
  const W=800, H=280, padL=10, padR=64, padT=16, padB=14;
  const mn = Math.min(...h), mx = Math.max(...h), rg = (mx-mn)||1;
  const X = i => padL + i/(h.length-1)*(W-padL-padR);
  const Y = v => padT + (1-(v-mn)/rg)*(H-padT-padB);
  let pts = h.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(" ");
  const up = h[h.length-1] >= h[0];
  const col = up ? "#4cd7a5" : "#f0645a";
  // 그리드 3줄 + 라벨
  let grid = "";
  for (let g=0; g<=3; g++) {
    const v = mn + rg*g/3, y = Y(v);
    grid += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#1c3440" stroke-width="1"/>
             <text x="${W-padR+6}" y="${y+4}" fill="#5a737d" font-size="11">${Math.round(v).toLocaleString("ko-KR")}</text>`;
  }
  svg.innerHTML = grid +
    `<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2"/>` +
    `<polygon points="${padL},${H-padB} ${pts} ${X(h.length-1)},${H-padB}" fill="${col}" opacity="0.07"/>`;
  badge.textContent = fmt2(h[h.length-1]);
  badge.style.top = Math.max(2, Y(h[h.length-1])-10) + "px";
  badge.classList.remove("hidden");
  document.getElementById("chartfoot").innerHTML = `
    <span>등락종목&nbsp; 상승 <b class="up num">${ST.num(upN)}</b></span>
    <span>하락 <b class="down num">${ST.num(dnN)}</b></span>
    <span>보합 <b class="num">${ST.num(flN)}</b></span>
    <span style="margin-left:auto;">거래대금(추정) <b class="num">${(amt/1e12).toFixed(1)}조원</b></span>`;
}
drawChart();

// ── 업종별 등락 지도 (상승 10 + 하락 10)
(function(){
  const el = document.getElementById("umap");
  const tileColor = c => {
    if (c >= 3) return ["#1d9e75","#eafff6"]; if (c >= 1) return ["#2a6e52","#d9f5e8"];
    if (c > 0) return ["#28503f","#bfe0cf"]; if (c === 0) return ["#33413a","#9db8a9"];
    if (c > -1) return ["#4a3733","#e8c9c2"]; if (c > -3) return ["#8a4038","#ffe3dd"];
    return ["#c14a42","#fff0ee"];
  };
  if (MK && MK.upjong && MK.upjong.length >= 10) {
    const tiles = MK.upjong.slice(0,10).concat(MK.upjong.slice(-10));
    document.getElementById("mapnote").textContent = `상승·하락 상위 ${tiles.length}개 업종`;
    el.innerHTML = tiles.map(([nm,rate])=>{
      const [bg,fg] = tileColor(rate);
      return `<div class="tile" style="background:${bg};color:${fg};" title="${nm}">
        <div class="nm">${nm}</div><div class="pc num">${ST.pct2(rate)}</div></div>`;
    }).join("");
  } else {
    el.innerHTML = `<div style="grid-column:1/-1;font-size:12px;color:var(--dim);padding:20px;text-align:center;">업종 데이터 수집 대기 중</div>`;
  }
})();

// ── 시장 강도 지표
(function(){
  let fSum = 0, oSum = 0, has = false;
  for (const x of A) {
    if (x.e.length > 18 && x.e[17] != null) { fSum += x.e[17]*x.e[2]; has = true; }
    if (x.e.length > 18 && x.e[18] != null) { oSum += x.e[18]*x.e[2]; }
  }
  const vol5 = A.length ? A.reduce((a,x)=>a+x.e[12].reduce((s,d)=>s+Math.abs(d),0)/5,0)/A.length : 0;
  const upRatio = A.length ? Math.round(upN/A.length*100) : 0;
  const sN = A.filter(x=>x.sc>=80).length;
  const rows = [
    ["상승종목 비율", upRatio+"%", upRatio, false],
    ["S티어 종목 수", ST.num(sN)+"개", Math.min(100,sN/3), false],
    has ? ["외인 순매수(전일)", (fSum>=0?"+":"")+Math.round(fSum/1e8).toLocaleString("ko-KR")+"억", Math.min(100,Math.abs(fSum)/3e11*100), fSum<0] : null,
    has ? ["기관 순매수(전일)", (oSum>=0?"+":"")+Math.round(oSum/1e8).toLocaleString("ko-KR")+"억", Math.min(100,Math.abs(oSum)/3e11*100), oSum<0] : null,
    ["평균 변동성(5일)", vol5.toFixed(2)+"%", Math.min(100,vol5*20), vol5>=3],
  ].filter(Boolean);
  document.getElementById("strength").innerHTML = rows.map(([lb,vl,pct,warn])=>`
    <div class="gaugerow"><span class="lb">${lb}</span>
      <div class="m"><i style="width:${Math.max(3,Math.min(100,pct))}%;${warn?"background:var(--down);":""}"></i></div>
      <span class="vl num" style="${warn?"color:var(--down);":""}">${vl}</span></div>`).join("");
})();

// ── 자금 흐름 (외인+기관 순매수 금액 상위 종목)
(function(){
  const el = document.getElementById("flow");
  const cand = A.filter(x=>x.e.length>18 && x.e[17]!=null && x.e[18]!=null)
    .map(x=>({x, amt:(x.e[17]+x.e[18])*x.e[2]/1e8}))
    .filter(c=>c.amt>0).sort((a,b)=>b.amt-a.amt).slice(0,5);
  el.innerHTML = cand.length ? cand.map((c,i)=>`
    <div class="row" onclick="location.href='${ST.stockUrl("kr",c.x.key)}'">
      <span class="rank">${i+1}</span><span class="nm">${c.x.key}</span>
      <span class="num ${ST.cls(c.x.e[3])}" style="width:64px;text-align:right;">${ST.pct2(c.x.e[3])}</span>
      <span class="num up" style="width:90px;text-align:right;font-weight:800;">+${Math.round(c.amt).toLocaleString("ko-KR")}억</span></div>`).join("")
    : `<div style="font-size:12px;color:var(--dim);padding:10px 0;">수급 데이터 수집 대기 중</div>`;
})();

// ── 한줄 요약 (데이터 기반 자동 생성)
(function(){
  const b = [];
  if (MK && MK.kospi) b.push(`코스피 ${fmt2(MK.kospi.price)} (${ST.pct2(MK.kospi.ratio)})${MK.kosdaq?`, 코스닥 ${ST.pct2(MK.kosdaq.ratio)}`:""} 마감`);
  b.push(`전체 ${ST.num(A.length)}종목 중 상승 ${ST.num(upN)} · 하락 ${ST.num(dnN)}`);
  if (MK && MK.upjong && MK.upjong.length) b.push(`강세 업종: ${MK.upjong.slice(0,3).map(u=>u[0]).join(", ")}`);
  if (MK && MK.theme && MK.theme.length) b.push(`주도 테마: ${MK.theme[0][0]} (${ST.pct2(MK.theme[0][1])})`);
  const hotN = A.filter(x=>x.rk>=70).length;
  b.push(`과열·위험 신호 종목 ${ST.num(hotN)}개 — 리스크 워치 확인`);
  document.getElementById("checkpts").innerHTML = b.map(t=>`<li>${t}</li>`).join("");
})();

// ── 상승/하락 업종 TOP 5, 테마
(function(){
  const mk5 = (list, el) => {
    document.getElementById(el).innerHTML = list.length ? list.map((u,i)=>`
      <div class="row" style="cursor:default;">
        <span class="rank">${i+1}</span><span class="nm">${u[0]}</span>
        <span class="sub num">${u[2]}↑ ${u[3]}↓</span>
        <span class="num ${ST.cls(u[1])}" style="width:66px;text-align:right;font-weight:800;">${ST.pct2(u[1])}</span></div>`).join("")
      : `<div style="font-size:12px;color:var(--dim);padding:10px 0;">수집 대기 중</div>`;
  };
  mk5(MK && MK.upjong ? MK.upjong.slice(0,5) : [], "upTop");
  mk5(MK && MK.upjong ? MK.upjong.slice(-5).reverse() : [], "dnTop");
  mk5(MK && MK.theme ? MK.theme.slice(0,8) : [], "themes");
})();

// ── 과열 경고
document.getElementById("warn").innerHTML = A.slice().sort((a,b)=>b.rk-a.rk).slice(0,8).map((x,i)=>`
  <div class="row" onclick="location.href='${ST.stockUrl("kr",x.key)}'">
    <span class="rank">${i+1}</span><span class="nm">${x.key}</span>
    <span class="num" style="width:40px;text-align:right;color:var(--down);font-weight:800;">${x.rk}</span>
    <span class="sub" style="width:80px;text-align:right;">${x.e[11]/Math.max(1,x.e[9])>=1.5?"거래량 급증":Math.abs(x.e[3])>=5?"단기 급변동":"변동성 확대"}</span></div>`).join("");
</script>
</body>
</html>
