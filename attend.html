<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stocktier — 출석 체크</title>
<link rel="stylesheet" href="style.css">
<style>
  .wrap { max-width:1220px; }
  .layout { display:grid; grid-template-columns:1fr 400px; gap:14px; align-items:stretch; }
  @media (max-width:1000px){ .layout { grid-template-columns:1fr; } }
  .statgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:14px; }
  @media (max-width:900px){ .statgrid { grid-template-columns:repeat(2,1fr); } }
  .sbox2 { background:linear-gradient(135deg,#0d2e3b,#123f4b); border:1px solid var(--border); border-radius:14px; padding:14px 16px; display:flex; align-items:center; gap:12px; }
  .sbox2 .ic { width:46px; height:46px; border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:23px; flex-shrink:0; }
  .sbox2 .ic.coin { background:radial-gradient(circle at 35% 30%,#ffd95e,#c9611d); border-radius:50%; color:#5c3300; font-size:22px; font-weight:900; font-family:inherit; }
  .sbox2 .ic.ico { background:rgba(255,255,255,.06); }
  .sbox2 .ic.ico img { display:block; }
  .sbox2 .lb { font-size:11.5px; color:var(--muted); font-weight:700; }
  .sbox2 .vl { font-size:21px; font-weight:800; margin-top:3px; line-height:1.2; }
  .sbox2 .sub { font-size:10.5px; color:var(--dim); margin-top:3px; }
  .pbar { height:6px; border-radius:4px; background:#0d3a52; overflow:hidden; margin-top:7px; }
  .pbar i { display:block; height:100%; border-radius:4px; background:linear-gradient(90deg,#c9611d,#f0c948); }
  .pbar i.grn { background:linear-gradient(90deg,#0f7a56,#4cd7a5); }
  .cal { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-top:12px; }
  .cal .wd { text-align:center; font-size:10.5px; color:var(--dim); font-weight:700; padding-bottom:4px; }
  .cal .d { aspect-ratio:1; border-radius:9px; background:var(--panel2); border:1px solid var(--border); display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:11px; color:var(--muted); font-variant-numeric:tabular-nums; gap:1px; }
  .cal .d.on { background:linear-gradient(135deg,#13322a,#1d4a3a); border-color:#2e5c47; color:#4cd7a5; font-weight:800; }
  .cal .d.today { border-color:var(--gold); border-width:1.5px; }
  .cal .d.dim { opacity:.35; }
  .cal .d small { font-size:8px; color:var(--dim); font-weight:700; }
  .mnav { display:flex; align-items:center; justify-content:center; gap:16px; font-size:14.5px; font-weight:800; }
  .mnav span.ar { cursor:pointer; color:var(--muted); padding:2px 8px; border-radius:7px; }
  .mnav span.ar:hover { background:var(--panel2); }
  .ring { width:104px; height:104px; border-radius:50%; position:relative; flex-shrink:0; }
  .ring .hole { position:absolute; inset:11px; background:var(--panel); border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .tline { display:flex; align-items:flex-start; justify-content:space-between; padding:8px 2px 0; }
  .tdot { display:flex; flex-direction:column; align-items:center; gap:5px; flex:1; position:relative; }
  .tdot .c { width:22px; height:22px; border-radius:50%; background:var(--panel2); border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--dim); z-index:1; }
  .tdot .c.on { background:linear-gradient(135deg,#1d9e75,#0f7a56); border-color:#2e5c47; color:#fff; }
  .tdot .c.today { background:linear-gradient(135deg,#f0c948,#c9611d); border-color:var(--gold); color:#5c3300; }
  .tdot::after { content:""; position:absolute; top:11px; left:50%; width:100%; height:1.5px; background:var(--border); }
  .tdot:last-child::after { display:none; }
  .tdot b { font-size:9.5px; color:var(--dim); font-weight:700; }
  .benrow { display:flex; gap:11px; padding:9px 0; border-bottom:1px solid #ffffff0d; align-items:flex-start; }
  .benrow:last-child { border-bottom:none; }
  .benrow .bic { width:32px; height:32px; border-radius:9px; background:#3d3313; border:1px solid #c9a83244; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
  .badge3 { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid #ffffff0d; }
  .badge3:last-child { border-bottom:none; }
  .badge3 .bi { width:35px; height:35px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; box-shadow:0 1px 5px rgba(0,0,0,.32); }
  .rkrow { display:flex; align-items:center; gap:9px; padding:8px 0; border-bottom:1px solid #ffffff0d; font-size:12.5px; font-weight:700; }
  .rkrow:last-child { border-bottom:none; }
  .rkrow .rank { width:20px; height:20px; border-radius:6px; background:var(--panel2); border:1px solid var(--border); color:var(--muted); font-size:11px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .rkrow.me { background:#3d331322; border-radius:8px; padding-left:6px; padding-right:6px; }
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>
<div class="wrap">
  <span class="asof" id="asof"></span>
  <div class="page-title">🔥 출석 체크</div>
  <div class="page-sub">매일 출석하고 연속 기록을 이어가며 다양한 보상을 받아보세요! 포인트 1P당 모의투자 리그 월 지급금이 +100만 원.</div>
  <div id="body"><div class="card" style="text-align:center;padding:40px;color:var(--muted);">로그인 상태 확인 중...</div></div>
  <div class="footer"></div>
</div>

<script src="data.js"></script>
<script src="data_us.js"></script>
<script src="common.js"></script>
<script>
ST.nav("attend.html");
document.getElementById("asof").textContent = "업데이트: " + ST.asofText();
const box = document.getElementById("body");
let USER = null, ready = false, G = null, GAINED = 0, GBONUS = "", MOFF = 0, NEWATT = false;
// 달력 앞으로 이동 최대치 = 내년 12월까지
const MMAX = (function(){ const n = new Date(); return (n.getFullYear()+1)*12 + 11 - (n.getFullYear()*12 + n.getMonth()); })();

function locked(){
  box.innerHTML = `<div class="card" style="text-align:center;padding:50px;">
    <div style="font-size:28px;margin-bottom:12px;">🔒</div>
    <div style="font-size:15px;font-weight:800;margin-bottom:6px;">로그인하고 출석을 기록하세요</div>
    <div style="font-size:12px;color:var(--dim);margin-bottom:16px;">연속 출석 스트릭·포인트·배지가 계정에 저장됩니다.</div>
    <button style="background:transparent;border:1px solid var(--gold-dim);color:var(--gold);border-radius:9px;padding:10px 26px;font-size:13px;font-weight:800;cursor:pointer;" onclick="document.getElementById('loginbtn').click()">로그인하기</button></div>`;
}

const ymd = d => `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
const BADGES = [[3,"🌱","3일 연속 출석"],[7,"🔥","7일 연속 출석"],[14,"⚡","14일 연속 출석"],[30,"👑","30일 연속 출석"]];
const monthCount = () => { const now=new Date(), pre=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,"0")}`; return G.days.filter(d=>d.startsWith(pre)).length; };

async function load(){
  if (!USER) { locked(); return; }
  const ref = firebase.firestore().collection("games").doc(USER.uid);
  const snap = await ref.get();
  const p = window.ST_PROFILE || {};
  G = snap.exists ? snap.data() : {};
  G.days = G.days || [];
  G.streak = G.streak || 0;
  G.best = G.best || 0;
  G.pts = G.pts || 0;
  G.nick = p.nick || USER.displayName || USER.email.split("@")[0];
  G.av = p.avatar || "";

  // 오늘 출석 처리
  const now = new Date(), today = ymd(now);
  const yest = new Date(now); yest.setDate(yest.getDate()-1);
  if (G.lastAttend !== today) {
    G.streak = (G.lastAttend === ymd(yest)) ? G.streak + 1 : 1;
    G.best = Math.max(G.best, G.streak);
    G.lastAttend = today;
    G.days.push(today);
    G.days = [...new Set(G.days)].sort().slice(-62);
    // 기본 10P + 연속 보너스(하루당 +1P, 최대 +20P)
    GAINED = 10 + Math.min(20, G.streak - 1);
    // 월간 마일스톤: 이번 달 10일째 +30P / 20일째 +50P
    const mc = monthCount();
    if (mc === 10) { GAINED += 30; GBONUS = "월 10일 출석 보너스 +30P"; }
    if (mc === 20) { GAINED += 50; GBONUS = "월 20일 출석 보너스 +50P"; }
    G.pts += GAINED;
    NEWATT = true;
    await ref.set(G, { merge: true });
  }
  render();
}

function calHtml(){
  const now = new Date();
  const base = new Date(now.getFullYear(), now.getMonth()+MOFF, 1);
  const y = base.getFullYear(), m = base.getMonth();
  const first = base.getDay(), last = new Date(y, m+1, 0).getDate();
  const dset = new Set(G.days), today = ymd(now);
  let cal = ["일","월","화","수","목","금","토"].map(w=>`<div class="wd">${w}</div>`).join("");
  for (let i=0;i<first;i++) cal += `<div class="d dim" style="background:transparent;border:none;"></div>`;
  for (let d=1; d<=last; d++){
    const k = `${y}${String(m+1).padStart(2,"0")}${String(d).padStart(2,"0")}`;
    const fut = k > today;
    cal += `<div class="d ${dset.has(k)?"on":""} ${k===today?"today":""} ${fut?"dim":""}">${dset.has(k)?"✓":d}${k===today?`<small>오늘</small>`:""}</div>`;
  }
  return `<div class="mnav">
    <span class="ar" onclick="MOFF--;redraw()">‹</span>
    <span>${y}년 ${m+1}월</span>
    <span class="ar" onclick="if(MOFF<MMAX){MOFF++;redraw()}" style="${MOFF>=MMAX?"opacity:.3;cursor:default;":""}">›</span></div>
    <div class="cal">${cal}</div>`;
}
window.redraw = () => { document.getElementById("calbox").innerHTML = calHtml(); };

function render(){
  const now = new Date(), today = ymd(now);
  const daysIn = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const mc = monthCount();
  const next = BADGES.find(b=>b[0]>G.streak) || BADGES[BADGES.length-1];
  const toNext = Math.max(0, next[0]-G.streak);
  const ringPct = Math.min(100, Math.round(G.streak/next[0]*100));
  const dset = new Set(G.days);
  const nextGain = 10 + Math.min(20, G.streak);   // 내일 받을 포인트

  // 최근 10일 타임라인
  let tl = "";
  for (let i=6; i>=0; i--){
    const d = new Date(now); d.setDate(d.getDate()-i);
    const k = ymd(d);
    tl += `<div class="tdot"><span class="c ${dset.has(k)?"on":""} ${k===today?"today":""}">${dset.has(k)?"✓":""}</span><b>${["일","월","화","수","목","금","토"][d.getDay()]}<br>${d.getDate()}</b></div>`;
  }

  box.innerHTML = `
  <div class="statgrid">
    <div class="sbox2"><span class="ic ico"><img alt="" src="att-fire.png" width="34" height="34"></span>
      <div><div class="lb">연속 출석</div><div class="vl num">${G.streak}<span style="font-size:13px;color:var(--muted);">일</span></div><div class="sub">최고 기록 ${G.best}일</div></div></div>
    <div class="sbox2"><span class="ic ico"><img alt="" src="att-cal.png" width="34" height="34"></span>
      <div style="flex:1;"><div class="lb">이번 달 출석</div><div class="vl num">${mc} <span style="font-size:13px;color:var(--muted);">/ ${daysIn}일</span></div>
      <div class="pbar"><i class="grn" style="width:${Math.round(mc/daysIn*100)}%;"></i></div></div></div>
    <div class="sbox2"><span class="ic ico"><img alt="" src="att-coin.png" width="34" height="34"></span>
      <div><div class="lb">출석 포인트</div><div class="vl num" style="color:#f0c948;">${G.pts.toLocaleString("ko-KR")}<span style="font-size:13px;">P</span></div><div class="sub">누적 획득 포인트</div></div></div>
    <div class="sbox2"><span class="ic" style="background:linear-gradient(135deg,#f0a818,#8a5a1d);"><svg width="21" height="23" viewBox="0 0 20 22" fill="#fff"><path d="M10 2.5l1.95 3.95 4.35.63-3.15 3.07.74 4.35L10 12.98l-3.89 2.05.74-4.35L3.7 7.6l4.35-.63z"/><circle cx="10" cy="9" r="7.2" fill="none" stroke="#fff" stroke-width="1.4" opacity=".55"/></svg></span>
      <div style="flex:1;"><div class="lb">다음 배지까지</div><div class="vl num">${toNext}<span style="font-size:13px;color:var(--muted);">일 남음</span></div>
      <div class="pbar"><i style="width:${ringPct}%;"></i></div><div class="sub" style="text-align:right;">${Math.min(G.streak,next[0])} / ${next[0]}일</div></div></div>
  </div>
  <div class="layout">
    <div style="display:flex;flex-direction:column;">
      <div class="card">
        <div id="calbox">${calHtml()}</div>
      </div>
      <div style="display:grid;grid-template-columns:1.25fr 1fr;gap:14px;margin-top:14px;align-items:stretch;flex:1;">
        <div class="card" style="display:flex;flex-direction:column;"><h3>최근 출석 기록</h3>
          <div style="margin:auto 0;">
            <div class="tline">${tl}</div>
            <div style="display:flex;gap:14px;justify-content:center;font-size:10.5px;color:var(--dim);font-weight:700;margin-top:14px;">
              <span><span style="color:#4cd7a5;">●</span> 출석</span><span><span style="color:var(--border);">●</span> 미출석</span><span><span style="color:var(--gold);">○</span> 오늘</span></div>
          </div>
        </div>
        <div class="card"><h3>출석 혜택 안내</h3>
          <div class="benrow"><span class="bic">🔥</span><div style="font-size:11.5px;color:var(--muted);line-height:1.7;"><b style="color:var(--text);">연속 출석 보너스</b><br>기본 10P + 연속 하루당 +1P (최대 +20P)</div></div>
          <div class="benrow"><span class="bic">📅</span><div style="font-size:11.5px;color:var(--muted);line-height:1.7;"><b style="color:var(--text);">월간 보너스</b><br>한 달 10일 출석 시 +30P · 20일 출석 시 +50P</div></div>
          <div class="benrow"><span class="bic">💰</span><div style="font-size:11.5px;color:var(--muted);line-height:1.7;"><b style="color:var(--text);">포인트 → 투자금 환산</b><br>1P당 모의투자 리그 월 지급금 +100만 원 자동 반영</div></div>
        </div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div class="card"><h3>배지 <span class="more" style="cursor:default;">수집 현황 ${BADGES.filter(b=>G.best>=b[0]).length} / ${BADGES.length}</span></h3>
        ${BADGES.map(([n,ic,lb],i)=>{
          const got = G.best>=n, pct = Math.min(100,Math.round(G.best/n*100));
          const cols = [["#f0b24a","#a86a1e"],["#d3dde3","#85939c"],["#f0c948","#b8891e"],["#c77dff","#7a3fb0"]][i];
          const shield = `<svg viewBox="0 0 40 44" width="34" height="37" style="flex-shrink:0;filter:drop-shadow(0 1px 2px rgba(0,0,0,.45));"><defs><linearGradient id="bg${i}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${cols[0]}"/><stop offset="1" stop-color="${cols[1]}"/></linearGradient></defs><path d="M20 2 L36 8 V22 C36 33 29 40 20 43 C11 40 4 33 4 22 V8 Z" fill="url(#bg${i})" stroke="#ffffff66" stroke-width="1"/><path d="M20 12.5 l2.6 5.3 5.9.6 -4.4 4 1.3 5.8 -5.4-3 -5.4 3 1.3-5.8 -4.4-4 5.9-.6z" fill="#fff" opacity=".92"/></svg>`;
          return `<div class="badge3">${shield}
            <div style="flex:1;"><div style="font-size:12px;font-weight:700;">${lb}</div>
            <div class="pbar" style="margin-top:6px;"><i class="grn" style="width:${pct}%;"></i></div></div>
            <span style="font-size:10.5px;color:${got?"#4cd7a5":"var(--dim)"};font-weight:700;flex-shrink:0;">${got?"달성!":`${Math.min(G.best,n)} / ${n}`}</span></div>`;}).join("")}
      </div>
      <div class="card"><h3>🏆 스트릭 랭킹</h3><div id="ranks">불러오는 중...</div></div>
      <div class="card"><h3>오늘의 출석 보상</h3>
        <div style="display:flex;align-items:center;gap:14px;padding:6px 0;">
          <span class="ic coin" style="width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#5c3300;background:radial-gradient(circle at 35% 30%,#ffd95e,#c9611d);">P</span>
          <div style="flex:1;"><b class="num" style="font-size:22px;color:#f0c948;">${NEWATT?GAINED:0}P</b>
            <div style="font-size:10.5px;color:var(--dim);">출석 포인트${GBONUS?` · ${GBONUS}`:""}</div></div>
          <span style="width:62px;height:62px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;text-align:center;font-size:11px;font-weight:900;color:#5c3300;line-height:1.25;background:radial-gradient(circle at 40% 34%,#ffe98a,#e0a020);box-shadow:0 0 14px #f0c94877, inset 0 0 0 2px #ffffff55;">획득<br>완료</span>
        </div>
      </div>
      <div class="card" style="flex:1;"><h3>이번 달 달성률</h3>
        <b class="num" style="font-size:24px;">${Math.round(mc/daysIn*100)}<span style="font-size:14px;">%</span></b>
        <span style="font-size:11px;color:var(--dim);font-weight:700;margin-left:8px;">${mc} / ${daysIn}일</span>
        <div class="pbar" style="margin-top:9px;"><i class="grn" style="width:${Math.round(mc/daysIn*100)}%;"></i></div>
        <div style="font-size:10.5px;color:var(--muted);font-weight:700;margin-top:10px;">🎁 ${mc<10?`10일 출석 시 +30P 보너스 (${10-mc}일 남음)`:mc<20?`20일 출석 시 +50P 보너스 (${20-mc}일 남음)`:"이번 달 월간 보너스 모두 달성!"}</div>
      </div>
    </div>
  </div>`;

  loadRanks();
}

async function loadRanks(){
  const el = document.getElementById("ranks");
  if (!el) return;
  try {
    const rs = await firebase.firestore().collection("games").orderBy("streak","desc").limit(20).get();
    const rows = [];
    rs.forEach(d => { const v = d.data(); if (v.streak) rows.push({ uid:d.id, ...v }); });
    el.innerHTML = rows.length ? rows.slice(0,5).map((r,i)=>`
      <div class="rkrow ${r.uid===USER.uid?"me":""}">
        <span class="rank">${i<3?["🥇","🥈","🥉"][i]:i+1}</span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.av?r.av+" ":""}${(r.nick||"익명").replace(/</g,"&lt;")}</span>
        <span class="num" style="color:#f0c948;">🔥 ${r.streak}일</span>
      </div>`).join("")
    : `<div style="font-size:12px;color:var(--dim);">아직 기록이 없어요.</div>`;
  } catch(e) { el.innerHTML = `<div style="font-size:12px;color:var(--dim);">랭킹을 불러오지 못했습니다.</div>`; }
}

document.addEventListener("st-auth", e => { ready = true; USER = e.detail; load(); });
setTimeout(() => { if (!ready) locked(); }, 4000);
</script>
</body>
</html>
