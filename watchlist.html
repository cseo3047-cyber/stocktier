<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stocktier — 관심종목</title>
<link rel="stylesheet" href="style.css">
<style>
  .wrap { max-width:1500px; }
  .layout { display:grid; grid-template-columns:1fr 300px; gap:14px; align-items:stretch; }
  @media (max-width:1150px){ .layout { grid-template-columns:1fr; } }
  .cards4 { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; margin-bottom:14px; }
  @media (max-width:900px){ .cards4 { grid-template-columns:repeat(2,minmax(0,1fr)); } }
  .scard { background:linear-gradient(135deg,#0d2e3b,#123f4b); border:1px solid var(--border); border-radius:14px; padding:15px; display:flex; gap:11px; align-items:center; min-width:0; }
  .scard .ic { width:44px; height:44px; border-radius:12px; background:#4cd7a51a; border:1px solid #4cd7a544; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .scard .l { flex:1; min-width:0; }
  .scard .lb { font-size:11.5px; color:var(--muted); font-weight:700; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .scard .vl { font-size:25px; font-weight:800; line-height:1.05; }
  .scard .vl small { font-size:13px; color:var(--dim); font-weight:600; }
  .scard .sub { font-size:10.5px; color:var(--dim); margin-top:3px; white-space:nowrap; }
  .scard svg.mini { flex-shrink:0; }
  .fbar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:11px; align-items:center; }
  .fchip { font-size:11.5px; padding:5px 13px; border-radius:8px; border:1px solid var(--border); color:var(--muted); cursor:pointer; font-weight:700; }
  .fchip.on { background:#13322a; color:#4cd7a5; border-color:#2e5c47; }
  .fbar select { background:var(--panel2); border:1px solid var(--border); color:var(--text); border-radius:7px; padding:5px 8px; font-size:11.5px; outline:none; }
  .stbl { width:100%; border-collapse:collapse; font-size:12px; }
  .stbl th { text-align:center; color:var(--dim); font-size:10.5px; font-weight:700; padding:7px 4px; border-bottom:1px solid var(--border); white-space:nowrap; }
  .stbl td { padding:8px 4px; border-bottom:1px solid #ffffff0d; text-align:center; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .stbl tr { cursor:pointer; }
  .stbl tr:hover td { background:var(--panel2); }
  .stbl td.nm { text-align:left; font-weight:700; max-width:160px; overflow:hidden; text-overflow:ellipsis; }
  .tchg { font-size:10px; font-weight:800; border-radius:5px; padding:1.5px 6px; }
  .vbadge { display:inline-flex; padding:2px 10px; border-radius:7px; font-size:10.5px; font-weight:800; }
  .r-low { background:#13322a; color:#4cd7a5; } .r-med { background:#3d3313; color:#f0c948; } .r-high { background:#3a1a22; color:#f0708a; }
  .rmx { color:var(--dim); cursor:pointer; font-weight:800; padding:0 4px; }
  .rmx:hover { color:#f0708a; }
  .row3b { display:grid; grid-template-columns:1fr 1.15fr 1.2fr; gap:14px; margin-top:14px; }
  @media (max-width:1000px){ .row3b { grid-template-columns:1fr; } }
  .rrow { display:flex; align-items:center; gap:9px; padding:8px 2px; border-bottom:1px solid #ffffff0d; font-size:12.5px; font-weight:700; cursor:pointer; }
  .rrow:last-child { border-bottom:none; }
  .rrow:hover { color:var(--gold); }
  .rrow .rank { width:19px; height:19px; border-radius:6px; background:var(--panel2); border:1px solid var(--border); color:var(--muted); font-size:10.5px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .evrow { display:flex; align-items:center; gap:9px; font-size:12px; color:var(--muted); font-weight:600; padding:8px 0; border-bottom:1px solid #ffffff0d; }
  .evrow:last-child { border-bottom:none; }
  .evrow .dt { width:46px; flex-shrink:0; font-variant-numeric:tabular-nums; color:var(--dim); font-size:11px; }
  .evrow .tx { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .bullets2 { font-size:12px; color:var(--muted); line-height:1.85; }
  .bullets2 li { list-style:none; padding-left:21px; position:relative; margin-bottom:6px; }
  .bullets2 li:before { content:"✓"; position:absolute; left:0; top:2px; width:14px; height:14px; border-radius:50%; background:#13322a; color:#4cd7a5; font-size:9px; font-weight:800; display:flex; align-items:center; justify-content:center; }
  .gauge { width:150px; height:80px; position:relative; overflow:hidden; margin:2px auto 6px; }
  .gauge .arc { width:150px; height:150px; border-radius:50%; }
  .gauge .hole { position:absolute; left:21px; top:21px; width:108px; height:108px; background:var(--panel); border-radius:50%; text-align:center; }
  .gauge .hole b { font-size:25px; display:block; margin-top:20px; }
  .gauge .hole small { font-size:12px; color:var(--dim); font-weight:500; }
  .gsub { text-align:center; font-size:11px; color:var(--muted); font-weight:700; margin-bottom:8px; }
  .sbars .r { display:flex; align-items:center; gap:8px; font-size:11.5px; padding:3px 0; color:var(--muted); }
  .sbars .r .lb { width:66px; flex-shrink:0; white-space:nowrap; }
  .sbars .m { flex:1; height:6px; background:var(--panel2); border:1px solid var(--border); border-radius:4px; overflow:hidden; }
  .sbars .m i { display:block; height:100%; background:linear-gradient(90deg,#0f7a56,#4cd7a5); border-radius:4px; }
  .sbars .r b { width:26px; text-align:right; color:var(--text); }
  .nrow2 { display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid #ffffff0d; font-size:12px; font-weight:700; }
  .nrow2:last-child { border-bottom:none; }
  .nrow2 .rank { width:18px; height:18px; border-radius:5px; background:#13322a; color:#4cd7a5; font-size:10px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .nrow2 .tx { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .nrow2 .ar { font-weight:900; flex-shrink:0; }
  .gbar { display:flex; align-items:center; gap:9px; font-size:12px; color:var(--muted); font-weight:600; padding:6px 0; }
  .gbar .lb2 { width:84px; flex-shrink:0; }
  .gbar .m { flex:1; height:7px; background:var(--panel2); border:1px solid var(--border); border-radius:4px; overflow:hidden; }
  .gbar .m i { display:block; height:100%; background:linear-gradient(90deg,#8a6f1e,#f0c948); border-radius:4px; }
  .gbar b { width:34px; text-align:right; color:var(--text); }
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>
<div class="wrap">
  <span class="asof" id="asof"></span>
  <div class="page-title">관심종목</div>
  <div class="page-sub">내가 저장한 종목의 티어 변화와 핵심 지표를 한눈에 확인하세요.</div>
  <div id="body"></div>
  <div class="footer"></div>
</div>

<script src="data.js"></script>
<script src="data_us.js"></script>
<script src="common.js"></script>
<script>
ST.nav("watchlist.html");
document.getElementById("asof").textContent = "업데이트: " + ST.asofText();
const clip = v => Math.max(0, Math.min(100, Math.round(v)));
const box = document.getElementById("body");
const list = ST.watchGet().filter(w => ST.get(w[0],w[1]));

if (!list.length) {
  box.innerHTML = `<div class="card" style="text-align:center;padding:56px;">
    <div style="font-size:18px;font-weight:800;margin-bottom:8px;">저장한 관심종목이 없어요</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:20px;">종목 페이지에서 ☆ 버튼을 눌러 관심종목을 담아보세요.</div>
    <a class="btn" href="tier.html">종목 담으러 가기 →</a></div>`;
} else {

const items = list.map(([src,key]) => {
  const e = ST.get(src,key), us = src==="us";
  const sc = ST.score(e,us), rk = ST.risk(e);
  const supply = (!us && e.length>18 && e[17]!=null) ? clip(((e[17]>0?1:0)+(e[18]>0?1:0))*27+40) : 50;
  const momentum = clip(50 + (e[14]||0)*3 + (e[15]||0)*1.2);
  const value = e[4]>0 ? clip(100 - e[4]*(us?1.2:2)) : 30;
  const gNow = ST.gradeOf(sc), gPast = ST.gradeOf(clip(sc - (e[14]||0)*0.9));
  return { src, key, e, us, sc, rk, supply, momentum, value, gNow, gPast, up: gNow.min > gPast.min };
});

// 실적 일정 (실데이터 우선 · 국내는 예상 폴백)
const hashOf = s => { let h=7; for (const c of String(s)) h=(h*31+c.charCodeAt(0))>>>0; return h; };
const today0 = new Date(); today0.setHours(0,0,0,0);
const EARNK = (window.STOCK_MARKET && window.STOCK_MARKET.earn) || null;
const EARNU = (window.STOCK_MARKET_US && window.STOCK_MARKET_US.earn) || null;
function earnInfo(x){
  const m = x.us ? EARNU : EARNK;
  const v = m && m[x.us ? x.key : x.e[0]];
  if (v) { const t = String(v);
    const d = t.length>=8 ? new Date(+t.slice(0,4), +t.slice(4,6)-1, +t.slice(6,8)) : new Date(today0.getFullYear(), +t.slice(0,2)-1, +t.slice(2,4));
    if (d >= today0) return { d, est:false }; }
  if (!x.us) { const h = hashOf(x.e[0]); const dl = [[3,31],[5,15],[8,14],[11,16]];
    for (let k=0;k<9;k++){ const d = new Date(today0.getFullYear()+Math.floor(k/4), dl[k%4][0]-1, dl[k%4][1]);
      d.setDate(d.getDate()-(h%16)); if (d>=today0) return { d, est:true }; } }
  return null;
}
const dday = d => Math.round((d-today0)/864e5);
const fmtMD = d => `${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`;

// 최근 이벤트 텍스트
function eventOf(x){
  const eo = earnInfo(x);
  if (eo && dday(eo.d)<=7) return [`📅 실적 발표 D-${dday(eo.d)}${eo.est?" (예상)":""}`, "#f0c948"];
  const surge = x.e[9]>0 ? x.e[11]/x.e[9] : 0;
  if (surge>=2) return ["🔥 거래대금 급증", "#f0708a"];
  if (!x.us && x.e[17]!=null && x.e[17]>0 && x.e[18]>0) return ["↗ 외인·기관 쌍끌이", "#4cd7a5"];
  if (!x.us && x.e[17]!=null && x.e[17]>0) return ["↗ 외국인 순매수", "#4cd7a5"];
  if (x.rk>=70) return ["⚠ 과열 주의", "#f0708a"];
  if ((x.e[14]||0)>=5) return ["🚀 단기 급등", "#4cd7a5"];
  if ((x.e[14]||0)<=-5) return ["↘ 단기 조정", "#f0708a"];
  return ["— 특이사항 없음", "var(--dim)"];
}

const logo = x => {
  const nv = `https://ssl.pstatic.net/imgstock/fn/real/logo/stock/Stock${x.us ? x.key+(x.e[1]==="NASDAQ"?".O":x.e[1]==="NYSE"?".N":".A") : x.e[0]}.svg`;
  const ts = x.us ? nv : "https://thumb.tossinvest.com/image/resized/96x0/" + encodeURIComponent("https://static.toss.im/png-icons/securities/icn-sec-fill-"+x.e[0]+".png");
  return `<img src="${ts}" style="width:19px;height:19px;border-radius:50%;background:#fff;flex-shrink:0;vertical-align:-4px;margin-right:6px;" loading="lazy"
    onerror="if(!this.dataset.f){this.dataset.f=1;this.src='${nv}';}else{this.style.visibility='hidden';}">`;
};

// ── 상단 카드
const listIcon = `<svg width="24" height="22" viewBox="0 0 22 20"><g stroke="#4cd7a5" stroke-width="2" stroke-linecap="round"><circle cx="2.5" cy="3" r="1.6" fill="#4cd7a5" stroke="none"/><line x1="7" y1="3" x2="20" y2="3"/><circle cx="2.5" cy="10" r="1.6" fill="#4cd7a5" stroke="none"/><line x1="7" y1="10" x2="20" y2="10"/><circle cx="2.5" cy="17" r="1.6" fill="#4cd7a5" stroke="none"/><line x1="7" y1="17" x2="20" y2="17"/></g></svg>`;
const shieldUp = `<svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="#f0c948" stroke-width="1.8" stroke-linejoin="round"><path d="M12 2l8 3v6c0 4.8-3.4 8.4-8 11-4.6-2.6-8-6.2-8-11V5z"/><path d="M12 15V8M9 11l3-3 3 3" stroke-linecap="round"/></svg>`;
const warnIcon = `<svg width="25" height="23" viewBox="0 0 24 22" fill="none" stroke="#f0645a" stroke-width="1.8" stroke-linejoin="round"><path d="M12 2L22 20H2z"/><line x1="12" y1="9" x2="12" y2="14" stroke-linecap="round"/><circle cx="12" cy="17" r="1.2" fill="#f0645a" stroke="none"/></svg>`;
const calIcon = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4cd7a5" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="5" width="18" height="16" rx="3"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2.5" x2="8" y2="6.5"/><line x1="16" y1="2.5" x2="16" y2="6.5"/><path d="M8 15.5l2.5 2.5 5.5-5.5" stroke-width="2"/></svg>`;
const miniLine = (id,c1,c2,seed) => { const pts=[]; let v=13;
  for (let i=0;i<13;i++){ v=Math.max(5,Math.min(29,v+((seed>>(i%9))%7)-2.6)); pts.push(`${(i*6.5).toFixed(1)},${(36-v).toFixed(1)}`); }
  return `<svg class="mini" width="80" height="36" viewBox="0 0 80 36"><defs>
    <linearGradient id="${id}" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/></linearGradient>
    <linearGradient id="${id}f" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${c2}" stop-opacity="0.35"/><stop offset="1" stop-color="${c2}" stop-opacity="0"/></linearGradient></defs>
    <polygon points="0,36 ${pts.join(" ")} 80,36" fill="url(#${id}f)"/>
    <polyline points="${pts.join(" ")}" fill="none" stroke="url(#${id})" stroke-width="2"/></svg>`; };
const miniBars = (id,c1,c2,seed) => { let b="";
  for (let i=0;i<8;i++){ const h=7+((seed*(i+3))%17); b+=`<rect x="${i*9.5}" y="${36-h}" width="6.5" height="${h}" rx="2" fill="url(#${id})"/>`; }
  return `<svg class="mini" width="78" height="36" viewBox="0 0 78 36"><defs><linearGradient id="${id}" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/></linearGradient></defs>${b}</svg>`; };

const n = items.length;
const upN = items.filter(x=>x.up).length;
const riskN = items.filter(x=>x.rk>=70).length;
const earnN = items.filter(x=>{ const o=earnInfo(x); return o && dday(o.d)<=7; }).length;
const avgOf = f => clip(items.reduce((a,x)=>a+f(x),0)/n);
const surv = Math.round((avgOf(x=>x.supply)+avgOf(x=>x.momentum)+avgOf(x=>x.value)+avgOf(x=>50+x.e[7]*2)+avgOf(x=>100-x.rk))/5);
const g = ST.gradeOf(surv);
const gcol = surv>=65?"#4cd7a5":surv>=45?"#f0c948":"#f0645a";

const cards = `
<div class="cards4">
  <div class="scard"><span class="ic">${listIcon}</span><div class="l"><div class="lb">전체 관심종목</div><div class="vl num">${n}<small> 개</small></div><div class="sub">저장 종목 수</div></div>${miniLine("wg1","#1d9e75","#4cd7a5",n*17+5)}</div>
  <div class="scard"><span class="ic" style="background:#f0c9481a;border-color:#c9a83255;">${shieldUp}</span><div class="l"><div class="lb">오늘 티어 상승</div><div class="vl num">${upN}<small> 개</small></div><div class="sub">최근 1주 기준</div></div>${miniBars("wg2","#8a6f1e","#f0c948",upN*9+13)}</div>
  <div class="scard"><span class="ic" style="background:#f0645a1a;border-color:#f0645a44;">${warnIcon}</span><div class="l"><div class="lb">위험 신호 종목</div><div class="vl num">${riskN}<small> 개</small></div><div class="sub">과열 · 수급 이탈</div></div>${miniBars("wg3","#7a2822","#f0645a",riskN*7+9)}</div>
  <div class="scard"><span class="ic">${calIcon}</span><div class="l"><div class="lb">실적 임박 종목</div><div class="vl num">${earnN}<small> 개</small></div><div class="sub">D-7 이내 · 예상 포함</div></div>${miniBars("wg4","#1d9e75","#8fd6b8",earnN*9+21)}</div>
</div>`;

// ── 리스트 (필터 + 정렬)
let CAT = "all", SORT = "chg2", MKT = "all";
const CATS = [["all","전체"],["big","대형주"],["grow","성장주"],["div","배당주"],["theme","테마주"]];
const catFn = {
  all: x => true,
  big: x => x.e[8] >= (x.us?1000:100000),
  grow: x => (x.e[16]||0) >= 15 || (x.e[7] >= 15 && x.e[4] > 20),
  div: x => x.e[6] >= (x.us?2:3),
  theme: x => !!(x.e.length>21 && x.e[21]),
};
function pool(){
  let p = items.filter(catFn[CAT]);
  if (MKT==="kr") p = p.filter(x=>!x.us);
  else if (MKT==="us") p = p.filter(x=>x.us);
  p.sort((a,b)=> SORT==="chg2" ? (b.up?1:0)-(a.up?1:0) || b.sc-a.sc : SORT==="sc" ? b.sc-a.sc : SORT==="chg" ? b.e[3]-a.e[3] : a.rk-b.rk);
  return p;
}
const tableCard = `
<div class="card"><h3>내 관심종목 리스트</h3>
  <div class="fbar" id="catbar"></div>
  <table class="stbl"><thead><tr><th>순위</th><th style="text-align:left;">종목명</th><th>현재 티어</th><th>종합점수</th><th>전일 대비</th><th>수급</th><th>모멘텀</th><th>밸류</th><th>리스크</th><th style="text-align:left;">최근 이벤트</th><th></th></tr></thead>
  <tbody id="tbody"></tbody></table>
</div>`;
function drawBar(){
  document.getElementById("catbar").innerHTML =
    CATS.map(([k,t])=>`<span class="fchip ${CAT===k?"on":""}" onclick="setCat('${k}')">${t}</span>`).join("") +
    `<span style="margin-left:auto;display:flex;gap:7px;align-items:center;font-size:11px;color:var(--dim);">
      정렬 <select onchange="setSort(this.value)">
        <option value="chg2" ${SORT==="chg2"?"selected":""}>티어 변화</option>
        <option value="sc" ${SORT==="sc"?"selected":""}>종합점수</option>
        <option value="chg" ${SORT==="chg"?"selected":""}>당일 등락</option>
        <option value="rk" ${SORT==="rk"?"selected":""}>안정성</option></select>
      시장 <select onchange="setMkt(this.value)">
        <option value="all" ${MKT==="all"?"selected":""}>전체</option>
        <option value="kr" ${MKT==="kr"?"selected":""}>국내</option>
        <option value="us" ${MKT==="us"?"selected":""}>미국</option></select></span>`;
}
window.setCat = k => { CAT=k; drawBar(); drawTbl(); };
window.setSort = v => { SORT=v; drawTbl(); };
window.setMkt = v => { MKT=v; drawTbl(); };
function drawTbl(){
  document.getElementById("tbody").innerHTML = pool().map((x,i)=>{
    const ev = eventOf(x);
    return `<tr onclick="location.href='${ST.stockUrl(x.src,x.key)}'">
      <td class="num" style="color:var(--muted);">${i+1}</td>
      <td class="nm">${logo(x)}${ST.displayName(x.src,x.key)}</td>
      <td><span class="tierb tier-${x.gNow.g}">${x.gNow.g}</span></td>
      <td class="num" style="font-weight:800;">${x.sc}</td>
      <td>${x.gPast.g!==x.gNow.g
        ? `<span class="tchg" style="background:#22303c;color:#9db9d4;">${x.gPast.g}</span> <span style="color:var(--dim);">→</span> <span class="tchg" style="background:#3d3313;color:#f0c948;">${x.gNow.g}</span>`
        : `<span style="color:var(--dim);font-size:11px;">유지</span>`}</td>
      <td class="num">${x.supply}</td>
      <td class="num">${x.momentum}</td>
      <td class="num">${x.value}</td>
      <td><span class="vbadge ${x.rk<40?"r-low":x.rk<70?"r-med":"r-high"}">${x.rk<40?"Low":x.rk<70?"Medium":"High"}</span></td>
      <td style="text-align:left;font-size:11.5px;color:${ev[1]};font-weight:700;">${ev[0]}</td>
      <td><span class="rmx" onclick="event.stopPropagation();rmWatch('${x.src}','${encodeURIComponent(x.key)}')">✕</span></td>
    </tr>`;
  }).join("");
}
window.rmWatch = (src,k) => { ST.watchToggle(src, decodeURIComponent(k)); location.reload(); };

// ── 하단 3분할
const ups = items.filter(x=>x.up).sort((a,b)=>b.sc-a.sc).slice(0,5);
const upCard = `<div class="card"><h3>티어 상승 TOP 5</h3>
  ${ups.length ? ups.map((x,i)=>`
    <div class="rrow" onclick="location.href='${ST.stockUrl(x.src,x.key)}'">
      <span class="rank">${i+1}</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${ST.displayName(x.src,x.key)}</span>
      <span class="tchg" style="background:#22303c;color:#9db9d4;">${x.gPast.g}</span><span style="color:var(--dim);">→</span><span class="tchg" style="background:#3d3313;color:#f0c948;">${x.gNow.g}</span></div>`).join("")
  : `<div style="font-size:12px;color:var(--dim);padding:10px 0;">오늘 티어 상승 종목이 없습니다</div>`}</div>`;

const evList = [];
for (const x of items) { const o = earnInfo(x); if (o && dday(o.d)<=45) evList.push([o.d, `${ST.displayName(x.src,x.key)} 실적${o.est?" (예상)":""}`, "실적"]); }
for (const e2 of (ST.EVENTS||[])) { const d = new Date(e2[0]+"T00:00:00"); if (d>=today0 && dday(d)<=45) evList.push([d, e2[1]+" "+e2[3], e2[2]]); }
evList.sort((a,b)=>a[0]-b[0]);
const typeStyle = t => t==="실적" ? "background:#13322a;color:#4cd7a5;" : t==="금리" ? "background:#3d3313;color:#f0c948;" : "background:#13303d;color:#4cc3d7;";
const evCard = `<div class="card"><h3>실적 / 일정 체크</h3>
  ${evList.slice(0,6).map(([d,t,ty])=>`<div class="evrow">
    <span class="dt">${dday(d)===0?"오늘":"D-"+dday(d)}</span>
    <span class="tx">${t}</span>
    <span class="tchg" style="${typeStyle(ty)}">${ty==="실적"?"실적":ty}</span></div>`).join("") || `<div style="font-size:12px;color:var(--dim);padding:10px 0;">예정 일정이 없습니다</div>`}</div>`;

const notes = [];
const best = items.slice().sort((a,b)=>b.sc-a.sc)[0];
if (best) notes.push(`${ST.displayName(best.src,best.key)}, 관심종목 중 종합점수 ${best.sc}점 1위`);
if (ups.length) notes.push(`${ST.displayName(ups[0].src,ups[0].key)} 등 ${ups.length}개 종목 티어 상승`);
if (riskN) notes.push(`위험 신호 ${riskN}개 종목 — 리스크 워치에서 점검 권장`);
if (earnN) notes.push(`실적 발표 임박 ${earnN}개 종목, 변동성 확대 가능성`);
notes.push("수급·모멘텀 지속 종목 중심으로 관심 유지");
const noteCard = `<div class="card"><h3>오늘의 한줄 해설</h3><ul class="bullets2">${notes.slice(0,5).map(t=>`<li>${t}</li>`).join("")}</ul></div>`;

// ── 사이드
const sideSurv = `
<div class="card"><h3>포트폴리오 생존점수 <span class="more" onclick="location.href='portfolio.html'">더보기 ›</span></h3>
  <div class="gauge"><div class="arc" style="background:conic-gradient(from 270deg, ${gcol} 0% ${surv/2}%, #ffffff14 ${surv/2}% 50%, transparent 50%);"></div>
    <div class="hole"><b>${surv}<small>/100</small></b></div></div>
  <div class="gsub"><span class="tierb tier-${g.g}">${g.g}</span> 티어 · ${surv>=65?"양호":surv>=45?"보통":"주의"}</div>
  <div class="sbars">
    ${[["수급",avgOf(x=>x.supply)],["모멘텀",avgOf(x=>x.momentum)],["펀더멘털",avgOf(x=>50+x.e[7]*2)],["밸류에이션",avgOf(x=>x.value)],["리스크",avgOf(x=>100-x.rk)]].map(([lb,v])=>
      `<div class="r"><span class="lb">${lb}</span><div class="m"><i style="width:${clip(v)}%"></i></div><b>${clip(v)}</b></div>`).join("")}
  </div>
  <div style="font-size:10.5px;color:var(--dim);text-align:center;margin-top:8px;">보유 종목 ${n}개 기준</div>
</div>`;

const alerts = [];
for (const x of items){
  if (x.up) alerts.push([`${ST.displayName(x.src,x.key)} ${x.gPast.g}→${x.gNow.g} 상향`, "↑", "var(--up)"]);
  else if (x.rk>=70) alerts.push([`${ST.displayName(x.src,x.key)} 과열 경고 진입`, "⚠", "#f0c948"]);
  else if (!x.us && x.e[17]!=null && x.e[17]>0 && x.e[18]>0) alerts.push([`${ST.displayName(x.src,x.key)} 외인·기관 순매수`, "↑", "var(--up)"]);
  else if ((x.e[14]||0)<=-5) alerts.push([`${ST.displayName(x.src,x.key)} 1주 ${ST.pct(x.e[14])}`, "↓", "var(--down)"]);
}
for (const x of items){ const o = earnInfo(x); if (o && dday(o.d)<=7) alerts.push([`${ST.displayName(x.src,x.key)} 실적 발표 D-${dday(o.d)}`, "📅", "#f0c948"]); }
const sideAlert = `<div class="card"><h3>오늘의 알림</h3>
  ${alerts.slice(0,5).map(([t,a,c],i)=>`<div class="nrow2"><span class="rank">${i+1}</span><span class="tx">${t}</span><span class="ar" style="color:${c};">${a}</span></div>`).join("") || `<div style="font-size:12px;color:var(--dim);">특이 알림 없음</div>`}</div>`;

const sideCrit = `<div class="card"><h3>관심종목 평가 기준</h3>
  ${[["수급",25],["모멘텀",25],["펀더멘털",20],["밸류에이션",15],["리스크",15]].map(([lb,v])=>
    `<div class="gbar"><span class="lb2">${lb}</span><div class="m"><i style="width:${v*3.2}%"></i></div><b>${v}%</b></div>`).join("")}
  <div style="font-size:10.5px;color:var(--dim);margin-top:8px;">관심종목 종합 점수는 100점 기준으로 산출됩니다.</div></div>`;

const recent = list.slice(-3).reverse().map(([src,key])=>({src,key,e:ST.get(src,key)}));
const sideRecent = `<div class="card" style="flex:1;"><h3>최근 추가 종목</h3>
  ${recent.map(x=>`<div class="nrow2" style="cursor:pointer;" onclick="location.href='${ST.stockUrl(x.src,x.key)}'">
    <span class="tx">${ST.displayName(x.src,x.key)}</span>
    <span style="color:var(--dim);font-size:10.5px;font-weight:500;">${x.e[1]}</span></div>`).join("")}</div>`;

box.innerHTML = `
<div class="layout">
  <div>${cards}${tableCard}
    <div class="row3b">${upCard}${evCard}${noteCard}</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:14px;height:100%;">${sideSurv}${sideAlert}${sideCrit}${sideRecent}</div>
</div>`;
drawBar(); drawTbl();
}
</script>
</body>
</html>
