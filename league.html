<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stocktier — 모의투자 리그</title>
<link rel="stylesheet" href="style.css">
<style>
  .wrap { max-width:1250px; }
  .layout { display:grid; grid-template-columns:1fr 320px; gap:14px; align-items:start; }
  @media (max-width:1000px){ .layout { grid-template-columns:1fr; } }
  .sumrow { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:14px; }
  .sumbox { background:linear-gradient(135deg,#0d2e3b,#123f4b); border:1px solid var(--border); border-radius:14px; padding:15px 17px; }
  .sumbox .lb { font-size:11.5px; color:var(--muted); font-weight:700; }
  .sumbox .vl { font-size:22px; font-weight:800; margin-top:5px; }
  .trade { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .trade .sbox { position:relative; flex:1; min-width:200px; }
  .trade input { width:100%; box-sizing:border-box; padding:10px 32px 10px 13px; font-size:13px; background:var(--panel2); border:1.5px solid var(--border); border-radius:9px; color:var(--text); outline:none; }
  .trade input:focus { border-color:var(--gold-dim); }
  .mag { position:absolute; right:11px; top:0; bottom:0; display:flex; align-items:center; color:var(--muted); font-size:15px; font-weight:700; pointer-events:none; }
  .trade .qty { flex:0 0 110px; min-width:110px; text-align:right; font-variant-numeric:tabular-nums; padding-right:13px !important; }
  .tbtn { padding:10px 20px; border-radius:9px; border:none; font-size:13px; font-weight:800; cursor:pointer; }
  .tbtn.buy { background:#1d9e75; color:#fff; }
  .tbtn.sell { background:#c0443a; color:#fff; }
  .tbtn:disabled { opacity:.5; cursor:default; }
  .ptbl { width:100%; border-collapse:collapse; font-size:12.5px; margin-top:6px; }
  .ptbl th { text-align:center; color:var(--dim); font-size:10.5px; font-weight:700; padding:8px 4px; border-bottom:1px solid var(--border); white-space:nowrap; }
  .ptbl td { padding:9px 4px; border-bottom:1px solid #ffffff0d; text-align:center; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .ptbl td.nm { text-align:left; font-weight:700; }
  .rkrow { display:flex; align-items:center; gap:9px; padding:9px 0; border-bottom:1px solid #ffffff0d; font-size:12.5px; font-weight:700; }
  .rkrow:last-child { border-bottom:none; }
  .rkrow .rank { width:20px; height:20px; border-radius:6px; background:var(--panel2); border:1px solid var(--border); color:var(--muted); font-size:11px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .rkrow.me { background:#3d331322; border-radius:8px; padding-left:6px; padding-right:6px; }
  .msg2 { font-size:12px; font-weight:700; min-height:16px; margin-top:8px; }
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>
<div class="wrap">
  <span class="asof" id="asof"></span>
  <div class="page-title">🏆 모의투자 리그</div>
  <div class="page-sub">가상 자금 1억 원으로 시작하는 모의투자. 전일 종가 기준으로 체결됩니다. (재미용)</div>
  <div id="body"><div class="card" style="text-align:center;padding:40px;color:var(--muted);">로그인 상태 확인 중...</div></div>
  <div class="footer"></div>
</div>

<script src="data.js"></script>
<script src="data_us.js"></script>
<script src="common.js"></script>
<script>
ST.nav("league.html");
document.getElementById("asof").textContent = "업데이트: " + ST.asofText();
const box = document.getElementById("body");
const SEED = 100000000;   // 1억
let USER = null, ready = false, L = null, SELK = null;

function locked(){
  box.innerHTML = `<div class="card" style="text-align:center;padding:50px;">
    <div style="font-size:28px;margin-bottom:12px;">🔒</div>
    <div style="font-size:15px;font-weight:800;margin-bottom:6px;">로그인하고 모의투자 리그에 참여하세요</div>
    <div style="font-size:12px;color:var(--dim);margin-bottom:16px;">가상 1억 원이 지급되고 수익률 랭킹에 오릅니다.</div>
    <button style="background:transparent;border:1px solid var(--gold-dim);color:var(--gold);border-radius:9px;padding:10px 26px;font-size:13px;font-weight:800;cursor:pointer;" onclick="document.getElementById('loginbtn').click()">로그인하기</button></div>`;
}

const wonN = v => Math.round(v).toLocaleString("ko-KR");
const priceOf = k => { const e = ST.get("kr", k); return e ? e[2] : null; };
const totalOf = d => {
  let t = d.cash || 0;
  for (const k of Object.keys(d.pos || {})) {
    const p = priceOf(k);
    if (p) t += d.pos[k].q * p;
  }
  return t;
};

async function load(){
  if (!USER) { locked(); return; }
  const ref = firebase.firestore().collection("league").doc(USER.uid);
  const snap = await ref.get();
  const p = window.ST_PROFILE || {};
  L = snap.exists ? snap.data() : { cash: SEED, pos: {}, start: Date.now() };
  L.pos = L.pos || {};
  L.nick = p.nick || USER.displayName || USER.email.split("@")[0];
  L.av = p.avatar || "";
  await ref.set(L, { merge: true });
  render();
}

function render(){
  const total = totalOf(L);
  const ret = (total/SEED - 1) * 100;
  const posKeys = Object.keys(L.pos).filter(k=>L.pos[k].q>0);
  box.innerHTML = `
  <div class="layout">
    <div>
      <div class="sumrow">
        <div class="sumbox"><div class="lb">총 자산</div><div class="vl num">${wonN(total)}원</div></div>
        <div class="sumbox"><div class="lb">수익률</div><div class="vl num ${ST.cls(ret)}">${ret>=0?"+":""}${ret.toFixed(2)}%</div></div>
        <div class="sumbox"><div class="lb">보유 현금</div><div class="vl num">${wonN(L.cash)}원</div></div>
      </div>
      <div class="card" style="margin-bottom:14px;"><h3>주문하기 <span class="more" style="cursor:default;">전일 종가 체결 · 수수료 없음</span></h3>
        <div class="trade">
          <div class="sbox"><input id="tq" placeholder="종목명 검색 (국내)" autocomplete="off"><span class="mag">⌕</span><div class="suggest" id="tsug"></div></div>
          <input class="qty" id="tqty" type="number" min="1" placeholder="수량">
          <button class="tbtn buy" id="buybtn">매수</button>
          <button class="tbtn sell" id="sellbtn">매도</button>
        </div>
        <div id="selinfo" style="font-size:12px;color:var(--muted);margin-top:9px;font-weight:700;"></div>
        <div class="msg2" id="tmsg"></div>
      </div>
      <div class="card"><h3>보유 종목</h3>
        ${posKeys.length ? `<table class="ptbl"><thead><tr><th>종목명</th><th>수량</th><th>평균단가</th><th>현재가</th><th>평가금액</th><th>손익</th></tr></thead><tbody>
          ${posKeys.map(k=>{
            const ps = L.pos[k], cur = priceOf(k) || ps.avg;
            const pl = (cur/ps.avg-1)*100;
            return `<tr>
              <td class="nm" style="cursor:pointer;" onclick="location.href='${ST.stockUrl("kr",k)}'">${k}</td>
              <td class="num">${wonN(ps.q)}주</td>
              <td class="num">${wonN(ps.avg)}원</td>
              <td class="num">${wonN(cur)}원</td>
              <td class="num" style="font-weight:800;">${wonN(ps.q*cur)}원</td>
              <td class="num ${ST.cls(pl)}" style="font-weight:800;">${pl>=0?"+":""}${pl.toFixed(2)}%</td></tr>`;}).join("")}
        </tbody></table>`
        : `<div style="font-size:12.5px;color:var(--dim);text-align:center;padding:18px 0;">보유 종목이 없습니다. 위에서 첫 종목을 매수해보세요!</div>`}
        <div style="margin-top:12px;text-align:right;"><button id="resetbtn" style="background:transparent;border:1px solid var(--border);color:var(--dim);border-radius:8px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;">처음부터 다시 시작</button></div>
      </div>
    </div>
    <div class="card" style="align-self:stretch;"><h3>🏆 수익률 랭킹</h3><div id="ranks">불러오는 중...</div></div>
  </div>`;

  // 종목 검색
  const tin = document.getElementById("tq"), sug = document.getElementById("tsug");
  const info = () => {
    const el = document.getElementById("selinfo");
    if (!SELK) { el.textContent = ""; return; }
    const cur = priceOf(SELK), held = L.pos[SELK];
    el.innerHTML = `<b>${SELK}</b> · 현재가 <b class="num">${wonN(cur)}원</b>${held&&held.q>0?` · 보유 <b class="num">${wonN(held.q)}주</b> (평단 ${wonN(held.avg)}원)`:""} · 최대 <b class="num">${wonN(Math.floor(L.cash/cur))}주</b> 매수 가능`;
  };
  tin.addEventListener("input", () => {
    const q = tin.value.trim();
    if (!q) { sug.style.display="none"; return; }
    const hits = ST.suggestions(q, 10).filter(([src])=>src==="kr").slice(0,7);
    if (!hits.length) { sug.style.display="none"; return; }
    sug.innerHTML = hits.map(([,k])=>`<div data-k="${encodeURIComponent(k)}">${k}<span class="code">${ST.get("kr",k)[0]}</span></div>`).join("");
    sug.style.display="block";
    sug.querySelectorAll("div[data-k]").forEach(el=>el.addEventListener("click",()=>{
      SELK = decodeURIComponent(el.dataset.k);
      tin.value = SELK; sug.style.display="none"; info();
    }));
  });
  document.addEventListener("click", e => { if (!e.target.closest(".sbox")) sug.style.display="none"; });
  if (SELK) { tin.value = SELK; info(); }
  const msg = (t, ok) => { const m=document.getElementById("tmsg"); m.textContent=t; m.style.color = ok?"#4cd7a5":"#f0708a"; };

  async function saveRender(t, ok){
    L.updated = Date.now();
    await firebase.firestore().collection("league").doc(USER.uid).set(L, { merge: false });
    render(); msg(t, ok); loadRanks();
  }
  document.getElementById("buybtn").addEventListener("click", () => {
    const k = SELK || (ST.findStock(tin.value.trim())||[])[1];
    const qn = Math.floor(+document.getElementById("tqty").value);
    if (!k || !priceOf(k)) { msg("국내 종목을 검색해서 선택해주세요."); return; }
    if (!qn || qn<1) { msg("수량을 입력해주세요."); return; }
    const cur = priceOf(k), cost = cur*qn;
    if (cost > L.cash) { msg(`현금이 부족해요. (필요 ${wonN(cost)}원 / 보유 ${wonN(L.cash)}원)`); return; }
    const ps = L.pos[k] || { q:0, avg:0 };
    ps.avg = Math.round((ps.q*ps.avg + cost) / (ps.q+qn));
    ps.q += qn;
    L.pos[k] = ps;
    L.cash -= cost;
    SELK = k;
    saveRender(`${k} ${wonN(qn)}주 매수 완료 (${wonN(cost)}원)`, true);
  });
  document.getElementById("sellbtn").addEventListener("click", () => {
    const k = SELK || (ST.findStock(tin.value.trim())||[])[1];
    const qn = Math.floor(+document.getElementById("tqty").value);
    const ps = k && L.pos[k];
    if (!ps || ps.q<1) { msg("보유하지 않은 종목입니다."); return; }
    if (!qn || qn<1 || qn>ps.q) { msg(`매도 가능 수량: ${wonN(ps.q)}주`); return; }
    const cur = priceOf(k);
    ps.q -= qn;
    L.cash += cur*qn;
    if (ps.q === 0) delete L.pos[k];
    SELK = k;
    saveRender(`${k} ${wonN(qn)}주 매도 완료 (+${wonN(cur*qn)}원)`, true);
  });
  document.getElementById("resetbtn").addEventListener("click", () => {
    if (!confirm("모든 보유 종목과 기록을 지우고 1억 원부터 다시 시작할까요?")) return;
    L = { cash: SEED, pos: {}, start: Date.now(), nick: L.nick, av: L.av };
    SELK = null;
    saveRender("초기화 완료! 가상 1억 원이 지급되었습니다.", true);
  });
  loadRanks();
}

async function loadRanks(){
  const el = document.getElementById("ranks");
  if (!el) return;
  try {
    const snap = await firebase.firestore().collection("league").limit(50).get();
    const rows = [];
    snap.forEach(d => { const v = d.data(); rows.push({ uid:d.id, ...v, total: totalOf(v) }); });
    rows.sort((a,b)=>b.total-a.total);
    el.innerHTML = rows.map((r,i)=>{
      const rr = (r.total/SEED-1)*100;
      return `<div class="rkrow ${r.uid===USER.uid?"me":""}">
        <span class="rank">${i<3?["🥇","🥈","🥉"][i]:i+1}</span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.av?r.av+" ":""}${(r.nick||"익명").replace(/</g,"&lt;")}</span>
        <span class="num ${ST.cls(rr)}" style="font-weight:800;">${rr>=0?"+":""}${rr.toFixed(2)}%</span></div>`;}).join("")
      || `<div style="font-size:12px;color:var(--dim);">첫 참가자가 되어보세요!</div>`;
  } catch(e) { el.innerHTML = `<div style="font-size:12px;color:var(--dim);">랭킹을 불러오지 못했습니다.</div>`; }
}

document.addEventListener("st-auth", e => { ready = true; USER = e.detail; load(); });
setTimeout(() => { if (!ready) locked(); }, 4000);
</script>
</body>
</html>
