<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stocktier — 뉴스</title>
<link rel="stylesheet" href="style.css">
<style>
  .wrap { max-width:1440px; }
  .layout { display:grid; grid-template-columns:1fr 330px; gap:14px; align-items:start; }
  @media (max-width:1100px){ .layout { grid-template-columns:1fr; } }
  .cards4 { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:11px; margin-bottom:14px; }
  @media (max-width:1000px){ .cards4 { grid-template-columns:repeat(2,minmax(0,1fr)); } }
  .scard { background:linear-gradient(135deg,#0d2e3b,#123f4b); border:1px solid var(--border); border-radius:14px; padding:14px 15px; display:flex; gap:11px; align-items:center; min-width:0; }
  .scard .ic { width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .scard .ic.g { background:#4cd7a51a; border:1px solid #4cd7a544; }
  .scard .ic.y { background:#f0c9481a; border:1px solid #f0c94844; }
  .scard .ic.r { background:#f0708a1a; border:1px solid #f0708a44; }
  .scard .ic.b { background:#38bdf81a; border:1px solid #38bdf844; }
  .scard .l { flex:1; min-width:0; }
  .scard .lb { font-size:11px; color:var(--muted); font-weight:700; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .scard .vl { font-size:23px; font-weight:800; line-height:1.05; }
  .scard .vl small { font-size:12px; color:var(--dim); font-weight:600; }
  .scard .sub { font-size:10px; color:var(--dim); margin-top:3px; white-space:nowrap; }
  .scard svg.mini { flex-shrink:0; }
  .scard.hov { cursor:pointer; transition:border-color .15s, box-shadow .15s; }
  .scard.hov:hover { border-color:#4cd7a5; box-shadow:0 0 0 1px #4cd7a555; }
  .smrow { display:flex; gap:10px; align-items:center; padding:9px 2px; border-bottom:1px solid #ffffff0d; font-size:12px; font-weight:600; cursor:pointer; }
  .smrow:last-child { border-bottom:none; }
  .smrow:hover .tx { color:var(--gold); }
  .smrow .tm { color:var(--dim); font-size:10.5px; flex-shrink:0; width:74px; font-variant-numeric:tabular-nums; }
  .smrow .tx { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text); }
  .smrow .src { color:var(--muted); font-size:10.5px; flex-shrink:0; }
  .smhead { display:flex; gap:10px; align-items:center; padding:0 2px 7px; border-bottom:1px solid var(--border); font-size:10px; color:var(--dim); font-weight:700; }
  .smhead .tx { flex:1; min-width:0; }
  .fbar { display:flex; gap:9px; row-gap:9px; flex-wrap:wrap; align-items:center; }
  .fchip { font-size:11.5px; padding:6px 13px; border-radius:8px; border:1px solid var(--border); color:var(--muted); cursor:pointer; font-weight:700; transition:border-color .15s,color .15s; }
  .fchip:hover { border-color:var(--gold-dim); color:var(--text); }
  .fchip.on { background:#13322a; color:#4cd7a5; border-color:#2e5c47; }
  .selbar { display:flex; gap:9px; align-items:center; flex-shrink:0; }
  .selbar select { background:var(--panel2); border:1px solid var(--border); color:var(--text); border-radius:7px; padding:6px 9px; font-size:11.5px; outline:none; }
  .sbox { position:relative; }
  .sbox input { width:210px; padding:7px 30px 7px 11px; font-size:11.5px; background:var(--panel2); border:1px solid var(--border); border-radius:8px; color:var(--text); outline:none; }
  .sbox input:focus { border-color:var(--gold-dim); }
  .mag { position:absolute; right:10px; top:0; bottom:0; display:flex; align-items:center; color:var(--muted); font-size:14px; font-weight:700; pointer-events:none; }
  .ntbl { width:100%; border-collapse:collapse; font-size:12px; }
  .ntbl th { text-align:center; color:var(--dim); font-size:10.5px; font-weight:700; padding:8px 4px; border-bottom:1px solid var(--border); white-space:nowrap; }
  .ntbl td { padding:10px 5px; border-bottom:1px solid #ffffff0d; text-align:center; vertical-align:middle; font-variant-numeric:tabular-nums; }
  .ntbl tr:hover td { background:var(--panel2); }
  .ntbl td.tt { text-align:left; max-width:430px; }
  .ntbl td.tt a { display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:700; }
  .ntbl td.tt a:hover { color:var(--gold); }
  .catb { display:inline-flex; padding:2.5px 9px; border-radius:6px; font-size:10px; font-weight:800; }
  .c-시장 { background:#13322a; color:#4cd7a5; } .c-기업 { background:#22303c; color:#9db9d4; }
  .c-정책 { background:#2a2140; color:#c3a8f0; } .c-산업 { background:#0f3a4a; color:#5ad0e8; }
  .c-해외 { background:#3a1a22; color:#f0a0b0; } .c-매칭 { background:#3d3313; color:#f0c948; }
  .stkchip { display:inline-block; background:var(--panel2); border:1px solid var(--border); border-radius:6px; padding:2px 8px; font-size:10.5px; font-weight:700; color:var(--text); cursor:pointer; margin:1px 2px; white-space:nowrap; }
  .stkchip:hover { border-color:var(--gold-dim); color:var(--gold); }
  .impb { display:inline-flex; min-width:36px; justify-content:center; padding:3px 10px; border-radius:7px; font-size:10.5px; font-weight:800; }
  .i-high { background:#5a1512; color:#ffb3ad; } .i-mid { background:#3d3313; color:#f0c948; } .i-low { background:#13322a; color:#4cd7a5; }
  .morebtn { display:block; margin:12px auto 0; background:var(--panel2); border:1px solid var(--border); color:var(--muted); border-radius:9px; padding:8px 26px; font-size:12px; font-weight:800; cursor:pointer; }
  .morebtn:hover { color:var(--gold); border-color:var(--gold-dim); }
  .flashrow { display:flex; gap:9px; padding:9px 0; border-bottom:1px solid #ffffff0d; font-size:12px; font-weight:600; align-items:flex-start; cursor:pointer; }
  .flashrow:last-child { border-bottom:none; }
  .flashrow:hover .tx { color:var(--gold); }
  .flashrow .dot { width:7px; height:7px; border-radius:50%; background:#f0645a; margin-top:5px; flex-shrink:0; box-shadow:0 0 6px #f0645a88; }
  .flashrow .tm { color:var(--dim); font-size:11px; flex-shrink:0; font-variant-numeric:tabular-nums; margin-top:1px; }
  .flashrow .tx { flex:1; min-width:0; color:var(--text); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .reprow { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid #ffffff0d; font-size:12px; font-weight:600; cursor:pointer; }
  .reprow:last-child { border-bottom:none; }
  .reprow:hover .tx { color:var(--gold); }
  .reprow .firm { width:78px; flex-shrink:0; color:var(--muted); font-size:11px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .reprow .tx { flex:1; min-width:0; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .reprow .dt { color:var(--dim); font-size:10.5px; flex-shrink:0; }
  .row2m { display:grid; grid-template-columns:1.15fr 1fr; gap:14px; margin-top:14px; align-items:stretch; }
  @media (max-width:1000px){ .row2m { grid-template-columns:1fr; } }
  .mktgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:9px; }
  @media (max-width:800px){ .mktgrid { grid-template-columns:repeat(2,1fr); } }
  .mkt { background:var(--panel2); border:1px solid var(--border); border-radius:11px; padding:11px 12px; min-width:0; }
  .mkt .nm2 { font-size:11px; color:var(--muted); font-weight:700; white-space:nowrap; }
  .mkt .pr { font-size:15.5px; font-weight:800; margin-top:4px; white-space:nowrap; }
  .mkt .ch { font-size:10.5px; font-weight:700; margin-top:2px; white-space:nowrap; }
  .ftbl { width:100%; border-collapse:collapse; font-size:12px; }
  .ftbl th { text-align:center; color:var(--dim); font-size:10.5px; font-weight:700; padding:8px 4px; border-bottom:1px solid var(--border); }
  .ftbl td { padding:10px 5px; border-bottom:1px solid #ffffff0d; text-align:center; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .ftbl td.k2 { color:var(--muted); font-weight:700; }
  .ftbl td b { cursor:pointer; }
  .ftbl td b:hover { color:var(--gold); }
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>
<div class="wrap">
  <span class="asof" id="asof"></span>
  <div class="page-title">뉴스</div>
  <div class="page-sub">시장과 종목에 영향을 미치는 주요 뉴스를 확인하세요.</div>
  <div class="layout">
    <div>
      <div class="cards4" id="cards4"></div>
      <div class="card" id="newscard"><h3 style="margin-bottom:12px;">주요 뉴스</h3>
        <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:12px;">
          <div class="fbar" id="catbar"></div>
          <div class="selbar">
            <span class="sbox"><input id="q" placeholder="제목 · 출처 · 종목명 검색" autocomplete="off"><span class="mag">⌕</span></span>
            <select id="sortsel"><option value="new">최신순</option><option value="imp">영향도순</option></select>
            <select id="impsel"><option value="all">영향도: 전체</option><option value="3">높음</option><option value="2">중간</option><option value="1">낮음</option></select>
          </div>
        </div>
        <table class="ntbl"><thead><tr><th>시간</th><th>제목</th><th>출처</th><th>카테고리</th><th>영향 종목</th><th>영향도</th></tr></thead><tbody id="tbody"></tbody></table>
        <button class="morebtn" id="morebtn">더보기</button>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div class="card"><h3>실시간 속보 <span class="more" onclick="document.getElementById('newscard').scrollIntoView({behavior:'smooth'})">더보기 ›</span></h3><div id="flash"></div></div>
      <div class="card"><h3>관련 리포트 <span class="more" onclick="window.open('https://finance.naver.com/research/','_blank')">더보기 ›</span></h3><div id="reports"></div></div>
    </div>
  </div>
  <div class="row2m">
    <div class="card"><h3>시장 요약</h3><div class="mktgrid" id="mktgrid"></div></div>
    <div class="card"><h3>기관 &amp; 외국인 동향 <span class="more" style="cursor:default;">전일 순매수 기준</span></h3>
      <table class="ftbl"><thead><tr><th>구분</th><th>순매수 상위</th><th></th><th>순매도 상위</th><th></th></tr></thead><tbody id="fbody"></tbody></table>
      <div id="fidx" style="font-size:10.5px;color:var(--dim);font-weight:700;margin-top:9px;"></div>
    </div>
  </div>
  <div class="footer"></div>
</div>

<div id="statmodal" style="position:fixed;inset:0;background:#000000aa;display:none;align-items:center;justify-content:center;z-index:300;" onclick="if(event.target===this)this.style.display='none'">
  <div style="background:var(--panel);border:1px solid var(--border);border-radius:16px;width:min(560px,92vw);max-height:80vh;display:flex;flex-direction:column;padding:22px 24px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <b id="sm_title" style="font-size:16px;"></b>
      <span style="cursor:pointer;color:var(--muted);padding:2px 6px;font-size:16px;" onclick="document.getElementById('statmodal').style.display='none'">✕</span></div>
    <div id="sm_body" style="overflow:auto;flex:1;"></div>
    <div id="sm_foot" style="margin-top:12px;text-align:right;"></div>
  </div>
</div>

<script src="data.js"></script>
<script src="data_us.js"></script>
<script src="dart.js"></script>
<script src="common.js"></script>
<script>
ST.nav("news.html");
document.getElementById("asof").textContent = "업데이트: " + ST.asofText();
const MK = window.STOCK_MARKET || {};
const MKU = window.STOCK_MARKET_US || {};
const DARTS = window.STOCK_DART || {};

// ══ 뉴스 통합 + 종목 매칭 + 영향도 산정 ══
const RAW = ((MK.news || []).concat(MKU.news || [])).filter(n => n && n[0]);
const NAMES = Object.keys(ST.KR).filter(n => n.length >= 2);
const UNAMES = Object.keys(ST.ALIAS || {}).filter(n => n.length >= 2);
const HIGH_KW = ["급등","급락","폭락","폭등","사상 최고","사상 최대","상장폐지","거래정지","전쟁","공습","제재","서킷브레이커","쇼크","반토막","디폴트","위기"];
const MID_KW  = ["실적","금리","환율","유가","수주","계약","인수","합병","증자","배당","규제","전망","상승","하락","투자","관세","적자","흑자","급증","급감"];

const ITEMS = RAW.map(n => {
  const t = n[0], office = n[1]||"", tm = n[2]||"", url = n[3]||"", cat = n[4]||"해외";
  const matched = [];
  for (const nm of NAMES) { if (matched.length >= 3) break; if (t.includes(nm)) matched.push(["kr", nm]); }
  for (const nm of UNAMES) { if (matched.length >= 3) break; if (t.includes(nm) && ST.US[ST.ALIAS[nm]] && !matched.some(m=>m[1]===ST.ALIAS[nm])) matched.push(["us", ST.ALIAS[nm]]); }
  let sc = 0;
  if (HIGH_KW.some(k => t.includes(k))) sc += 2;
  if (MID_KW.some(k => t.includes(k))) sc += 1;
  if (matched.length) sc += 1;
  const imp = sc >= 3 ? 3 : sc >= 1 ? 2 : 1;   // 3높음 2중간 1낮음
  return { t, office, tm, url, cat, matched, imp };
});
ITEMS.sort((a,b) => (b.tm||"").localeCompare(a.tm||""));

const nowD = new Date();
const todayMD = String(nowD.getMonth()+1).padStart(2,"0") + "/" + String(nowD.getDate()).padStart(2,"0");
const todayN = ITEMS.filter(x => (x.tm||"").startsWith(todayMD)).length;

// ══ 상단 통계 카드 (아이콘 + 미니 차트) ══
const ICONS = {
  list: `<svg width="22" height="22" viewBox="0 0 22 22"><g stroke="#4cd7a5" stroke-width="2" stroke-linecap="round"><line x1="3" y1="5" x2="6" y2="5"/><line x1="9" y1="5" x2="19" y2="5"/><line x1="3" y1="11" x2="6" y2="11"/><line x1="9" y1="11" x2="19" y2="11"/><line x1="3" y1="17" x2="6" y2="17"/><line x1="9" y1="17" x2="19" y2="17"/></g></svg>`,
  net: `<svg width="22" height="22" viewBox="0 0 22 22"><g stroke="#f0c948" stroke-width="1.6" fill="none"><circle cx="6" cy="6" r="2.6"/><circle cx="16" cy="8" r="2.6"/><circle cx="10" cy="16" r="2.6"/><line x1="8" y1="7" x2="13.5" y2="7.6"/><line x1="7" y1="8.3" x2="9" y2="13.6"/><line x1="14.6" y1="10.2" x2="11.4" y2="14"/></g></svg>`,
  doc: `<svg width="22" height="22" viewBox="0 0 22 22"><g stroke="#f0708a" stroke-width="1.7" fill="none" stroke-linecap="round"><rect x="4" y="3" width="14" height="16" rx="2"/><line x1="7.5" y1="8" x2="14.5" y2="8"/><line x1="7.5" y1="11.5" x2="14.5" y2="11.5"/><line x1="7.5" y1="15" x2="11.5" y2="15"/></g></svg>`,
  docs: `<svg width="22" height="22" viewBox="0 0 22 22"><g stroke="#4cd7a5" stroke-width="1.6" fill="none" stroke-linecap="round"><rect x="6.5" y="2.5" width="12" height="14" rx="2"/><path d="M4.5 6.5v11a2 2 0 0 0 2 2h9"/><line x1="10" y1="6.5" x2="15" y2="6.5"/><line x1="10" y1="9.5" x2="15" y2="9.5"/><line x1="10" y1="12.5" x2="13" y2="12.5"/></g></svg>`
};
function miniArea(vals, col){
  if (!vals.length) return "";
  const W=64, H=30, mx=Math.max(...vals,1);
  const xy = vals.map((v,i)=>`${(i/Math.max(1,vals.length-1)*W).toFixed(1)},${(H-3-v/mx*(H-8)).toFixed(1)}`).join(" ");
  return `<svg class="mini" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><polygon points="0,${H} ${xy} ${W},${H}" fill="${col}22"/><polyline points="${xy}" fill="none" stroke="${col}" stroke-width="1.6"/></svg>`;
}
function miniBars(vals, col){
  if (!vals.length) return "";
  const W=64, H=30, mx=Math.max(...vals,1), bw=Math.min(7, W/vals.length-2);
  return `<svg class="mini" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${vals.map((v,i)=>{
    const h = Math.max(2, v/mx*(H-6));
    return `<rect x="${(i*(W/vals.length)+2).toFixed(1)}" y="${(H-2-h).toFixed(1)}" width="${bw}" height="${h.toFixed(1)}" rx="1.5" fill="${col}"/>`;}).join("")}</svg>`;
}
// 시간대별 건수 (미니 차트용)
function hourly(items){
  const m = {};
  items.forEach(x => { const h = (x.tm||"").slice(0,8); if (h) m[h] = (m[h]||0)+1; });
  const ks = Object.keys(m).sort();
  return ks.slice(-8).map(k=>m[k]);
}
const mkNews = ITEMS.filter(x=>x.imp>=2);
const dDates = Object.keys(DARTS).sort();
const dToday = dDates.length ? (DARTS[dDates[dDates.length-1]]||[]).length : 0;
const dBars = dDates.slice(-7).map(d=>(DARTS[d]||[]).length);
let cum = 0;
const cumArr = hourly(ITEMS).map(v=>cum+=v);
// 전문가 리포트 통계 (증권사 리서치)
const REPORTS = MK.reports || [];
const rToday = REPORTS.filter(r=>r[2]===todayMD).length;
const rMap = {};
REPORTS.forEach(r=>{ if (r[2]) rMap[r[2]] = (rMap[r[2]]||0)+1; });
const rBars = Object.keys(rMap).sort().slice(-7).map(k=>rMap[k]);
document.getElementById("cards4").innerHTML = `
  <div class="scard hov" onclick="openStat('all')"><span class="ic g">${ICONS.list}</span><div class="l"><div class="lb">전체 뉴스</div><div class="vl num">${ITEMS.length} <small>건</small></div><div class="sub">+${todayN} 오늘</div></div>${miniArea(cumArr,"#4cd7a5")}</div>
  <div class="scard hov" onclick="openStat('mk')"><span class="ic y">${ICONS.net}</span><div class="l"><div class="lb">시장 영향 뉴스</div><div class="vl num">${mkNews.length} <small>건</small></div><div class="sub">영향도 중간 이상</div></div>${miniBars(hourly(mkNews),"#f0c948")}</div>
  <div class="scard hov" onclick="openStat('dart')"><span class="ic r">${ICONS.doc}</span><div class="l"><div class="lb">주요 공시</div><div class="vl num">${dToday} <small>건</small></div><div class="sub">오늘 접수</div></div>${miniBars(dBars,"#f0708a")}</div>
  <div class="scard hov" onclick="openStat('rep')"><span class="ic g">${ICONS.docs}</span><div class="l"><div class="lb">전문가 리포트</div><div class="vl num">${REPORTS.length} <small>건</small></div><div class="sub">+${rToday} 오늘</div></div>${miniBars(rBars,"#4cd7a5")}</div>`;

// ══ 통계 카드 팝업 (헤더 + 목록) ══
const esc = s => String(s).replace(/</g,"&lt;");
const impBadge = x => `<span class="impb ${x.imp===3?"i-high":x.imp===2?"i-mid":"i-low"}" style="flex-shrink:0;">${x.imp===3?"높음":x.imp===2?"중간":"낮음"}</span>`;
const newsRows = list => list.map(x=>`
  <div class="smrow" onclick="window.open('${x.url}','_blank')">
    <span class="tm">${x.tm||"-"}</span><span class="tx">${esc(x.t)}</span>
    <span class="src">${esc(x.office)}</span>${impBadge(x)}</div>`).join("")
  || `<div style="font-size:12px;color:var(--dim);padding:14px 0;">표시할 항목이 없습니다.</div>`;
const newsHead = `<div class="smhead"><span style="width:74px;flex-shrink:0;">시간</span><span class="tx">제목</span><span style="flex-shrink:0;">출처</span><span style="width:42px;text-align:center;flex-shrink:0;">영향도</span></div>`;
window.openStat = which => {
  const title = document.getElementById("sm_title"), body = document.getElementById("sm_body"), foot = document.getElementById("sm_foot");
  foot.innerHTML = "";
  if (which === "all") {
    title.innerHTML = "📰 전체 뉴스 <span style='font-size:11px;color:var(--dim);font-weight:600;'>· " + ITEMS.length + "건</span>";
    body.innerHTML = newsHead + newsRows(ITEMS);
  } else if (which === "mk") {
    title.innerHTML = "📊 시장 영향 뉴스 <span style='font-size:11px;color:var(--dim);font-weight:600;'>· 영향도 중간 이상 " + mkNews.length + "건</span>";
    body.innerHTML = newsHead + newsRows(mkNews);
  } else if (which === "dart") {
    const dk = dDates[dDates.length-1] || "";
    const items = (DARTS[dk] || []).slice().sort((a,b)=>(b[4]||0)-(a[4]||0)).slice(0,30);
    title.innerHTML = "📄 주요 공시 <span style='font-size:11px;color:var(--dim);font-weight:600;'>· " + (dk?`${dk.slice(4,6)}/${dk.slice(6,8)} 접수`:"") + " " + dToday + "건 중 충격도 상위</span>";
    body.innerHTML = (items.length ? `<div class="smhead"><span style="width:92px;flex-shrink:0;">기업명</span><span style="flex-shrink:0;">유형</span><span class="tx">공시 제목</span><span style="width:48px;text-align:center;flex-shrink:0;">충격도</span></div>` : "") + items.map(x=>`
      <div class="smrow" onclick="window.open('https://dart.fss.or.kr/dsaf001/main.do?rcpNo=${x[6]}','_blank')">
        <span class="tm" style="width:auto;max-width:92px;overflow:hidden;text-overflow:ellipsis;color:var(--text);font-weight:700;font-size:11.5px;">${esc(x[0])}</span>
        <span class="src" style="background:var(--panel2);border:1px solid var(--border);border-radius:5px;padding:1.5px 7px;">${esc(x[2])}</span>
        <span class="tx" style="font-size:11.5px;">${esc(x[3])}</span>
        <span class="impb ${x[4]>=5?"i-high":x[4]>=3?"i-mid":"i-low"}" style="flex-shrink:0;">충격 ${x[4]||"-"}</span></div>`).join("")
      || `<div style="font-size:12px;color:var(--dim);padding:14px 0;">오늘 접수된 공시가 없습니다.</div>`;
    foot.innerHTML = `<button class="morebtn" style="margin:0;display:inline-block;" onclick="location.href='disclosure.html'">공시 충격도 페이지로 이동 →</button>`;
  } else {
    title.innerHTML = "📑 전문가 리포트 <span style='font-size:11px;color:var(--dim);font-weight:600;'>· " + REPORTS.length + "건</span>";
    body.innerHTML = (REPORTS.length ? `<div class="smhead"><span style="width:92px;flex-shrink:0;">증권사</span><span class="tx">제목</span><span style="width:40px;text-align:right;flex-shrink:0;">날짜</span></div>` : "") + REPORTS.map(r=>`
      <div class="smrow" onclick="window.open('${r[3]}','_blank')">
        <span class="tm" style="width:auto;max-width:92px;overflow:hidden;text-overflow:ellipsis;color:var(--muted);font-weight:700;">${esc(r[0])}</span>
        <span class="tx">${esc(r[1])}</span><span class="src">${r[2]||""}</span></div>`).join("")
      || `<div style="font-size:12px;color:var(--dim);padding:14px 0;">리포트 데이터가 아직 없어요. 다음 데이터 수집부터 표시됩니다.</div>`;
  }
  document.getElementById("statmodal").style.display = "flex";
};

// ══ 주요 뉴스 표 ══
const CATS = ["전체","시장","기업","정책","산업","해외","종목 매칭"];
let CAT = "전체", Q = "", SORT = "new", IMPF = "all", SHOW = 12;
function drawCats(){
  document.getElementById("catbar").innerHTML = CATS.map(c=>`<span class="fchip ${CAT===c?"on":""}" onclick="setCat('${c}')">${c}</span>`).join("");
}
window.setCat = c => { CAT = c; SHOW = 12; draw(); };
function filtered(){
  let l = ITEMS;
  if (CAT === "종목 매칭") l = l.filter(x=>x.matched.length);
  else if (CAT !== "전체") l = l.filter(x=>x.cat===CAT);
  if (IMPF !== "all") l = l.filter(x=>x.imp === +IMPF);
  if (Q) l = l.filter(x => x.t.includes(Q) || x.office.includes(Q) || x.matched.some(m=>m[1].includes(Q)));
  if (SORT === "imp") l = l.slice().sort((a,b)=> b.imp - a.imp || (b.tm||"").localeCompare(a.tm||""));
  return l;
}
function draw(){
  drawCats();
  const l = filtered();
  document.getElementById("tbody").innerHTML = l.slice(0, SHOW).map(x=>`
    <tr>
      <td class="num" style="color:var(--dim);font-size:11px;">${x.tm||"-"}</td>
      <td class="tt"><a href="${x.url}" target="_blank" rel="noopener">${x.t.replace(/</g,"&lt;")}</a></td>
      <td style="color:var(--muted);font-size:11px;">${x.office}</td>
      <td><span class="catb c-${x.cat}">${x.cat}</span></td>
      <td>${x.matched.length ? x.matched.map(m=>`<span class="stkchip" onclick="location.href='${ST.stockUrl(m[0],m[1])}'">${ST.displayName(m[0],m[1])}</span>`).join("") : `<span style="color:var(--dim);">-</span>`}</td>
      <td><span class="impb ${x.imp===3?"i-high":x.imp===2?"i-mid":"i-low"}">${x.imp===3?"높음":x.imp===2?"중간":"낮음"}</span></td>
    </tr>`).join("") || `<tr><td colspan="6" style="padding:26px;color:var(--dim);">조건에 맞는 뉴스가 없습니다.</td></tr>`;
  document.getElementById("morebtn").style.display = l.length > SHOW ? "block" : "none";
}
document.getElementById("q").addEventListener("input", e => { Q = e.target.value.trim(); SHOW = 12; draw(); });
document.getElementById("sortsel").addEventListener("change", e => { SORT = e.target.value; draw(); });
document.getElementById("impsel").addEventListener("change", e => { IMPF = e.target.value; SHOW = 12; draw(); });
document.getElementById("morebtn").addEventListener("click", () => { SHOW += 12; draw(); });
draw();

// ══ 실시간 속보 ══
document.getElementById("flash").innerHTML = ITEMS.slice(0,5).map(x=>`
  <div class="flashrow" onclick="window.open('${x.url}','_blank')">
    <span class="dot"></span><span class="tm num">${(x.tm||"").slice(6)||(x.tm||"")}</span>
    <span class="tx">${x.t.replace(/</g,"&lt;")}</span>
  </div>`).join("") || `<div style="font-size:12px;color:var(--dim);">수집된 뉴스가 없습니다.</div>`;

// ══ 관련 리포트 (증권사 리서치 — 제목·출처·날짜만, 원문 링크) ══
document.getElementById("reports").innerHTML = (MK.reports||[]).slice(0,8).map(r=>`
  <div class="reprow" onclick="window.open('${r[3]}','_blank')">
    <span class="firm">${String(r[0]).replace(/</g,"&lt;")}</span>
    <span class="tx">${String(r[1]).replace(/</g,"&lt;")}</span>
    <span class="dt num">${r[2]||""}</span>
  </div>`).join("")
  || `<div style="font-size:12px;color:var(--dim);line-height:1.7;">리포트 데이터가 아직 없어요.<br>다음 데이터 수집(평일 19시)부터 표시됩니다.</div>`;

// ══ 시장 요약 ══
function mkTile(nm, o, unit){
  if (!o || !o.price) return "";
  const up = (o.ratio||0) >= 0;
  const hist = (o.hist||[]).slice(-60);
  let sp = "";
  if (hist.length > 2) {
    const W=100, H=26, mn=Math.min(...hist), mx=Math.max(...hist), rg=(mx-mn)||1;
    const xy = hist.map((v,i)=>`${(i/(hist.length-1)*W).toFixed(1)},${(H-2-(v-mn)/rg*(H-4)).toFixed(1)}`).join(" ");
    const col = up ? "#4cd7a5" : "#f0645a";
    sp = `<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block;margin-top:7px;"><polygon points="0,${H} ${xy} ${W},${H}" fill="${col}18"/><polyline points="${xy}" fill="none" stroke="${col}" stroke-width="1.4"/></svg>`;
  }
  return `<div class="mkt"><div class="nm2">${nm}</div><div class="pr num">${(+o.price).toLocaleString("ko-KR")}${unit||""}</div>
    <div class="ch num ${up?"up":"down"}">${o.chg>0?"+":""}${(+o.chg).toLocaleString("ko-KR")} (${o.ratio>0?"+":""}${o.ratio}%)</div>${sp}</div>`;
}
// 환율: 이력(fxHist)이 있으면 지수 타일과 같은 그래프 표시
function fxTile(){
  if (!MK.fx) return "";
  const h = MK.fxHist || [];
  if (h.length > 2) {
    const prev = h[h.length-2];
    const chg = Math.round((MK.fx - prev) * 100) / 100;
    const ratio = prev ? Math.round(chg / prev * 10000) / 100 : 0;
    return mkTile("원/달러 환율", { price: MK.fx, chg: chg, ratio: ratio, hist: h }, "원");
  }
  return `<div class="mkt"><div class="nm2">원/달러 환율</div><div class="pr num">${(+MK.fx).toLocaleString("ko-KR")}원</div><div class="ch" style="color:var(--dim);">전일 기준</div></div>`;
}
document.getElementById("mktgrid").innerHTML =
  mkTile("KOSPI", MK.kospi) + mkTile("KOSDAQ", MK.kosdaq) + mkTile("코스피200", MK.kpi200) + fxTile();

// ══ 기관 & 외국인 동향 (전일 순매수 상위/하위) ══
(function(){
  const rows = [];
  const all = ST.all().filter(x=>x.src==="kr" && x.e[2]);
  for (const g of [["기관", 18], ["외국인", 17]]){
    const byAmt = all.filter(x=>typeof x.e[g[1]]==="number" && x.e[g[1]])
      .map(x=>({ nm:x.key, amt:x.e[g[1]]*x.e[2]/1e8 }))
      .sort((a,b)=>b.amt-a.amt);
    if (!byAmt.length) continue;
    const top = byAmt[0], bot = byAmt[byAmt.length-1];
    rows.push(`<tr><td class="k2">${g[0]}</td>
      <td><b onclick="location.href='${ST.stockUrl("kr",top.nm)}'">${top.nm}</b></td><td class="num up">+${Math.round(top.amt).toLocaleString("ko-KR")}억</td>
      <td><b onclick="location.href='${ST.stockUrl("kr",bot.nm)}'">${bot.nm}</b></td><td class="num down">${Math.round(bot.amt).toLocaleString("ko-KR")}억</td></tr>`);
  }
  document.getElementById("fbody").innerHTML = rows.join("") || `<tr><td colspan="5" style="padding:20px;color:var(--dim);">수급 데이터 수집 중</td></tr>`;
  const fi = MK.flowIdx || {};
  const last = m => (fi[m]||[]).slice(-1)[0];
  const kp = last("KOSPI"), kd = last("KOSDAQ");
  if (kp || kd) {
    const f = v => (v>0?"+":"") + Math.round(v).toLocaleString("ko-KR") + "억";
    document.getElementById("fidx").innerHTML =
      (kp ? `KOSPI 수급 — 외국인 <b class="num ${ST.cls(kp[1])}">${f(kp[1])}</b> · 기관 <b class="num ${ST.cls(kp[2])}">${f(kp[2])}</b>` : "")
      + (kp && kd ? ` &nbsp;|&nbsp; ` : "")
      + (kd ? `KOSDAQ — 외국인 <b class="num ${ST.cls(kd[1])}">${f(kd[1])}</b> · 기관 <b class="num ${ST.cls(kd[2])}">${f(kd[2])}</b>` : "");
  }
})();
</script>
